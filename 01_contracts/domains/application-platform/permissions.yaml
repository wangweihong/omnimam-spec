aiapp.provider_capability.read:
  module: provider-capability
  resource: provider_capability
  action: read
  description: 查看 ProviderCapability 只读目录、模型、Operation、Variant 和公开可用状态。
  frontend_usage: 控制平台能力目录、应用参数来源和能力状态展示。
  backend_enforcement: 不返回来源文件路径、完整加载失败详情或任何能力写入口。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-130, BR-AIAPP-135, BR-AIAPP-136, BR-AIAPP-139]
  related_user_stories: [US-AIAPP-039, US-AIAPP-040]

aiapp.provider_capability.read_diagnostics:
  module: provider-capability
  resource: provider_capability_load_result
  action: read
  description: 查看 ProviderCapability 目录级和文件级启动加载诊断。
  frontend_usage: 控制管理员加载诊断页面和失败详情。
  backend_enforcement: 只有管理员和超级管理员可读取 source_file、稳定错误码和 failure_detail。
  default_roles: [ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-131, BR-AIAPP-132, BR-AIAPP-133, BR-AIAPP-134, BR-AIAPP-136, BR-AIAPP-139]
  related_user_stories: [US-AIAPP-040]

aiapp.engine_instance.read:
  module: engine
  resource: application_engine_instance
  action: read
  description: 只读查看可用于应用运行、ComfyUI 工作流导入和兼容性校验的 EngineInstance 基础状态。
  frontend_usage: 控制工作流来源实例和目标校验实例选择器。
  backend_enforcement: 只返回可见实例的标识、名称、类型、启用和健康状态，不返回 auth_config、凭证或内部连接详情。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-140, BR-AIAPP-154, BR-AIAPP-157, BR-AIAPP-162]
  related_user_stories: [US-AIAPP-041, US-AIAPP-044, US-AIAPP-045]

aiapp.engine_instance.manage:
  module: engine
  resource: application_engine_instance
  action: manage
  description: 创建、查看、更新、停用、健康检测和删除 EngineInstance。
  frontend_usage: 控制引擎实例管理和健康检测操作。
  backend_enforcement: 必须验证内置 EngineType、鉴权结构和历史运行引用；列表不得回显 auth_config。
  default_roles: [ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-140, BR-AIAPP-143]
  related_user_stories: [US-AIAPP-041]

aiapp.engine_binding.manage:
  module: engine
  resource: engine_capability_binding
  action: manage
  description: 管理 EngineInstance 与只读 ProviderCapability 的绑定及收紧限制。
  frontend_usage: 控制绑定创建、启停、限制编辑和删除。
  backend_enforcement: ProviderCapability 必须 available、EngineType 必须一致、restrictions 只能缩小能力。
  default_roles: [ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-141]
  related_user_stories: [US-AIAPP-041]

aiapp.comfyui_workflow.read:
  module: comfyui-workflow
  resource: comfyui_workflow, comfyui_workflow_validation
  action: read
  description: 查看 ComfyUI 工作流、派生解析结果和兼容性校验历史。
  frontend_usage: 控制工作流列表、详情、节点、输入输出候选、依赖和校验记录入口。
  backend_enforcement: 普通用户只能读取本人资源；管理员和超级管理员可代管读取，但必须记录操作者与资源所有者。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-153, BR-AIAPP-156, BR-AIAPP-157]
  related_user_stories: [US-AIAPP-044, US-AIAPP-045]

aiapp.comfyui_workflow.manage:
  module: comfyui-workflow
  resource: comfyui_workflow
  action: manage
  description: 导入工作流、修改元数据、归档和恢复工作流。
  frontend_usage: 控制工作流导入、名称描述编辑和归档恢复操作。
  backend_enforcement: 不允许覆盖工作流内容或来源实例；普通用户仅管理本人资源，管理员代管必须审计操作者与所有者。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-153, BR-AIAPP-154, BR-AIAPP-155, BR-AIAPP-156]
  related_user_stories: [US-AIAPP-044]

aiapp.comfyui_workflow.validate:
  module: comfyui-workflow
  resource: comfyui_workflow_validation
  action: validate
  description: 针对指定 ComfyUI EngineInstance 创建不可变兼容性校验。
  frontend_usage: 控制实例兼容性校验操作。
  backend_enforcement: 仅 active 工作流可校验；目标必须为 comfyui 实例；不得提交 prompt 或覆盖历史校验。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-156, BR-AIAPP-157, BR-AIAPP-161]
  related_user_stories: [US-AIAPP-045]

aiapp.comfyui_workflow.convert:
  module: comfyui-workflow
  resource: comfyui_workflow, application_template, application_template_version
  action: convert
  description: 将已验证工作流一次性转换为新应用模板及首个草稿版本。
  frontend_usage: 控制工作流转换入口和模板映射提交。
  backend_enforcement: 同时要求 aiapp.application.manage；验证所有权、active 状态、compatible 校验、一次性约束、幂等键和事务原子性。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-156, BR-AIAPP-158, BR-AIAPP-159, BR-AIAPP-160, BR-AIAPP-161]
  related_user_stories: [US-AIAPP-046]

aiapp.comfyui_workflow.test:
  module: comfyui-workflow
  resource: comfyui_workflow_test_run
  action: test
  description: 在健康 ComfyUI EngineInstance 上试运行本人可见的 ready API Workflow。
  frontend_usage: 控制试运行、取消、历史、任务步骤和临时预览入口。
  backend_enforcement: 普通用户只能测试本人工作流；创建 DAG 前必须即时兼容校验，预览只按服务端 output ID 代理读取。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-166, BR-AIAPP-167, BR-AIAPP-168]
  related_user_stories: [US-AIAPP-048]

aiapp.application.read:
  module: application
  resource: application
  action: read
  description: 查看当前用户有权访问的 Application、版本和公开契约。
  frontend_usage: 控制应用列表、详情和画布应用选择。
  backend_enforcement: 返回本人 private Application 和允许访问的 global Application；按 run_enabled 等能力开关过滤入口，不暴露执行凭证。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-142, BR-AIAPP-147, BR-AIAPP-148]
  related_user_stories: [US-AIAPP-042, US-AIAPP-043]

aiapp.application.manage:
  module: application
  resource: application_template, application, application_version
  action: manage
  description: 管理应用模板版本、Application 元数据和不可变语义版本。
  frontend_usage: 控制模板创建、应用创建和版本发布；ComfyUI 首版入口由工作流转换权限单独控制。
  backend_enforcement: SaaS 来源必须引用 available ProviderCapability；ComfyUI 首版必须来自原子转换，后续版本使用模板版本机制；已发布版本不可原地修改；只有管理员可设置 global visibility。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-135, BR-AIAPP-142, BR-AIAPP-144, BR-AIAPP-145, BR-AIAPP-147, BR-AIAPP-148, BR-AIAPP-159, BR-AIAPP-161]
  related_user_stories: [US-AIAPP-042, US-AIAPP-046]

aiapp.application.run:
  module: application-run
  resource: runtime_form_schema, application_run
  action: run
  description: 解析 RuntimeFormSchema、提交运行并查看本人可见的 ApplicationRun。
  frontend_usage: 控制应用运行表单、提交和运行详情。
  backend_enforcement: 按联合能力来源重新校验模板版本、Binding/Engine、输入和用户访问权后保存 ApplicationRun 快照，再幂等创建 AtomicTask；允许查看 Artifact 登记状态。
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-138, BR-AIAPP-142, BR-AIAPP-143, BR-AIAPP-145, BR-AIAPP-146, BR-AIAPP-149, BR-AIAPP-150]
  related_user_stories: [US-AIAPP-043]
