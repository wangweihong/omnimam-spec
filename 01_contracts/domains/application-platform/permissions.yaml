aiapp.adapter.read:
  description: 查看只读 ProviderAdapter 和 ProviderOperation 目录。
  resource: provider_adapter, provider_operation
  actions: [read]
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  related_user_stories: [US-AIAPP-001]
  related_rules: [BR-AIAPP-001, BR-AIAPP-049]

aiapp.template.manage_own:
  description: 管理自己的工作流模板和能力图。
  resource: app_template
  actions: [create, read, update, delete]
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  backend_enforcement: 普通用户必须是 owner_user_id；存在应用引用时不得删除。
  related_user_stories: [US-AIAPP-002, US-AIAPP-003]
  related_rules: [BR-AIAPP-006, BR-AIAPP-012, BR-AIAPP-047]

aiapp.application.manage_own:
  description: 管理自己的应用、输入映射、输出映射和固化参数。
  resource: application, input_mapping, output_mapping
  actions: [create, read, update, delete]
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  backend_enforcement: 普通用户必须是 owner_user_id；映射必须来自模板或 Operation 端口。
  related_user_stories: [US-AIAPP-003, US-AIAPP-004, US-AIAPP-005]
  related_rules: [BR-AIAPP-013, BR-AIAPP-015, BR-AIAPP-047]

aiapp.engine.manage_own:
  description: 管理自己的 AppEngine 和明文认证配置。
  resource: app_engine
  actions: [create, read, update, delete, health_check]
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  backend_enforcement: 普通用户必须是 owner_user_id；存在运行引用时只能停用。
  related_user_stories: [US-AIAPP-006]
  related_rules: [BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-028, BR-AIAPP-047]

aiapp.engine.use:
  description: 查询并使用当前用户有权使用的匹配 AppEngine。
  resource: app_engine
  actions: [discover, use]
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  backend_enforcement: 管理他人引擎的权限不自动授予 use；查询结果不得包含 auth_config。
  related_user_stories: [US-AIAPP-007, US-AIAPP-008, US-AIAPP-009]
  related_rules: [BR-AIAPP-023, BR-AIAPP-025, BR-AIAPP-026, BR-AIAPP-029]

aiapp.run.operate_own:
  description: 创建并查看自己的测试或正式应用运行。
  resource: application_run
  actions: [create_test, create_normal, read]
  default_roles: [REGULAR_USER, ADMIN, SUPER_ADMIN]
  backend_enforcement: 必须有权访问 Application，并对指定或自动选择的引擎具有 aiapp.engine.use。
  related_user_stories: [US-AIAPP-008, US-AIAPP-009, US-AIAPP-010, US-AIAPP-011]
  related_rules: [BR-AIAPP-029, BR-AIAPP-034, BR-AIAPP-036, BR-AIAPP-047]

aiapp.admin.manage_all:
  description: 管理全量模板、应用和引擎并查看全量运行。
  resource: app_template, application, input_mapping, output_mapping, app_engine, application_run
  actions: [read, update, delete, health_check]
  default_roles: [ADMIN, SUPER_ADMIN]
  backend_enforcement: 跨用户修改不得改变 owner_user_id；本权限不自动授予他人引擎的使用权。
  related_user_stories: [US-AIAPP-012]
  related_rules: [BR-AIAPP-026, BR-AIAPP-048]
