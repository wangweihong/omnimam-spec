openapi: 3.0.3
info:
  title: OmniMAM Application Platform API
  version: 1.0.0
  description: >-
    ApplicationEngineType、目录加载 ProviderCapability、EngineInstance、Binding、
    ComfyUI 工作流导入与转换、应用模板、应用版本、RuntimeFormSchema 与 ApplicationRun 的 S2 契约。
    ProviderCapability 为只读注册表资源，不提供写入或重新加载 API。
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: provider-capabilities
  - name: application-engine-types
  - name: engine-instances
  - name: engine-capability-bindings
  - name: comfyui-workflows
    description: 用户私有 ComfyUI 工作流的导入、解析、实例兼容性校验和一次性模板转换。
  - name: application-templates
  - name: applications
  - name: application-runs

paths:
  /api/v1/provider-capabilities:
    get:
      tags: [provider-capabilities]
      operationId: list_provider_capabilities
      summary: 查询只读 ProviderCapability 目录
      description: 返回可解析能力及其运行态状态，不返回来源文件路径和完整失败详情。
      x-permission: aiapp.provider_capability.read
      x-s1-refs:
        user_stories: [US-AIAPP-039, US-AIAPP-040]
        business_rules: [BR-AIAPP-130, BR-AIAPP-135, BR-AIAPP-136, BR-AIAPP-139]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
        - $ref: '#/components/parameters/search_fields'
        - $ref: '#/components/parameters/sort_field'
        - $ref: '#/components/parameters/sort_order'
        - name: application_engine_type_id
          in: query
          schema: {type: string}
        - name: availability
          in: query
          schema: {$ref: '#/components/schemas/ProviderCapabilityAvailability'}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderCapabilityListResponse'}

  /api/v1/provider-capabilities/{provider_capability_id}:
    get:
      tags: [provider-capabilities]
      operationId: get_provider_capability
      summary: 查询 ProviderCapability 详情
      x-permission: aiapp.provider_capability.read
      x-s1-refs:
        user_stories: [US-AIAPP-039, US-AIAPP-040]
        business_rules: [BR-AIAPP-130, BR-AIAPP-135, BR-AIAPP-136]
      parameters:
        - $ref: '#/components/parameters/provider_capability_id'
      responses:
        '200':
          description: 返回能力详情或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ProviderCapability'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/provider-capability-load-results:
    get:
      tags: [provider-capabilities]
      operationId: list_provider_capability_load_results
      summary: 查询启动加载诊断
      description: 仅管理员可读取目录与文件路径、稳定错误码和完整失败详情。
      x-permission: aiapp.provider_capability.read_diagnostics
      x-s1-refs:
        user_stories: [US-AIAPP-040]
        business_rules: [BR-AIAPP-131, BR-AIAPP-132, BR-AIAPP-133, BR-AIAPP-134, BR-AIAPP-139]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - name: result
          in: query
          schema: {type: string, enum: [loaded, disabled, failed]}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderCapabilityLoadResultListResponse'}

  /api/v1/application-engine-types:
    get:
      tags: [application-engine-types]
      operationId: list_application_engine_types
      summary: 查询系统内置 ApplicationEngineType
      x-permission: aiapp.provider_capability.read
      x-s1-refs:
        user_stories: [US-AIAPP-039, US-AIAPP-041]
        business_rules: [BR-AIAPP-135, BR-AIAPP-140, BR-AIAPP-151]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApplicationEngineTypeListResponse'}

  /api/v1/engine-instances:
    get:
      tags: [engine-instances]
      operationId: list_engine_instances
      summary: 查询 ApplicationEngineInstance
      x-permission: aiapp.engine_instance.read
      x-s1-refs:
        user_stories: [US-AIAPP-041, US-AIAPP-044, US-AIAPP-045]
        business_rules: [BR-AIAPP-140, BR-AIAPP-162]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
        - $ref: '#/components/parameters/sort_field'
        - $ref: '#/components/parameters/sort_order'
        - name: application_engine_type_id
          in: query
          schema: {type: string}
        - name: health_status
          in: query
          schema: {$ref: '#/components/schemas/EngineHealthStatus'}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EngineInstanceListResponse'}
    post:
      tags: [engine-instances]
      operationId: create_engine_instance
      summary: 创建 ApplicationEngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EngineInstanceCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineInstance'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/engine-instances/{engine_instance_id}:
    get:
      tags: [engine-instances]
      operationId: get_engine_instance
      summary: 查询 ApplicationEngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      parameters: [{$ref: '#/components/parameters/engine_instance_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineInstance'
                  - $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [engine-instances]
      operationId: update_engine_instance
      summary: 更新 ApplicationEngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      parameters: [{$ref: '#/components/parameters/engine_instance_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EngineInstanceUpdateRequest'}
      responses:
        '200':
          description: 更新结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineInstance'
                  - $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [engine-instances]
      operationId: delete_engine_instance
      summary: 删除未被历史运行引用的 EngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140, BR-AIAPP-143]
      parameters: [{$ref: '#/components/parameters/engine_instance_id'}]
      responses:
        '200':
          description: 删除结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DeleteResult'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/engine-instances/{engine_instance_id}/health-check:
    post:
      tags: [engine-instances]
      operationId: check_engine_instance_health
      summary: 执行并保存实例健康检测
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      parameters: [{$ref: '#/components/parameters/engine_instance_id'}]
      responses:
        '200':
          description: 健康检测结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineHealthCheckResult'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/engine-capability-bindings:
    get:
      tags: [engine-capability-bindings]
      operationId: list_engine_capability_bindings
      summary: 查询 EngineCapabilityBinding
      x-permission: aiapp.engine_binding.manage
      x-s1-refs:
        user_stories: [US-AIAPP-040, US-AIAPP-041]
        business_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-141]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - name: engine_instance_id
          in: query
          schema: {type: string}
        - name: provider_capability_id
          in: query
          schema: {type: string}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EngineCapabilityBindingListResponse'}
    post:
      tags: [engine-capability-bindings]
      operationId: create_engine_capability_binding
      summary: 创建 EngineCapabilityBinding
      x-permission: aiapp.engine_binding.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-141]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EngineCapabilityBindingCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineCapabilityBinding'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/engine-capability-bindings/{binding_id}:
    patch:
      tags: [engine-capability-bindings]
      operationId: update_engine_capability_binding
      summary: 更新绑定的启用状态或收紧限制
      x-permission: aiapp.engine_binding.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-137, BR-AIAPP-141]
      parameters: [{$ref: '#/components/parameters/binding_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EngineCapabilityBindingUpdateRequest'}
      responses:
        '200':
          description: 更新结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineCapabilityBinding'
                  - $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [engine-capability-bindings]
      operationId: delete_engine_capability_binding
      summary: 删除 EngineCapabilityBinding
      x-permission: aiapp.engine_binding.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-137, BR-AIAPP-141]
      parameters: [{$ref: '#/components/parameters/binding_id'}]
      responses:
        '200':
          description: 删除结果。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DeleteResult'}

  /api/v1/comfyui-workflows:
    get:
      tags: [comfyui-workflows]
      operationId: list_comfyui_workflows
      summary: 查询当前用户的 ComfyUI 工作流
      description: 普通用户仅返回本人资源；管理员可使用 owner_user_id 代管筛选。
      x-permission: aiapp.comfyui_workflow.read
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-153, BR-AIAPP-155, BR-AIAPP-156]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
        - $ref: '#/components/parameters/search_fields'
        - $ref: '#/components/parameters/sort_field'
        - $ref: '#/components/parameters/sort_order'
        - $ref: '#/components/parameters/created_after'
        - $ref: '#/components/parameters/created_before'
        - name: lifecycle_status
          in: query
          schema: {$ref: '#/components/schemas/ComfyUIWorkflowLifecycleStatus'}
        - name: parse_status
          in: query
          schema: {$ref: '#/components/schemas/ComfyUIWorkflowParseStatus'}
        - name: latest_validation_status
          in: query
          schema: {$ref: '#/components/schemas/ComfyUIWorkflowLatestValidationStatus'}
        - name: converted
          in: query
          schema: {type: boolean}
        - name: source_engine_instance_id
          in: query
          schema: {type: string}
        - name: owner_user_id
          in: query
          description: 仅管理员和超级管理员可用。
          schema: {type: string}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ComfyUIWorkflowListResponse'}
    post:
      tags: [comfyui-workflows]
      operationId: import_comfyui_workflow
      summary: 导入 ComfyUI 工作流
      x-permission: aiapp.comfyui_workflow.manage
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-153, BR-AIAPP-154, BR-AIAPP-155]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: {$ref: '#/components/schemas/ComfyUIWorkflowImportRequest'}
      responses:
        '200':
          description: 导入结果、重复内容提示或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowImportResult'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}:
    get:
      tags: [comfyui-workflows]
      operationId: get_comfyui_workflow
      summary: 查询 ComfyUI 工作流详情
      x-permission: aiapp.comfyui_workflow.read
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-155, BR-AIAPP-156]
      parameters: [{$ref: '#/components/parameters/workflow_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowDetail'
                  - $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [comfyui-workflows]
      operationId: update_comfyui_workflow_metadata
      summary: 修改 ComfyUI 工作流名称或描述
      x-permission: aiapp.comfyui_workflow.manage
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-155, BR-AIAPP-156]
      parameters: [{$ref: '#/components/parameters/workflow_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ComfyUIWorkflowUpdateRequest'}
      responses:
        '200':
          description: 更新结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflow'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}/archive:
    post:
      tags: [comfyui-workflows]
      operationId: archive_comfyui_workflow
      summary: 归档 ComfyUI 工作流
      x-permission: aiapp.comfyui_workflow.manage
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-155, BR-AIAPP-156]
      parameters: [{$ref: '#/components/parameters/workflow_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ResourceVersionRequest'}
      responses:
        '200':
          description: 归档结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflow'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}/restore:
    post:
      tags: [comfyui-workflows]
      operationId: restore_comfyui_workflow
      summary: 恢复 ComfyUI 工作流
      x-permission: aiapp.comfyui_workflow.manage
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-155, BR-AIAPP-156]
      parameters: [{$ref: '#/components/parameters/workflow_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ResourceVersionRequest'}
      responses:
        '200':
          description: 恢复结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflow'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}/nodes:
    get:
      tags: [comfyui-workflows]
      operationId: list_comfyui_workflow_nodes
      summary: 查询工作流节点解析结果
      x-permission: aiapp.comfyui_workflow.read
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-153, BR-AIAPP-156]
      parameters:
        - $ref: '#/components/parameters/workflow_id'
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
      responses:
        '200':
          description: 查询完成或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowNodeListResponse'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}/input-candidates:
    get:
      tags: [comfyui-workflows]
      operationId: list_comfyui_workflow_input_candidates
      summary: 查询工作流输入候选
      x-permission: aiapp.comfyui_workflow.read
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-153, BR-AIAPP-156]
      parameters: [{$ref: '#/components/parameters/workflow_id'}]
      responses:
        '200':
          description: 查询完成或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowInputCandidateListResponse'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}/output-candidates:
    get:
      tags: [comfyui-workflows]
      operationId: list_comfyui_workflow_output_candidates
      summary: 查询工作流输出候选
      x-permission: aiapp.comfyui_workflow.read
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-153, BR-AIAPP-156]
      parameters: [{$ref: '#/components/parameters/workflow_id'}]
      responses:
        '200':
          description: 查询完成或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowOutputCandidateListResponse'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}/dependencies:
    get:
      tags: [comfyui-workflows]
      operationId: list_comfyui_workflow_dependencies
      summary: 查询工作流运行依赖
      x-permission: aiapp.comfyui_workflow.read
      x-s1-refs:
        user_stories: [US-AIAPP-044]
        business_rules: [BR-AIAPP-153, BR-AIAPP-156]
      parameters: [{$ref: '#/components/parameters/workflow_id'}]
      responses:
        '200':
          description: 查询完成或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowDependencyListResponse'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}/validations:
    get:
      tags: [comfyui-workflows]
      operationId: list_comfyui_workflow_validations
      summary: 查询工作流兼容性校验历史
      x-permission: aiapp.comfyui_workflow.read
      x-s1-refs:
        user_stories: [US-AIAPP-045]
        business_rules: [BR-AIAPP-156, BR-AIAPP-157]
      parameters:
        - $ref: '#/components/parameters/workflow_id'
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/sort_field'
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: 查询完成或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowValidationListResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [comfyui-workflows]
      operationId: validate_comfyui_workflow
      summary: 对目标 ComfyUI 实例执行兼容性校验
      description: 重新读取目标实例 object_info 并保存不可变结果，不提交 /prompt。
      x-permission: aiapp.comfyui_workflow.validate
      x-s1-refs:
        user_stories: [US-AIAPP-045]
        business_rules: [BR-AIAPP-156, BR-AIAPP-157, BR-AIAPP-158, BR-AIAPP-161]
      parameters: [{$ref: '#/components/parameters/workflow_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ComfyUIWorkflowValidationCreateRequest'}
      responses:
        '200':
          description: 校验结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowValidation'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflow-validations/{workflow_validation_id}:
    get:
      tags: [comfyui-workflows]
      operationId: get_comfyui_workflow_validation
      summary: 查询兼容性校验详情
      x-permission: aiapp.comfyui_workflow.read
      x-s1-refs:
        user_stories: [US-AIAPP-045]
        business_rules: [BR-AIAPP-156, BR-AIAPP-157]
      parameters: [{$ref: '#/components/parameters/workflow_validation_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ComfyUIWorkflowValidation'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/comfyui-workflows/{workflow_id}/convert-to-application-template:
    post:
      tags: [comfyui-workflows]
      operationId: convert_comfyui_workflow_to_application_template
