openapi: 3.0.3
info:
  title: OmniMAM Application Platform API
  version: 0.8.0-draft
  description: >-
    ApplicationEngineType、目录加载 ProviderCapability、EngineInstance、Binding、
    应用模板、应用版本、RuntimeFormSchema 与 ApplicationRun 的 S2 契约。
    ProviderCapability 为只读注册表资源，不提供写入或重新加载 API。
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: provider-capabilities
  - name: application-engine-types
  - name: engine-instances
  - name: engine-capability-bindings
  - name: application-templates
  - name: applications
  - name: application-runs

paths:
  /api/v1/provider-capabilities:
    get:
      tags: [provider-capabilities]
      operationId: list_provider_capabilities
      summary: 查询只读 ProviderCapability 目录
      description: 返回可解析能力及其运行态状态，不返回来源文件路径和完整失败详情。
      x-permission: aiapp.provider_capability.read
      x-s1-refs:
        user_stories: [US-AIAPP-039, US-AIAPP-040]
        business_rules: [BR-AIAPP-130, BR-AIAPP-135, BR-AIAPP-136, BR-AIAPP-139]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
        - $ref: '#/components/parameters/search_fields'
        - $ref: '#/components/parameters/sort_field'
        - $ref: '#/components/parameters/sort_order'
        - name: application_engine_type_id
          in: query
          schema: {type: string}
        - name: availability
          in: query
          schema: {$ref: '#/components/schemas/ProviderCapabilityAvailability'}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderCapabilityListResponse'}

  /api/v1/provider-capabilities/{provider_capability_id}:
    get:
      tags: [provider-capabilities]
      operationId: get_provider_capability
      summary: 查询 ProviderCapability 详情
      x-permission: aiapp.provider_capability.read
      x-s1-refs:
        user_stories: [US-AIAPP-039, US-AIAPP-040]
        business_rules: [BR-AIAPP-130, BR-AIAPP-135, BR-AIAPP-136]
      parameters:
        - $ref: '#/components/parameters/provider_capability_id'
      responses:
        '200':
          description: 返回能力详情或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ProviderCapability'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/provider-capability-load-results:
    get:
      tags: [provider-capabilities]
      operationId: list_provider_capability_load_results
      summary: 查询启动加载诊断
      description: 仅管理员可读取目录与文件路径、稳定错误码和完整失败详情。
      x-permission: aiapp.provider_capability.read_diagnostics
      x-s1-refs:
        user_stories: [US-AIAPP-040]
        business_rules: [BR-AIAPP-131, BR-AIAPP-132, BR-AIAPP-133, BR-AIAPP-134, BR-AIAPP-139]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - name: result
          in: query
          schema: {type: string, enum: [loaded, disabled, failed]}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderCapabilityLoadResultListResponse'}

  /api/v1/application-engine-types:
    get:
      tags: [application-engine-types]
      operationId: list_application_engine_types
      summary: 查询系统内置 ApplicationEngineType
      x-permission: aiapp.provider_capability.read
      x-s1-refs:
        user_stories: [US-AIAPP-039, US-AIAPP-041]
        business_rules: [BR-AIAPP-135, BR-AIAPP-140, BR-AIAPP-151]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApplicationEngineTypeListResponse'}

  /api/v1/engine-instances:
    get:
      tags: [engine-instances]
      operationId: list_engine_instances
      summary: 查询 ApplicationEngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
        - $ref: '#/components/parameters/sort_field'
        - $ref: '#/components/parameters/sort_order'
        - name: application_engine_type_id
          in: query
          schema: {type: string}
        - name: health_status
          in: query
          schema: {$ref: '#/components/schemas/EngineHealthStatus'}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EngineInstanceListResponse'}
    post:
      tags: [engine-instances]
      operationId: create_engine_instance
      summary: 创建 ApplicationEngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EngineInstanceCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineInstance'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/engine-instances/{engine_instance_id}:
    get:
      tags: [engine-instances]
      operationId: get_engine_instance
      summary: 查询 ApplicationEngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      parameters: [{$ref: '#/components/parameters/engine_instance_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineInstance'
                  - $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [engine-instances]
      operationId: update_engine_instance
      summary: 更新 ApplicationEngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      parameters: [{$ref: '#/components/parameters/engine_instance_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EngineInstanceUpdateRequest'}
      responses:
        '200':
          description: 更新结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineInstance'
                  - $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [engine-instances]
      operationId: delete_engine_instance
      summary: 删除未被历史运行引用的 EngineInstance
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140, BR-AIAPP-143]
      parameters: [{$ref: '#/components/parameters/engine_instance_id'}]
      responses:
        '200':
          description: 删除结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DeleteResult'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/engine-instances/{engine_instance_id}/health-check:
    post:
      tags: [engine-instances]
      operationId: check_engine_instance_health
      summary: 执行并保存实例健康检测
      x-permission: aiapp.engine_instance.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-140]
      parameters: [{$ref: '#/components/parameters/engine_instance_id'}]
      responses:
        '200':
          description: 健康检测结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineHealthCheckResult'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/engine-capability-bindings:
    get:
      tags: [engine-capability-bindings]
      operationId: list_engine_capability_bindings
      summary: 查询 EngineCapabilityBinding
      x-permission: aiapp.engine_binding.manage
      x-s1-refs:
        user_stories: [US-AIAPP-040, US-AIAPP-041]
        business_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-141]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - name: engine_instance_id
          in: query
          schema: {type: string}
        - name: provider_capability_id
          in: query
          schema: {type: string}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EngineCapabilityBindingListResponse'}
    post:
      tags: [engine-capability-bindings]
      operationId: create_engine_capability_binding
      summary: 创建 EngineCapabilityBinding
      x-permission: aiapp.engine_binding.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-141]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EngineCapabilityBindingCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineCapabilityBinding'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/engine-capability-bindings/{binding_id}:
    patch:
      tags: [engine-capability-bindings]
      operationId: update_engine_capability_binding
      summary: 更新绑定的启用状态或收紧限制
      x-permission: aiapp.engine_binding.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-137, BR-AIAPP-141]
      parameters: [{$ref: '#/components/parameters/binding_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EngineCapabilityBindingUpdateRequest'}
      responses:
        '200':
          description: 更新结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EngineCapabilityBinding'
                  - $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [engine-capability-bindings]
      operationId: delete_engine_capability_binding
      summary: 删除 EngineCapabilityBinding
      x-permission: aiapp.engine_binding.manage
      x-s1-refs:
        user_stories: [US-AIAPP-041]
        business_rules: [BR-AIAPP-137, BR-AIAPP-141]
      parameters: [{$ref: '#/components/parameters/binding_id'}]
      responses:
        '200':
          description: 删除结果。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DeleteResult'}

  /api/v1/application-templates:
    get:
      tags: [application-templates]
      operationId: list_application_templates
      summary: 查询应用模板
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-142, BR-AIAPP-144]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApplicationTemplateListResponse'}
    post:
      tags: [application-templates]
      operationId: create_application_template
      summary: 从 ComfyUI 工作流或 SaaS 能力创建模板草稿
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-135, BR-AIAPP-142, BR-AIAPP-144]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ApplicationTemplateCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationTemplate'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/application-templates/{application_template_id}:
    get:
      tags: [application-templates]
      operationId: get_application_template
      summary: 查询应用模板及当前发布版本
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-142, BR-AIAPP-144, BR-AIAPP-145, BR-AIAPP-147]
      parameters: [{$ref: '#/components/parameters/application_template_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationTemplate'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/application-templates/{application_template_id}/versions:
    get:
      tags: [application-templates]
      operationId: list_application_template_versions
      summary: 查询应用模板版本
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-142, BR-AIAPP-147]
      parameters:
        - $ref: '#/components/parameters/application_template_id'
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/sort_field'
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApplicationTemplateVersionListResponse'}
    post:
      tags: [application-templates]
      operationId: create_application_template_version
      summary: 创建应用模板草稿版本
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-142, BR-AIAPP-144, BR-AIAPP-145, BR-AIAPP-147]
      parameters: [{$ref: '#/components/parameters/application_template_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ApplicationTemplateVersionCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationTemplateVersion'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/application-template-versions/{application_template_version_id}:
    get:
      tags: [application-templates]
      operationId: get_application_template_version
      summary: 查询应用模板版本
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-142, BR-AIAPP-147]
      parameters: [{$ref: '#/components/parameters/application_template_version_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationTemplateVersion'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/application-template-versions/{application_template_version_id}/publish:
    post:
      tags: [application-templates]
      operationId: publish_application_template_version
      summary: 校验并发布应用模板版本
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-135, BR-AIAPP-142, BR-AIAPP-144, BR-AIAPP-145, BR-AIAPP-147]
      parameters: [{$ref: '#/components/parameters/application_template_version_id'}]
      responses:
        '200':
          description: 发布结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationTemplateVersion'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/applications:
    get:
      tags: [applications]
      operationId: list_applications
      summary: 查询应用
      x-permission: aiapp.application.read
      x-s1-refs:
        user_stories: [US-AIAPP-042, US-AIAPP-043]
        business_rules: [BR-AIAPP-142, BR-AIAPP-148]
      parameters:
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/keyword'
        - name: capability_definition_id
          in: query
          schema: {type: string}
        - name: visibility
          in: query
          schema: {type: string, enum: [private, global]}
        - name: run_enabled
          in: query
          schema: {type: boolean}
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApplicationListResponse'}
    post:
      tags: [applications]
      operationId: create_application
      summary: 创建应用
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-135, BR-AIAPP-142, BR-AIAPP-148]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ApplicationCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Application'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/applications/{application_id}:
    get:
      tags: [applications]
      operationId: get_application
      summary: 查询应用详情
      x-permission: aiapp.application.read
      x-s1-refs:
        user_stories: [US-AIAPP-042, US-AIAPP-043]
        business_rules: [BR-AIAPP-142, BR-AIAPP-148]
      parameters: [{$ref: '#/components/parameters/application_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Application'
                  - $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [applications]
      operationId: update_application
      summary: 更新应用元数据和能力开关
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-142, BR-AIAPP-148]
      parameters: [{$ref: '#/components/parameters/application_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ApplicationUpdateRequest'}
      responses:
        '200':
          description: 更新结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Application'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/applications/{application_id}/versions:
    get:
      tags: [applications]
      operationId: list_application_versions
      summary: 查询应用版本
      x-permission: aiapp.application.read
      x-s1-refs:
        user_stories: [US-AIAPP-042, US-AIAPP-043]
        business_rules: [BR-AIAPP-142, BR-AIAPP-147]
      parameters:
        - $ref: '#/components/parameters/application_id'
        - $ref: '#/components/parameters/page_num'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/sort_field'
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: 查询完成。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApplicationVersionListResponse'}
    post:
      tags: [applications]
      operationId: create_application_version
      summary: 创建不可变 ApplicationVersion
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-137, BR-AIAPP-142]
      parameters: [{$ref: '#/components/parameters/application_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ApplicationVersionCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationVersion'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/application-versions/{application_version_id}:
    get:
      tags: [applications]
      operationId: get_application_version
      summary: 查询应用版本
      x-permission: aiapp.application.read
      x-s1-refs:
        user_stories: [US-AIAPP-042, US-AIAPP-043]
        business_rules: [BR-AIAPP-142, BR-AIAPP-147]
      parameters: [{$ref: '#/components/parameters/application_version_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationVersion'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/application-versions/{application_version_id}/publish:
    post:
      tags: [applications]
      operationId: publish_application_version
      summary: 校验并发布语义版本
      x-permission: aiapp.application.manage
      x-s1-refs:
        user_stories: [US-AIAPP-042]
        business_rules: [BR-AIAPP-142, BR-AIAPP-147]
      parameters: [{$ref: '#/components/parameters/application_version_id'}]
      responses:
        '200':
          description: 发布结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationVersion'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/applications/{application_id}/runtime-form:
    post:
      tags: [applications]
      operationId: resolve_application_runtime_form
      summary: 解析当前 RuntimeFormSchema
      x-permission: aiapp.application.run
      x-s1-refs:
        user_stories: [US-AIAPP-043]
        business_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-142, BR-AIAPP-145, BR-AIAPP-146]
      parameters: [{$ref: '#/components/parameters/application_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RuntimeFormResolveRequest'}
      responses:
        '200':
          description: 解析结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RuntimeFormSchema'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/applications/{application_id}/runs:
    post:
      tags: [application-runs]
      operationId: create_application_run
      summary: 创建 ApplicationRun 并请求 TaskRun
      x-permission: aiapp.application.run
      x-s1-refs:
        user_stories: [US-AIAPP-043]
        business_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-138, BR-AIAPP-143, BR-AIAPP-145, BR-AIAPP-149, BR-AIAPP-150]
      parameters: [{$ref: '#/components/parameters/application_id'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ApplicationRunCreateRequest'}
      responses:
        '200':
          description: 创建结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationRun'
                  - $ref: '#/components/schemas/ErrorResponse'

  /api/v1/application-runs/{application_run_id}:
