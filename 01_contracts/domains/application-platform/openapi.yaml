      properties:
        id: {type: string}
        application_id: {type: string}
        application_version_id: {type: string}
        application_template_version_id: {type: string}
        task_run_id: {type: string, nullable: true}
        engine_instance_id: {type: string}
        capability_source_type: {$ref: '#/components/schemas/CapabilitySourceType'}
        source_revision: {type: string}
        provider_capability_id: {type: string, nullable: true}
        provider_capability_revision: {type: string, nullable: true}
        provider_operation_id: {type: string, nullable: true}
        workflow_contract_revision: {type: string, nullable: true}
        input_snapshot: {type: object, additionalProperties: true}
        execution_snapshot: {type: object, additionalProperties: true}
        output_mapping_snapshot: {type: object, additionalProperties: true}
        task_creation_status: {type: string, enum: [pending, created, failed]}
        task_creation_failure: {type: string, nullable: true}
        task_status_projection: {type: string, nullable: true}
        task_resource_version: {type: integer, minimum: 0}
        output_values: {type: array, items: {type: object, additionalProperties: true}}
        artifacts: {type: array, items: {$ref: '#/components/schemas/ApplicationArtifact'}}
        failure_summary: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        resource_version: {type: integer}
      oneOf:
        - required: [provider_capability_id, provider_capability_revision, provider_operation_id]
          properties:
            capability_source_type: {enum: [provider_capability]}
        - required: [workflow_contract_revision]
          properties:
            capability_source_type: {enum: [comfyui_workflow]}
    ApplicationArtifact:
      type: object
      required: [id, application_run_id, output_key, owner_user_id, media_type, content_ref, registration_status, created_at, updated_at, resource_version]
      properties:
        id: {type: string}
        application_run_id: {type: string}
        output_key: {type: string}
        owner_user_id: {type: string}
        media_type: {type: string, enum: [image, video, audio, text, pdf, other]}
        content_ref: {type: string}
        registration_status: {type: string, enum: [pending, registered, failed]}
        asset_id: {type: string, nullable: true}
        registration_error_code: {type: string, nullable: true}
        registration_failure_detail: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        resource_version: {type: integer}
    DeleteResult:
      type: object
      required: [id, deleted]
      properties:
        id: {type: string}
        deleted: {type: boolean}
    ErrorResponse:
      type: object
      required: [code, value, message, messages, retryable]
      properties:
        code: {type: string}
        value: {type: integer}
        message: {type: string}
        messages:
          type: object
          required: [zh-CN, en-US]
          properties:
            zh-CN: {type: string}
            en-US: {type: string}
        detail: {type: string}
        retryable: {type: boolean}
        data: {type: object, additionalProperties: true}
