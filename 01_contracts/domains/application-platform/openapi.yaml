            - required: [auth_config]
              properties:
                auth_type: {type: string, enum: [api_key]}
                auth_config: {$ref: '#/components/schemas/ApiKeyAuthConfig'}
            - required: [auth_config]
              properties:
                auth_type: {type: string, enum: [bearer_token]}
