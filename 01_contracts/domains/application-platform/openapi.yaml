openapi: 3.0.3
info:
  title: OmniMAM AI Application Platform API
  version: 0.4.0-draft
  description: AI 应用平台第一阶段 S2 API 契约，覆盖模板管理、应用管理、字段映射、用户级应用引擎和应用运行。
servers:
  - url: /api/v1
tags:
  - name: templates
    description: 应用模板管理。
  - name: applications
    description: 应用管理。
  - name: field-mappings
    description: 字段映射管理。
  - name: app-engines
    description: 用户应用引擎管理与健康检测。
  - name: application-runs
    description: 应用运行与 task-center TaskRun 协作。

paths:
  /api/v1/app-templates:
    get:
      tags: [templates]
      summary: 查询应用模板列表
      operationId: list_app_templates
      x-s1-refs:
        user_stories: [US-AIAPP-003, US-AIAPP-009]
        business_rules: [BR-AIAPP-001, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
        - name: kind
          in: query
          schema:
            $ref: "#/components/schemas/TemplateKind"
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [name, created_at, updated_at, kind]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 应用模板列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTemplateListResponse"
    post:
      tags: [templates]
      summary: 创建应用模板
      operationId: create_app_template
      x-s1-refs:
        user_stories: [US-AIAPP-001, US-AIAPP-002]
        business_rules: [BR-AIAPP-001, BR-AIAPP-002, BR-AIAPP-003, BR-AIAPP-004, BR-AIAPP-005]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppTemplateCreateRequest"
      responses:
        "200":
          description: 应用模板详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTemplate"

  /api/v1/app-templates/{template_id}:
    get:
      tags: [templates]
      summary: 获取应用模板详情
      operationId: get_app_template
      x-s1-refs:
        user_stories: [US-AIAPP-003, US-AIAPP-007, US-AIAPP-009]
        business_rules: [BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/template_id"
      responses:
        "200":
          description: 应用模板详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTemplate"
    patch:
      tags: [templates]
      summary: 更新应用模板元数据
      operationId: update_app_template
      x-s1-refs:
        user_stories: [US-AIAPP-003]
        business_rules: [BR-AIAPP-006, BR-AIAPP-007, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/template_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppTemplateUpdateRequest"
      responses:
        "200":
          description: 应用模板详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTemplate"
    delete:
      tags: [templates]
      summary: 删除应用模板
      operationId: delete_app_template
      x-s1-refs:
        user_stories: [US-AIAPP-008]
        business_rules: [BR-AIAPP-008, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/template_id"
      responses:
        "200":
          description: 删除成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/v1/app-templates/{template_id}/references:
    get:
      tags: [templates]
      summary: 查询模板引用关系
      operationId: list_app_template_references
      x-s1-refs:
        user_stories: [US-AIAPP-007, US-AIAPP-008]
        business_rules: [BR-AIAPP-008]
      parameters:
        - $ref: "#/components/parameters/template_id"
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [name, created_at, updated_at, kind]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 引用该模板的应用列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"

  /api/v1/applications:
    get:
      tags: [applications]
      summary: 查询应用列表
      operationId: list_applications
      x-s1-refs:
        user_stories: [US-AIAPP-004, US-AIAPP-009]
        business_rules: [BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023, BR-AIAPP-026, BR-AIAPP-027]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
        - name: kind
          in: query
          schema:
            $ref: "#/components/schemas/TemplateKind"
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [name, created_at, updated_at, kind]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 应用列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"
    post:
      tags: [applications]
      summary: 基于模板创建正式应用
      operationId: create_application
      x-s1-refs:
        user_stories: [US-AIAPP-004]
        business_rules: [BR-AIAPP-010, BR-AIAPP-011, BR-AIAPP-012, BR-AIAPP-013, BR-AIAPP-016, BR-AIAPP-019]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationCreateRequest"
      responses:
        "200":
          description: 应用详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /api/v1/applications/{application_id}:
    get:
      tags: [applications]
      summary: 获取应用详情
      operationId: get_application
      x-s1-refs:
        user_stories: [US-AIAPP-004, US-AIAPP-007, US-AIAPP-009]
        business_rules: [BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023, BR-AIAPP-026, BR-AIAPP-027]
      parameters:
        - $ref: "#/components/parameters/application_id"
      responses:
        "200":
          description: 应用详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    patch:
      tags: [applications]
      summary: 更新应用
      operationId: update_application
      x-s1-refs:
        user_stories: [US-AIAPP-005, US-AIAPP-009]
        business_rules: [BR-AIAPP-014, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023, BR-AIAPP-024]
      parameters:
        - $ref: "#/components/parameters/application_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdateRequest"
      responses:
        "200":
          description: 应用详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    delete:
      tags: [applications]
      summary: 删除应用
      operationId: delete_application
      x-s1-refs:
        user_stories: [US-AIAPP-006]
        business_rules: [BR-AIAPP-015, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023, BR-AIAPP-061]
      parameters:
        - $ref: "#/components/parameters/application_id"
      responses:
        "200":
          description: 删除成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/v1/applications/{application_id}/runs:
    post:
      tags: [application-runs]
      summary: 运行应用
      operationId: create_application_run
      x-s1-refs:
        user_stories: [US-AIAPP-013]
        business_rules: [BR-AIAPP-037, BR-AIAPP-047, BR-AIAPP-049, BR-AIAPP-050, BR-AIAPP-051, BR-AIAPP-052, BR-AIAPP-054]
      parameters:
        - $ref: "#/components/parameters/application_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationRunCreateRequest"
      responses:
        "200":
          description: 应用运行详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationRun"

  /api/v1/application-runs:
    get:
      tags: [application-runs]
      summary: 查询应用运行列表
      operationId: list_application_runs
      x-s1-refs:
        user_stories: [US-AIAPP-013]
        business_rules: [BR-AIAPP-050, BR-AIAPP-053, BR-AIAPP-054]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ApplicationRunStatus"
        - name: application_id
          in: query
          schema:
            type: string
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [created_at, updated_at, status, kind]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 应用运行列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationRunListResponse"

  /api/v1/application-runs/{run_id}:
    get:
      tags: [application-runs]
      summary: 获取应用运行详情
      operationId: get_application_run
      x-s1-refs:
        user_stories: [US-AIAPP-013]
        business_rules: [BR-AIAPP-050, BR-AIAPP-053, BR-AIAPP-054]
      parameters:
        - $ref: "#/components/parameters/run_id"
      responses:
        "200":
          description: 应用运行详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationRun"

  /api/v1/applications/{application_id}/field-mappings:
    get:
      tags: [field-mappings]
      summary: 查询应用字段映射
      operationId: list_field_mappings
      x-s1-refs:
        user_stories: [US-AIAPP-005]
        business_rules: [BR-AIAPP-016, BR-AIAPP-017, BR-AIAPP-018, BR-AIAPP-019]
      parameters:
        - $ref: "#/components/parameters/application_id"
        - name: sort_field
          in: query
          description: 排序字段；默认按 sort_order 排序。
          schema:
            type: string
            enum: [sort_order, field_key, field_label, field_type, source_path]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 字段映射列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldMappingListResponse"
    put:
      tags: [field-mappings]
      summary: 整体保存应用字段映射
      operationId: save_field_mappings
      x-s1-refs:
        user_stories: [US-AIAPP-005]
        business_rules: [BR-AIAPP-014, BR-AIAPP-016, BR-AIAPP-017, BR-AIAPP-018, BR-AIAPP-019]
      parameters:
        - $ref: "#/components/parameters/application_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldMappingSaveRequest"
      responses:
        "200":
          description: 字段映射列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldMappingListResponse"

  /api/v1/app-engines:
    get:
      tags: [app-engines]
      summary: 查询应用引擎列表
      operationId: list_app_engines
      x-s1-refs:
        user_stories: [US-AIAPP-010, US-AIAPP-011]
        business_rules: [BR-AIAPP-028, BR-AIAPP-029, BR-AIAPP-030, BR-AIAPP-031, BR-AIAPP-032, BR-AIAPP-035]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
        - name: engine_type
          in: query
          schema:
            $ref: "#/components/schemas/AppEngineType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AppEngineStatus"
        - name: health_status
          in: query
          schema:
            $ref: "#/components/schemas/AppEngineHealthStatus"
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [name, created_at, updated_at, engine_type, status, health_status, last_health_check_at]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 应用引擎列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngineListResponse"
    post:
      tags: [app-engines]
      summary: 创建应用引擎
      operationId: create_app_engine
      x-s1-refs:
        user_stories: [US-AIAPP-010]
        business_rules: [BR-AIAPP-028, BR-AIAPP-029, BR-AIAPP-031, BR-AIAPP-032]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppEngineCreateRequest"
      responses:
        "200":
          description: 应用引擎详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngine"

  /api/v1/app-engines/health-check:
    post:
      tags: [app-engines]
      summary: 使用临时连接参数检测应用引擎健康状态
      operationId: check_app_engine_health_by_config
      x-s1-refs:
        user_stories: [US-AIAPP-011]
        business_rules: [BR-AIAPP-034, BR-AIAPP-058, BR-AIAPP-059, BR-AIAPP-060]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppEngineHealthCheckRequest"
      responses:
        "200":
          description: 临时健康检测结果；不创建或更新 AppEngine。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngineHealthCheckResult"

  /api/v1/app-engines/{app_engine_id}:
    get:
      tags: [app-engines]
      summary: 获取应用引擎详情
      operationId: get_app_engine
      x-s1-refs:
        user_stories: [US-AIAPP-010, US-AIAPP-011]
        business_rules: [BR-AIAPP-029, BR-AIAPP-030, BR-AIAPP-032]
      parameters:
        - $ref: "#/components/parameters/app_engine_id"
      responses:
        "200":
          description: 应用引擎详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngine"
    patch:
      tags: [app-engines]
      summary: 更新应用引擎
      operationId: update_app_engine
      x-s1-refs:
        user_stories: [US-AIAPP-010]
        business_rules: [BR-AIAPP-029, BR-AIAPP-030, BR-AIAPP-031, BR-AIAPP-032]
      parameters:
        - $ref: "#/components/parameters/app_engine_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppEngineUpdateRequest"
      responses:
        "200":
          description: 应用引擎详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngine"
    delete:
      tags: [app-engines]
      summary: 删除应用引擎
      operationId: delete_app_engine
      x-s1-refs:
        user_stories: [US-AIAPP-010]
        business_rules: [BR-AIAPP-029, BR-AIAPP-030, BR-AIAPP-055, BR-AIAPP-056]
      parameters:
        - $ref: "#/components/parameters/app_engine_id"
      responses:
        "200":
          description: 删除成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/v1/app-engines/{app_engine_id}/health-check:
    post:
      tags: [app-engines]
      summary: 触发应用引擎健康检测
      operationId: check_app_engine_health
      x-s1-refs:
        user_stories: [US-AIAPP-011]
        business_rules: [BR-AIAPP-033, BR-AIAPP-034, BR-AIAPP-035, BR-AIAPP-057, BR-AIAPP-060]
      parameters:
        - $ref: "#/components/parameters/app_engine_id"
      responses:
        "200":
          description: 健康检测后的应用引擎详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngine"

components:
  parameters:
    page_num:
      name: page_num
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    page_size:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    keyword:
      name: keyword
      in: query
      schema:
        type: string
        default: ""
    template_id:
      name: template_id
      in: path
      required: true
      schema:
        type: string
    application_id:
      name: application_id
      in: path
      required: true
      schema:
        type: string
    app_engine_id:
      name: app_engine_id
      in: path
      required: true
      schema:
        type: string
    run_id:
      name: run_id
      in: path
      required: true
      schema:
        type: string

  schemas:
    TemplateKind:
      type: string
      enum: [comfyui, saas_api]
    AppEngineType:
      type: string
      enum: [comfyui, saas_api]
    SaaSPlatformType:
      type: string
      description: 仅 kind=saas_api 或 engine_type=saas_api 时生效。
      enum: [modelscope, custom_http]
    CapabilityType:
      type: string
      description: SaaS API 能力类型。
      enum: [image_generation, image_editing, video_generation]
    ApplicationRunStatus:
      type: string
      enum: [pending, running, success, failed, canceled, timeout]
    OperationContract:
      type: object
      description: SaaS API 操作契约，表达第三方接口调用、请求映射、结果映射、取消和进度支持。
      properties:
        method:
          type: string
        path:
          type: string
        request_mapping:
          type: object
          additionalProperties: true
        result_mapping:
          type: object
          additionalProperties: true
        cancel_supported:
          type: boolean
          default: false
        progress_supported:
          type: boolean
          default: false
    HealthCheckConfig:
      type: object
      description: 应用引擎健康检测配置；不同 SaaS 平台和能力可以使用不同检测方式。
      properties:
        mode:
          type: string
          enum: [http_ping, api_call, none]
        path:
          type: string
        method:
          type: string
        expected_status:
          type: integer
        payload:
          type: object
          additionalProperties: true
    AppEngineStatus:
      type: string
      enum: [active, disabled]
    AppEngineHealthStatus:
      type: string
      enum: [unknown, healthy, unhealthy]
    AppEngineAuthType:
      type: string
      enum: [bearer_token, api_key, ak_sk, none]
    AppEngineAuthConfig:
      type: object
      description: 明文认证配置；前端仅做可见/不可见展示控制。
      properties:
        token:
          type: string
          description: bearer_token 认证方式使用的明文 token。
        api_key:
          type: string
          description: api_key 认证方式使用的明文 API Key。
        access_key:
          type: string
          description: ak_sk 认证方式使用的明文 Access Key。
        secret_key:
          type: string
          description: ak_sk 认证方式使用的明文 Secret Key。
    AppEngineHealthCheckRequest:
      type: object
      required: [engine_type, endpoint, auth_type]
      properties:
        engine_type:
          $ref: "#/components/schemas/AppEngineType"
        saas_platform_type:
          $ref: "#/components/schemas/SaaSPlatformType"
        endpoint:
          type: string
        auth_type:
          $ref: "#/components/schemas/AppEngineAuthType"
        auth_config:
          $ref: "#/components/schemas/AppEngineAuthConfig"
        health_check_config:
          $ref: "#/components/schemas/HealthCheckConfig"
    AppEngineHealthCheckResult:
      type: object
      required: [health_status, checked_at]
      properties:
        health_status:
          $ref: "#/components/schemas/AppEngineHealthStatus"
        checked_at:
          type: string
          format: date-time
        unhealthy_reason:
          type: string
        latency_ms:
          type: integer
          minimum: 0
        raw_summary:
          type: object
          additionalProperties: true
    AppEngine:
      type: object
      required:
        [
          id,
          owner_user_id,
          name,
          engine_type,
          endpoint,
          auth_type,
          auth_config,
          status,
          health_status,
          reference_run_count,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        owner_user_id:
          type: string
        name:
          type: string
        description:
          type: string
        engine_type:
          $ref: "#/components/schemas/AppEngineType"
        saas_platform_type:
          $ref: "#/components/schemas/SaaSPlatformType"
        endpoint:
          type: string
        auth_type:
          $ref: "#/components/schemas/AppEngineAuthType"
        auth_config:
          $ref: "#/components/schemas/AppEngineAuthConfig"
        status:
          $ref: "#/components/schemas/AppEngineStatus"
        health_status:
          $ref: "#/components/schemas/AppEngineHealthStatus"
        supported_capability_types:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityType"
        health_check_config:
          $ref: "#/components/schemas/HealthCheckConfig"
        capability_tags:
          type: array
          items:
            type: string
        reference_run_count:
