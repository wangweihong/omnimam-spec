      tags: [application-runs]
      operationId: get_application_run
      summary: 查询 ApplicationRun 与 TaskRun 投影
      x-permission: aiapp.application.run
      x-s1-refs:
        user_stories: [US-AIAPP-043]
        business_rules: [BR-AIAPP-138, BR-AIAPP-143, BR-AIAPP-149, BR-AIAPP-150]
      parameters: [{$ref: '#/components/parameters/application_run_id'}]
      responses:
        '200':
          description: 查询结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApplicationRun'
                  - $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    page_num:
      name: page_num
      in: query
      schema: {type: integer, minimum: 0, default: 0}
    page_size:
      name: page_size
      in: query
      schema: {type: integer, minimum: 1, maximum: 200, default: 20}
    keyword:
      name: keyword
      in: query
      schema: {type: string, default: ''}
    search_fields:
      name: search_fields
      in: query
      schema: {type: string, default: "name,description"}
    sort_field:
      name: sort_field
      in: query
      schema: {type: string, default: name}
    sort_order:
      name: sort_order
      in: query
      schema: {type: string, enum: [asc, desc], default: asc}
    provider_capability_id:
      name: provider_capability_id
      in: path
      required: true
      schema: {type: string}
    engine_instance_id:
      name: engine_instance_id
      in: path
      required: true
      schema: {type: string}
    binding_id:
      name: binding_id
      in: path
      required: true
      schema: {type: string}
    application_id:
      name: application_id
      in: path
      required: true
      schema: {type: string}
    application_template_id:
      name: application_template_id
      in: path
      required: true
      schema: {type: string}
    application_template_version_id:
      name: application_template_version_id
      in: path
      required: true
      schema: {type: string}
    application_version_id:
      name: application_version_id
      in: path
      required: true
      schema: {type: string}
    application_run_id:
      name: application_run_id
      in: path
      required: true
      schema: {type: string}

  schemas:
    ProviderCapabilityAvailability:
      type: string
      enum: [available, disabled, unavailable]
    RegistryStatus:
      type: string
      enum: [ready, degraded]
    Lifecycle:
      type: object
      required: [status]
      properties:
        status: {type: string, enum: [active, preview, deprecated, retired]}
        available_since: {type: string, format: date}
        deprecated_at: {type: string, format: date}
        retired_at: {type: string, format: date}
        replacement_model_id: {type: string}
    ProviderModel:
      type: object
      required: [id, provider_model_id, display_name, family, variant, lifecycle]
      properties:
        id: {type: string}
        provider_model_id: {type: string}
        display_name: {type: string}
        family: {type: string}
        variant: {type: string}
        lifecycle: {$ref: '#/components/schemas/Lifecycle'}
        context_window_tokens: {type: integer}
        maximum_output_tokens: {type: integer}
        limits: {type: object, additionalProperties: true}
    ProviderOperation:
      type: object
      required: [id, capability_definition_id, execution_mode, input_media_types, output_media_types]
      properties:
        id: {type: string}
        capability_definition_id: {type: string}
        execution_mode: {type: string, enum: [synchronous, asynchronous]}
        input_media_types: {type: array, items: {type: string}}
        output_media_types: {type: array, items: {type: string}}
        description: {type: string}
    CapabilityVariant:
      type: object
      required: [id, model_id, operation_id, lifecycle, input_schema, output_schema]
      properties:
        id: {type: string}
        model_id: {type: string}
        operation_id: {type: string}
        lifecycle: {$ref: '#/components/schemas/Lifecycle'}
        input_schema: {type: object, additionalProperties: true}
        output_schema: {type: object, additionalProperties: true}
        unsupported_parameters: {type: array, items: {type: string}}
        notes: {type: array, items: {type: string}}
    ProviderCapability:
      type: object
      required: [schema_version, id, name, application_engine_type_id, revision, enabled, provider, sources, models, operations, variants, availability, loaded_at]
      properties:
        schema_version: {type: string}
        id: {type: string}
        name: {type: string}
        description: {type: string}
        application_engine_type_id: {type: string}
        revision: {type: string}
        enabled: {type: boolean}
        provider: {type: object, additionalProperties: true}
        sources: {type: array, items: {type: object, additionalProperties: true}}
        models: {type: array, items: {$ref: '#/components/schemas/ProviderModel'}}
        operations: {type: array, items: {$ref: '#/components/schemas/ProviderOperation'}}
        variants: {type: array, items: {$ref: '#/components/schemas/CapabilityVariant'}}
        labels: {type: object, additionalProperties: {type: string}}
        notes: {type: array, items: {type: string}}
        extensions: {type: object, additionalProperties: true}
        availability: {$ref: '#/components/schemas/ProviderCapabilityAvailability'}
        unavailable_code: {type: string}
        unavailable_summary: {type: string}
        loaded_at: {type: string, format: date-time}
    ProviderCapabilityListResponse:
      type: object
      required: [total, registry_status, items]
      properties:
        total: {type: integer}
        registry_status: {$ref: '#/components/schemas/RegistryStatus'}
        items: {type: array, items: {$ref: '#/components/schemas/ProviderCapability'}}
    ProviderCapabilityLoadResult:
      type: object
      required: [source_file, result, loaded_at]
      properties:
        provider_capability_id: {type: string, nullable: true}
        source_file: {type: string}
        result: {type: string, enum: [loaded, disabled, failed]}
        error_code: {type: string}
        error_value: {type: integer}
        failure_detail: {type: string}
        loaded_at: {type: string, format: date-time}
    ProviderCapabilityLoadResultListResponse:
      type: object
