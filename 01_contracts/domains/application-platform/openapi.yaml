    Application:
      type: object
      required: [id, name, owner_user_id, capability_definition_id, visibility, run_enabled, canvas_enabled, copy_enabled, preset_enabled, created_at, updated_at, resource_version]
      properties:
        id: {type: string}
        name: {type: string}
        description: {type: string}
        owner_user_id: {type: string}
        capability_definition_id: {type: string}
        visibility: {type: string, enum: [private, global]}
        run_enabled: {type: boolean}
        canvas_enabled: {type: boolean}
        copy_enabled: {type: boolean}
        preset_enabled: {type: boolean}
        current_version_id: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        resource_version: {type: integer}
    ApplicationCreateRequest:
      type: object
      additionalProperties: false
      required: [name, capability_definition_id]
      properties:
        name: {type: string}
        description: {type: string}
        capability_definition_id: {type: string}
        visibility: {type: string, enum: [private, global], default: private}
        run_enabled: {type: boolean, default: true}
        canvas_enabled: {type: boolean, default: true}
        copy_enabled: {type: boolean, default: false}
        preset_enabled: {type: boolean, default: false}
    ApplicationUpdateRequest:
      type: object
      additionalProperties: false
      required: [resource_version]
      properties:
        name: {type: string}
        description: {type: string}
        visibility: {type: string, enum: [private, global]}
        run_enabled: {type: boolean}
        canvas_enabled: {type: boolean}
        copy_enabled: {type: boolean}
        preset_enabled: {type: boolean}
        resource_version: {type: integer}
    ApplicationListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer}
        items: {type: array, items: {$ref: '#/components/schemas/Application'}}
    ApplicationVersionCreateRequest:
      type: object
      additionalProperties: false
      required: [semantic_version, application_template_version_id, input_schema, output_schema, parameter_policies]
      properties:
        semantic_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$'}
        application_template_version_id: {type: string}
        input_schema: {type: object, additionalProperties: true}
        output_schema: {type: object, additionalProperties: true}
        parameter_policies: {type: object, additionalProperties: true}
    ApplicationVersion:
      type: object
      required: [id, application_id, semantic_version, application_template_version_id, status, input_schema, output_schema, parameter_policies, created_at, updated_at, resource_version]
      properties:
        id: {type: string}
        application_id: {type: string}
        semantic_version: {type: string}
        application_template_version_id: {type: string}
        status: {type: string, enum: [draft, published, retired]}
        input_schema: {type: object, additionalProperties: true}
        output_schema: {type: object, additionalProperties: true}
        parameter_policies: {type: object, additionalProperties: true}
        published_at: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        resource_version: {type: integer}
    ApplicationVersionListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer}
        items: {type: array, items: {$ref: '#/components/schemas/ApplicationVersion'}}
    RuntimeFormResolveRequest:
      type: object
      additionalProperties: false
      required: [application_version_id]
      properties:
        application_version_id: {type: string}
        engine_instance_id: {type: string}
        current_values: {type: object, additionalProperties: true}
    RuntimeFormSchema:
      type: object
      required: [application_version_id, capability_source_type, source_revision, compatible_engine_instance_ids, fields, changes, violations, resolved_at]
      properties:
        application_version_id: {type: string}
        capability_source_type: {$ref: '#/components/schemas/CapabilitySourceType'}
        source_revision: {type: string}
        provider_capability_id: {type: string, nullable: true}
        provider_capability_revision: {type: string, nullable: true}
        workflow_contract_revision: {type: string, nullable: true, pattern: '^sha256:[0-9a-f]{64}$'}
        compatible_engine_instance_ids: {type: array, items: {type: string}}
        fields: {type: array, items: {$ref: '#/components/schemas/RuntimeFormField'}}
        changes: {type: array, items: {$ref: '#/components/schemas/RuntimeFormChange'}}
        violations: {type: array, items: {$ref: '#/components/schemas/RuntimeFormViolation'}}
        resolved_at: {type: string, format: date-time}
      oneOf:
        - required: [provider_capability_id, provider_capability_revision]
          properties:
            capability_source_type: {enum: [provider_capability]}
        - required: [workflow_contract_revision]
          properties:
            capability_source_type: {enum: [comfyui_workflow]}
    RuntimeFormField:
      type: object
      required: [name, type, required, value, options, connectable, dynamic]
      properties:
        name: {type: string}
        type: {type: string}
        required: {type: boolean}
        value: {$ref: '#/components/schemas/RuntimeValue'}
        options: {type: array, items: {$ref: '#/components/schemas/RuntimeValue'}}
        connectable: {type: boolean}
        dynamic: {type: boolean}
        depends_on: {type: array, items: {type: string}}
        on_invalid: {type: string, enum: [reset, fallback, clamp, reject]}
        unavailable_reason: {type: string, nullable: true}
        ui: {type: object, additionalProperties: true}
    RuntimeFormChange:
      type: object
      required: [field, reason, strategy]
      properties:
        field: {type: string}
        reason: {type: string}
        strategy: {type: string, enum: [reset, fallback, clamp]}
        previous_value: {$ref: '#/components/schemas/RuntimeValue'}
        current_value: {$ref: '#/components/schemas/RuntimeValue'}
    RuntimeFormViolation:
      type: object
      required: [field, code, message]
      properties:
        field: {type: string}
        code: {type: string}
        message: {type: string}
        current_value: {$ref: '#/components/schemas/RuntimeValue'}
    RuntimeValue:
      nullable: true
      oneOf:
        - {type: string}
        - {type: number}
        - {type: boolean}
        - {type: object, additionalProperties: true}
        - {type: array, items: {}}
    ApplicationRunCreateRequest:
      type: object
      additionalProperties: false
      required: [application_version_id, inputs, idempotency_key]
      properties:
        application_version_id: {type: string}
        engine_instance_id: {type: string}
        inputs: {type: object, additionalProperties: true}
        idempotency_key: {type: string}
    ApplicationRun:
      type: object
      required: [id, application_id, application_version_id, application_template_version_id, engine_instance_id, capability_source_type, source_revision, input_snapshot, execution_snapshot, output_mapping_snapshot, task_creation_status, task_resource_version, artifacts, created_at, updated_at, resource_version]
      properties:
        id: {type: string}
        application_id: {type: string}
        application_version_id: {type: string}
        application_template_version_id: {type: string}
        atomic_task_id: {type: string, nullable: true}
        engine_instance_id: {type: string}
        capability_source_type: {$ref: '#/components/schemas/CapabilitySourceType'}
        source_revision: {type: string}
        provider_capability_id: {type: string, nullable: true}
        provider_capability_revision: {type: string, nullable: true}
        provider_operation_id: {type: string, nullable: true}
        workflow_contract_revision: {type: string, nullable: true, pattern: '^sha256:[0-9a-f]{64}$'}
        input_snapshot: {type: object, additionalProperties: true}
        execution_snapshot: {type: object, additionalProperties: true}
        output_mapping_snapshot: {type: object, additionalProperties: true}
        task_creation_status: {type: string, enum: [pending, created, failed]}
        task_creation_failure: {type: string, nullable: true}
        task_status_projection: {type: string, nullable: true}
        task_resource_version: {type: integer, minimum: 0}
        output_values: {type: array, items: {type: object, additionalProperties: true}}
        artifacts: {type: array, items: {$ref: '#/components/schemas/ApplicationArtifact'}}
        failure_summary: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        resource_version: {type: integer}
      oneOf:
        - required: [provider_capability_id, provider_capability_revision, provider_operation_id]
          properties:
            capability_source_type: {enum: [provider_capability]}
        - required: [workflow_contract_revision]
          properties:
            capability_source_type: {enum: [comfyui_workflow]}
    ApplicationArtifact:
      type: object
      required: [id, application_run_id, output_key, owner_user_id, media_type, content_ref, registration_status, created_at, updated_at, resource_version]
      properties:
        id: {type: string}
        application_run_id: {type: string}
        output_key: {type: string}
        owner_user_id: {type: string}
        media_type: {type: string, enum: [image, video, audio, text, pdf, other]}
        content_ref: {type: string}
        registration_status: {type: string, enum: [pending, registered, failed]}
        asset_id: {type: string, nullable: true}
        registration_error_code: {type: string, nullable: true}
        registration_failure_detail: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        resource_version: {type: integer}
    DeleteResult:
      type: object
      required: [id, deleted]
      properties:
        id: {type: string}
        deleted: {type: boolean}
    ErrorResponse:
      type: object
      required: [code, value, message, messages, retryable]
      properties:
        code: {type: string}
        value: {type: integer}
        message: {type: string}
        messages:
          type: object
          required: [zh-CN, en-US]
          properties:
            zh-CN: {type: string}
            en-US: {type: string}
        detail: {type: string}
        retryable: {type: boolean}
        data: {type: object, additionalProperties: true}
