openapi: 3.0.3
info:
  title: OmniMAM AI Application Platform API
  version: 0.3.0-draft
  description: AI 应用平台第一阶段 S2 API 契约，覆盖模板管理、应用管理、字段映射和用户级应用引擎。
servers:
  - url: /api/v1
tags:
  - name: templates
    description: 应用模板管理。
  - name: applications
    description: 应用管理。
  - name: field-mappings
    description: 字段映射管理。
  - name: app-engines
    description: 用户应用引擎管理与健康检测。

paths:
  /api/v1/app-templates:
    get:
      tags: [templates]
      summary: 查询应用模板列表
      operationId: list_app_templates
      x-s1-refs:
        user_stories: [US-AIAPP-003, US-AIAPP-009]
        business_rules: [BR-AIAPP-001, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
        - name: kind
          in: query
          schema:
            $ref: "#/components/schemas/TemplateKind"
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [name, created_at, updated_at, kind]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 应用模板列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTemplateListResponse"
    post:
      tags: [templates]
      summary: 创建应用模板
      operationId: create_app_template
      x-s1-refs:
        user_stories: [US-AIAPP-001, US-AIAPP-002]
        business_rules: [BR-AIAPP-001, BR-AIAPP-002, BR-AIAPP-003, BR-AIAPP-004, BR-AIAPP-005]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppTemplateCreateRequest"
      responses:
        "200":
          description: 应用模板详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTemplate"

  /api/v1/app-templates/{template_id}:
    get:
      tags: [templates]
      summary: 获取应用模板详情
      operationId: get_app_template
      x-s1-refs:
        user_stories: [US-AIAPP-003, US-AIAPP-007, US-AIAPP-009]
        business_rules: [BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/template_id"
      responses:
        "200":
          description: 应用模板详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTemplate"
    patch:
      tags: [templates]
      summary: 更新应用模板元数据
      operationId: update_app_template
      x-s1-refs:
        user_stories: [US-AIAPP-003]
        business_rules: [BR-AIAPP-006, BR-AIAPP-007, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/template_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppTemplateUpdateRequest"
      responses:
        "200":
          description: 应用模板详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppTemplate"
    delete:
      tags: [templates]
      summary: 删除应用模板
      operationId: delete_app_template
      x-s1-refs:
        user_stories: [US-AIAPP-008]
        business_rules: [BR-AIAPP-008, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/template_id"
      responses:
        "200":
          description: 删除成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/v1/app-templates/{template_id}/references:
    get:
      tags: [templates]
      summary: 查询模板引用关系
      operationId: list_app_template_references
      x-s1-refs:
        user_stories: [US-AIAPP-007, US-AIAPP-008]
        business_rules: [BR-AIAPP-008]
      parameters:
        - $ref: "#/components/parameters/template_id"
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [name, created_at, updated_at, kind]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 引用该模板的应用列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"

  /api/v1/applications:
    get:
      tags: [applications]
      summary: 查询应用列表
      operationId: list_applications
      x-s1-refs:
        user_stories: [US-AIAPP-004, US-AIAPP-009]
        business_rules: [BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023, BR-AIAPP-026, BR-AIAPP-027]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
        - name: kind
          in: query
          schema:
            $ref: "#/components/schemas/TemplateKind"
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [name, created_at, updated_at, kind]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 应用列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"
    post:
      tags: [applications]
      summary: 基于模板创建正式应用
      operationId: create_application
      x-s1-refs:
        user_stories: [US-AIAPP-004]
        business_rules: [BR-AIAPP-010, BR-AIAPP-011, BR-AIAPP-012, BR-AIAPP-013, BR-AIAPP-016, BR-AIAPP-019]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationCreateRequest"
      responses:
        "200":
          description: 应用详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /api/v1/applications/{application_id}:
    get:
      tags: [applications]
      summary: 获取应用详情
      operationId: get_application
      x-s1-refs:
        user_stories: [US-AIAPP-004, US-AIAPP-007, US-AIAPP-009]
        business_rules: [BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023, BR-AIAPP-026, BR-AIAPP-027]
      parameters:
        - $ref: "#/components/parameters/application_id"
      responses:
        "200":
          description: 应用详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    patch:
      tags: [applications]
      summary: 更新应用
      operationId: update_application
      x-s1-refs:
        user_stories: [US-AIAPP-005, US-AIAPP-009]
        business_rules: [BR-AIAPP-014, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023, BR-AIAPP-024]
      parameters:
        - $ref: "#/components/parameters/application_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdateRequest"
      responses:
        "200":
          description: 应用详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    delete:
      tags: [applications]
      summary: 删除应用
      operationId: delete_application
      x-s1-refs:
        user_stories: [US-AIAPP-006]
        business_rules: [BR-AIAPP-015, BR-AIAPP-021, BR-AIAPP-022, BR-AIAPP-023]
      parameters:
        - $ref: "#/components/parameters/application_id"
      responses:
        "200":
          description: 删除成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/v1/applications/{application_id}/field-mappings:
    get:
      tags: [field-mappings]
      summary: 查询应用字段映射
      operationId: list_field_mappings
      x-s1-refs:
        user_stories: [US-AIAPP-005]
        business_rules: [BR-AIAPP-016, BR-AIAPP-017, BR-AIAPP-018, BR-AIAPP-019]
      parameters:
        - $ref: "#/components/parameters/application_id"
        - name: sort_field
          in: query
          description: 排序字段；默认按 sort_order 排序。
          schema:
            type: string
            enum: [sort_order, field_key, field_label, field_type, source_path]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 字段映射列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldMappingListResponse"
    put:
      tags: [field-mappings]
      summary: 整体保存应用字段映射
      operationId: save_field_mappings
      x-s1-refs:
        user_stories: [US-AIAPP-005]
        business_rules: [BR-AIAPP-014, BR-AIAPP-016, BR-AIAPP-017, BR-AIAPP-018, BR-AIAPP-019]
      parameters:
        - $ref: "#/components/parameters/application_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldMappingSaveRequest"
      responses:
        "200":
          description: 字段映射列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldMappingListResponse"

  /api/v1/app-engines:
    get:
      tags: [app-engines]
      summary: 查询应用引擎列表
      operationId: list_app_engines
      x-s1-refs:
        user_stories: [US-AIAPP-010, US-AIAPP-011]
        business_rules: [BR-AIAPP-028, BR-AIAPP-029, BR-AIAPP-030, BR-AIAPP-031, BR-AIAPP-032, BR-AIAPP-035]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
        - name: engine_type
          in: query
          schema:
            $ref: "#/components/schemas/AppEngineType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AppEngineStatus"
        - name: health_status
          in: query
          schema:
            $ref: "#/components/schemas/AppEngineHealthStatus"
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [name, created_at, updated_at, engine_type, status, health_status, last_health_check_at]
        - name: sort_order
          in: query
          description: 排序方向。
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 应用引擎列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngineListResponse"
    post:
      tags: [app-engines]
      summary: 创建应用引擎
      operationId: create_app_engine
      x-s1-refs:
        user_stories: [US-AIAPP-010]
        business_rules: [BR-AIAPP-028, BR-AIAPP-029, BR-AIAPP-031, BR-AIAPP-032]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppEngineCreateRequest"
      responses:
        "200":
          description: 应用引擎详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngine"

  /api/v1/app-engines/{app_engine_id}:
    get:
      tags: [app-engines]
      summary: 获取应用引擎详情
      operationId: get_app_engine
      x-s1-refs:
        user_stories: [US-AIAPP-010, US-AIAPP-011]
        business_rules: [BR-AIAPP-029, BR-AIAPP-030, BR-AIAPP-032]
      parameters:
        - $ref: "#/components/parameters/app_engine_id"
      responses:
        "200":
          description: 应用引擎详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngine"
    patch:
      tags: [app-engines]
      summary: 更新应用引擎
      operationId: update_app_engine
      x-s1-refs:
        user_stories: [US-AIAPP-010]
        business_rules: [BR-AIAPP-029, BR-AIAPP-030, BR-AIAPP-031, BR-AIAPP-032]
      parameters:
        - $ref: "#/components/parameters/app_engine_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppEngineUpdateRequest"
      responses:
        "200":
          description: 应用引擎详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngine"

  /api/v1/app-engines/{app_engine_id}/health-check:
    post:
      tags: [app-engines]
      summary: 触发应用引擎健康检测
      operationId: check_app_engine_health
      x-s1-refs:
        user_stories: [US-AIAPP-011]
        business_rules: [BR-AIAPP-033, BR-AIAPP-034, BR-AIAPP-035]
      parameters:
        - $ref: "#/components/parameters/app_engine_id"
      responses:
        "200":
          description: 健康检测后的应用引擎详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEngine"

components:
  parameters:
    page_num:
      name: page_num
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    page_size:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    keyword:
      name: keyword
      in: query
      schema:
        type: string
        default: ""
    template_id:
      name: template_id
      in: path
      required: true
      schema:
        type: string
    application_id:
      name: application_id
      in: path
      required: true
      schema:
        type: string
    app_engine_id:
      name: app_engine_id
      in: path
      required: true
      schema:
        type: string

  schemas:
    TemplateKind:
      type: string
      enum: [comfyui, saas_api]
    AppEngineType:
      type: string
      enum: [comfyui, saas_api]
    AppEngineStatus:
      type: string
      enum: [active, disabled]
    AppEngineHealthStatus:
      type: string
      enum: [unknown, healthy, unhealthy]
    AppEngineAuthType:
      type: string
      enum: [bearer_token, api_key, ak_sk, none]
    AppEngineAuthConfig:
      type: object
      description: 明文认证配置；前端仅做可见/不可见展示控制。
      properties:
        token:
          type: string
          description: bearer_token 认证方式使用的明文 token。
        api_key:
          type: string
          description: api_key 认证方式使用的明文 API Key。
        access_key:
          type: string
          description: ak_sk 认证方式使用的明文 Access Key。
        secret_key:
          type: string
          description: ak_sk 认证方式使用的明文 Secret Key。
    AppEngine:
      type: object
      required:
        [
          id,
          owner_user_id,
          name,
          engine_type,
          endpoint,
          auth_type,
          auth_config,
          status,
          health_status,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        owner_user_id:
          type: string
        name:
          type: string
        description:
          type: string
        engine_type:
          $ref: "#/components/schemas/AppEngineType"
        endpoint:
          type: string
        auth_type:
          $ref: "#/components/schemas/AppEngineAuthType"
        auth_config:
          $ref: "#/components/schemas/AppEngineAuthConfig"
        status:
          $ref: "#/components/schemas/AppEngineStatus"
        health_status:
          $ref: "#/components/schemas/AppEngineHealthStatus"
        capability_tags:
          type: array
          items:
            type: string
        last_health_check_at:
          type: string
          format: date-time
        unhealthy_reason:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AppEngineCreateRequest:
      type: object
      required: [name, engine_type, endpoint, auth_type]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        engine_type:
          $ref: "#/components/schemas/AppEngineType"
        endpoint:
          type: string
        auth_type:
          $ref: "#/components/schemas/AppEngineAuthType"
        auth_config:
          $ref: "#/components/schemas/AppEngineAuthConfig"
        capability_tags:
          type: array
          items:
            type: string
    AppEngineUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        endpoint:
          type: string
        auth_type:
          $ref: "#/components/schemas/AppEngineAuthType"
        auth_config:
          $ref: "#/components/schemas/AppEngineAuthConfig"
        status:
          $ref: "#/components/schemas/AppEngineStatus"
        capability_tags:
          type: array
          items:
            type: string
    ParsedField:
      type: object
      required: [source_path, field_type, required]
      properties:
        source_path:
          type: string
        field_type:
          type: string
        required:
          type: boolean
        label_hint:
          type: string
    AppTemplate:
      type: object
      required:
        [
          id,
          owner_user_id,
          name,
          kind,
          config,
          parsed_fields,
          reference_application_count,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        owner_user_id:
          type: string
        name:
          type: string
        description:
          type: string
        kind:
          $ref: "#/components/schemas/TemplateKind"
        config:
          type: object
          additionalProperties: true
        parsed_fields:
          type: array
          items:
            $ref: "#/components/schemas/ParsedField"
        reference_application_count:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AppTemplateCreateRequest:
      type: object
      required: [name, kind, config]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        kind:
          $ref: "#/components/schemas/TemplateKind"
        config:
          type: object
          additionalProperties: true
    AppTemplateUpdateRequest:
      type: object
      description: 模板内容创建后不可修改；本请求仅允许修改名称和描述。
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
    FieldMappingInput:
      type: object
      required:
        [
          field_key,
          field_label,
          field_type,
          source_path,
          sort_order,
        ]
      properties:
        field_key:
          type: string
        field_label:
          type: string
        field_type:
          type: string
          description: 必须来自模板解析变量中的 field_type。
        source_path:
          type: string
          description: 必须来自模板解析变量中的 source_path。
        default_value: {}
        sort_order:
          type: integer
    FieldMapping:
      allOf:
        - $ref: "#/components/schemas/FieldMappingInput"
        - type: object
          required: [id, application_id, template_id, required]
          properties:
            id:
              type: string
            application_id:
              type: string
            template_id:
              type: string
            required:
              type: boolean
    FieldMappingSaveRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/FieldMappingInput"
    Application:
      type: object
      required:
        [
          id,
          owner_user_id,
          template_id,
          name,
          kind,
          field_mappings,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        owner_user_id:
          type: string
        template_id:
          type: string
        name:
          type: string
        description:
          type: string
        kind:
          $ref: "#/components/schemas/TemplateKind"
        field_mappings:
          type: array
          items:
            $ref: "#/components/schemas/FieldMapping"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApplicationCreateRequest:
      type: object
      required: [template_id, name, field_mappings]
      properties:
        template_id:
          type: string
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        field_mappings:
          $ref: "#/components/schemas/FieldMappingSaveRequest"
    ApplicationUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
    AppTemplateListResponse:
      type: object
      required: [total, items]
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/AppTemplate"
    ApplicationListResponse:
      type: object
      required: [total, items]
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Application"
    FieldMappingListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FieldMapping"
    AppEngineListResponse:
      type: object
      required: [total, items]
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/AppEngine"
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
