app_template_changed:
  producer: template-service
  consumers:
    - application-service
  trigger_condition: 应用模板创建、名称或描述更新、删除成功。
  payload:
    template_id: string
    owner_user_id: string
    kind: string
    changed_action: string
    occurred_at: string(date-time)
  idempotency_key: template_id:changed_action:occurred_at
  retry_policy: 失败后按固定间隔重试，直到消费者接收。
  failure_policy: 记录事件失败，模板事实仍以 S2 schema 中模板记录为准。
  related_user_stories:
    - US-AIAPP-001
    - US-AIAPP-002
    - US-AIAPP-003
  related_rules:
    - BR-AIAPP-001
    - BR-AIAPP-006
    - BR-AIAPP-007

application_changed:
  producer: application-service
  consumers:
    - template-service
  trigger_condition: 应用创建、应用元数据更新、字段映射更新或删除导致模板引用关系变化。
  payload:
    application_id: string
    template_id: string
    owner_user_id: string
    changed_action: string
    occurred_at: string(date-time)
  idempotency_key: application_id:changed_action:occurred_at
  retry_policy: 失败后按固定间隔重试，直到消费者接收。
  failure_policy: 引用计数更新失败时必须保留可修复记录，禁止继续物理删除关联模板。
  related_user_stories:
    - US-AIAPP-004
    - US-AIAPP-005
    - US-AIAPP-006
    - US-AIAPP-007
  related_rules:
    - BR-AIAPP-008
    - BR-AIAPP-010
    - BR-AIAPP-015

field_mapping_changed:
  producer: application-service
  consumers:
    - template-service
  trigger_condition: 应用字段映射在创建应用或整体保存字段映射时发生变化。
  payload:
    application_id: string
    template_id: string
    owner_user_id: string
    changed_action: string
    invalid_mapping_count: integer
    occurred_at: string(date-time)
  idempotency_key: application_id:changed_action:occurred_at
  retry_policy: 失败后按固定间隔重试，直到消费者接收。
  failure_policy: 映射检查失败时保留应用当前字段映射，并在应用详情提示需要重新检查。
  related_user_stories:
    - US-AIAPP-004
    - US-AIAPP-005
  related_rules:
    - BR-AIAPP-016
    - BR-AIAPP-017
    - BR-AIAPP-018
    - BR-AIAPP-019

app_engine_changed:
  producer: app-engine-service
  consumers:
    - task-center-scheduler
  trigger_condition: 应用引擎创建、基础信息更新、明文认证配置更新或停用状态变化。
  payload:
    app_engine_id: string
    owner_user_id: string
    engine_type: string
    status: string
    changed_action: string
    occurred_at: string(date-time)
  idempotency_key: app_engine_id:changed_action:occurred_at
  retry_policy: 失败后按固定间隔重试，直到消费者接收。
  failure_policy: 应用引擎事实以 S2 schema 中应用引擎记录为准。
  related_user_stories:
    - US-AIAPP-010
  related_rules:
    - BR-AIAPP-028
    - BR-AIAPP-029
    - BR-AIAPP-030
    - BR-AIAPP-031
    - BR-AIAPP-032

app_engine_health_changed:
  producer: app-engine-service
  consumers:
    - application-service
    - task-center-scheduler
  trigger_condition: task-center 周期性健康检测任务或手动健康检测导致应用引擎健康状态变化。
  payload:
    app_engine_id: string
    owner_user_id: string
    health_status: string
    last_health_check_at: string(date-time)
    unhealthy_reason: string
    occurred_at: string(date-time)
  idempotency_key: app_engine_id:health_status:last_health_check_at
  retry_policy: 失败后按固定间隔重试，直到消费者接收。
  failure_policy: 最新健康状态以 S2 schema 中应用引擎记录为准。
  related_user_stories:
    - US-AIAPP-011
  related_rules:
    - BR-AIAPP-033
    - BR-AIAPP-034
    - BR-AIAPP-035
