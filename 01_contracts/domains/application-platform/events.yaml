adapter_catalog_changed:
  producer: adapter-catalog
  consumers: [template-service, application-service, app-engine-service]
  trigger_condition: 系统注册、升级、启用或禁用 ProviderAdapter/Operation。
  payload:
    adapter_key: string
    operation_key: string
    operation_version: string
    enabled: boolean
    occurred_at: string(date-time)
  idempotency_key: adapter_key:operation_key:operation_version:occurred_at
  retry_policy: 失败后按固定间隔重试。
  failure_policy: 目录事实以代码注册 Manifest 为准。
  related_user_stories: [US-AIAPP-001]
  related_rules: [BR-AIAPP-001, BR-AIAPP-004, BR-AIAPP-005]

app_template_changed:
  producer: template-service
  consumers: [application-service]
  trigger_condition: 模板创建、元数据更新或删除成功。
  payload:
    template_id: string
    owner_user_id: string
    adapter_key: string
    operation_key: string
    changed_action: string
    occurred_at: string(date-time)
  idempotency_key: template_id:changed_action:occurred_at
  retry_policy: 失败后按固定间隔重试。
  failure_policy: 模板事实以 schema 记录为准。
  related_user_stories: [US-AIAPP-002, US-AIAPP-003]
  related_rules: [BR-AIAPP-006, BR-AIAPP-011, BR-AIAPP-012]

application_changed:
  producer: application-service
  consumers: [template-service, application-run-service]
  trigger_condition: 应用创建、元数据或固化参数更新、删除成功。
  payload:
    application_id: string
    owner_user_id: string
    source_type: string
    adapter_key: string
    operation_key: string
    changed_action: string
    occurred_at: string(date-time)
  idempotency_key: application_id:changed_action:occurred_at
  retry_policy: 失败后按固定间隔重试。
  failure_policy: 应用事实以 schema 记录为准；模板引用计数失败需保留修复记录。
  related_user_stories: [US-AIAPP-003, US-AIAPP-004, US-AIAPP-005]
  related_rules: [BR-AIAPP-013, BR-AIAPP-014, BR-AIAPP-019, BR-AIAPP-020]

application_mapping_changed:
  producer: application-service
  consumers: [application-run-service]
  trigger_condition: 输入映射、输出映射或固化参数整体保存成功。
  payload:
    application_id: string
    owner_user_id: string
    input_mapping_count: integer
    output_mapping_count: integer
    occurred_at: string(date-time)
  idempotency_key: application_id:occurred_at
  retry_policy: 失败后按固定间隔重试。
  failure_policy: 映射事实以输入和输出映射表为准。
  related_user_stories: [US-AIAPP-003, US-AIAPP-004, US-AIAPP-005]
  related_rules: [BR-AIAPP-015, BR-AIAPP-016, BR-AIAPP-017, BR-AIAPP-018]

app_engine_changed:
  producer: app-engine-service
  consumers: [engine-router, task-center-scheduler]
  trigger_condition: 引擎创建、配置更新、能力或并发变化、停用或删除成功。
  payload:
    app_engine_id: string
    owner_user_id: string
    adapter_key: string
    status: string
    health_status: string
    current_inflight: integer
    changed_action: string
    occurred_at: string(date-time)
  idempotency_key: app_engine_id:changed_action:occurred_at
  retry_policy: 失败后按固定间隔重试。
  failure_policy: 引擎事实以 schema 记录为准。
  related_user_stories: [US-AIAPP-006, US-AIAPP-007]
  related_rules: [BR-AIAPP-021, BR-AIAPP-023, BR-AIAPP-027, BR-AIAPP-028]

app_engine_health_changed:
  producer: app-engine-service
  consumers: [engine-router]
  trigger_condition: 已保存引擎健康状态变化。
  payload:
    app_engine_id: string
    owner_user_id: string
    health_status: string
    last_health_check_at: string(date-time)
    unhealthy_reason: string
    occurred_at: string(date-time)
  idempotency_key: app_engine_id:health_status:last_health_check_at
  retry_policy: 失败后按固定间隔重试。
  failure_policy: 最新健康状态以 schema 记录为准。
  related_user_stories: [US-AIAPP-006, US-AIAPP-007]
  related_rules: [BR-AIAPP-021, BR-AIAPP-023]

application_run_created:
  producer: application-run-service
  consumers: [task-center]
  trigger_condition: 引擎校验或自动路由成功并创建 AppRun。
  payload:
    application_run_id: string
    application_id: string
    task_run_id: string
    run_mode: string
    requested_engine_id: string
    resolved_engine_id: string
    adapter_key: string
    operation_key: string
    operation_version: string
    owner_user_id: string
    occurred_at: string(date-time)
  idempotency_key: application_run_id:task_run_id
  retry_policy: 失败后保留可重放记录并重试。
  failure_policy: AppRun 与 TaskRun 创建必须使用幂等键避免重复。
  related_user_stories: [US-AIAPP-008, US-AIAPP-009, US-AIAPP-010, US-AIAPP-011]
  related_rules: [BR-AIAPP-029, BR-AIAPP-030, BR-AIAPP-031, BR-AIAPP-036]

application_run_projection_changed:
  producer: application-run-service
  consumers: [application-run-view]
  trigger_condition: 接收到更高 resource_version 的 TaskRun 状态、进度或结果事件。
  payload:
    application_run_id: string
    task_run_id: string
    task_resource_version: integer
    task_status: string
    progress: object
    output_values: array
    failure_summary: string
    occurred_at: string(date-time)
  idempotency_key: task_run_id:task_resource_version
  retry_policy: 失败后按固定间隔重试。
  failure_policy: 不得用旧版本覆盖新投影；TaskRun 是执行状态事实源。
  related_user_stories: [US-AIAPP-008, US-AIAPP-009]
  related_rules: [BR-AIAPP-036, BR-AIAPP-037, BR-AIAPP-041]
