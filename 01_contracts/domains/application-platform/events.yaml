engine_instance_health_changed:
  producer: application-platform.engine-instance
  consumers: [application-platform.engine-router]
  trigger_condition: EngineInstance 健康检测结果相对已保存状态发生变化。
  payload:
    engine_instance_id: string
    application_engine_type_id: string
    health_status: string
    checked_at: string(date-time)
    failure_summary: string
  idempotency_key: engine_instance_id:checked_at
  retry_policy: 发布失败后按固定间隔重试，健康事实仍以 EngineInstance 表为准。
  failure_policy: 不得因事件发布失败回滚已经完成的健康检测；路由读取前必须查询最新状态。
  related_rules: [BR-AIAPP-140]
  related_user_stories: [US-AIAPP-041]

comfyui_workflow_converted:
  producer: application-platform.comfyui-workflow
  consumers: [audit-service]
  trigger_condition: 工作流转换事务已经创建 ApplicationTemplate、首个 draft ApplicationTemplateVersion 并固定转换关系。
  payload:
    workflow_id: string
    owner_user_id: string
    actor_user_id: string
    workflow_validation_id: string
    application_template_id: string
    application_template_version_id: string
    workflow_contract_revision: string
    converted_at: string(date-time)
  idempotency_key: workflow_id:application_template_id
  retry_policy: 转换事务提交后通过 outbox 重试，消费者按 workflow_id 幂等处理。
  failure_policy: 事件发布失败不得回滚转换；数据库中的工作流转换关系和模板首版是事实源。
  related_rules: [BR-AIAPP-156, BR-AIAPP-159, BR-AIAPP-160, BR-AIAPP-173, BR-AIAPP-174]
  related_user_stories: [US-AIAPP-046]

application_version_published:
  producer: application-platform.application
  consumers: [workflow-canvas, application-platform.runtime-form]
  trigger_condition: 新 ApplicationVersion 完成校验并发布为不可变版本。
  payload:
    application_id: string
    application_version_id: string
    application_template_version_id: string
    semantic_version: string
    published_at: string(date-time)
  idempotency_key: application_version_id:semantic_version
  retry_policy: 发布失败后保留 outbox 记录并重试。
  failure_policy: 版本事实以数据库记录为准；消费者必须按 application_version_id 幂等处理。
  related_rules: [BR-AIAPP-142]
  related_user_stories: [US-AIAPP-042]

application_run_created:
  producer: application-platform.application-run
  consumers: [audit-service]
  trigger_condition: 能力、实例、权限和输入校验完成，ApplicationRun 不可变执行快照已保存，task_creation_status 为 pending。
  payload:
    application_run_id: string
    application_id: string
    application_version_id: string
    application_template_version_id: string
    engine_instance_id: string
    capability_source_type: string
    source_revision: string
    provider_capability_id: string|null
    provider_capability_revision: string|null
    provider_operation_id: string|null
    workflow_contract_revision: string|null
    execution_snapshot: object
    task_creation_status: string
    occurred_at: string(date-time)
  idempotency_key: application_run_id:created
  retry_policy: 事件发布失败后按 ApplicationRun ID 重试；AtomicTask 创建由模块协作 API 的幂等键保证。
  failure_policy: 事件失败不回滚 ApplicationRun 快照；未创建 AtomicTask 时不得伪造执行状态。
  related_rules: [BR-AIAPP-135, BR-AIAPP-137, BR-AIAPP-138, BR-AIAPP-143, BR-AIAPP-145, BR-AIAPP-149]
  related_user_stories: [US-AIAPP-043]

application_run_atomic_task_bound:
  producer: application-platform.application-run
  consumers: [application-platform.application-run-view, audit-service]
  trigger_condition: task-center 使用 application_run_id 与幂等键创建或返回唯一 AtomicTask，application-platform 成功绑定 atomic_task_id。
  payload:
    application_run_id: string
    atomic_task_id: string
    task_creation_status: string
    task_resource_version: integer
    occurred_at: string(date-time)
  idempotency_key: application_run_id:atomic_task_id
  retry_policy: 发布失败后重试相同绑定事件。
  failure_policy: ApplicationRun 表中的绑定关系为事实源；事件失败不得重复创建 AtomicTask。
  related_rules: [BR-AIAPP-143, BR-AIAPP-149]
  related_user_stories: [US-AIAPP-043]

application_run_projection_changed:
  producer: application-platform.application-run
  consumers: [application-platform.application-run-view, workflow-canvas, sse-event-projector]
  trigger_condition: 收到 resource_version 更高的 AtomicTask 状态、进度或结果事件。
  payload:
    application_run_id: string
    atomic_task_id: string
    task_resource_version: integer
    task_status: string
    progress: object
    output_values: array
    failure_summary: string
    occurred_at: string(date-time)
  idempotency_key: atomic_task_id:task_resource_version
  retry_policy: 失败后重试相同投影事件。
  failure_policy: 旧 resource_version 不得覆盖新投影；AtomicTask 始终是执行状态事实源。
  related_rules: [BR-AIAPP-143]
  related_user_stories: [US-AIAPP-043]

application_artifact_processing_changed:
  producer: application-platform.artifact-processor
  consumers: [application-platform.application-run-view, sse-event-projector, audit-service]
  trigger_condition: Artifact 已创建，处理状态变化，预览首次就绪，或 Artifact 进入 deleted。
  payload:
    artifact_id: string
    application_run_id: string
    atomic_task_id: string
    owner_user_id: string
    output_key: string
    change_type: string(created|transferring|processing|preview_ready|ready|failed|deleted)
    processing_status: string(created|transferring|processing|ready|failed|deleted)
    registration_status: string(pending|registered|failed)
    processing_progress: number|null
    processing_phase: string|null
    preview_available: boolean
    preview_ref: string|null
    thumbnail_ref: string|null
    media_type: string
    size_bytes: integer|null
    processing_error_code: string|null
    processing_retryable: boolean
    resource_version: integer
    occurred_at: string(date-time)
  idempotency_key: artifact_id:resource_version:change_type
  retry_policy: 由 Artifact 事务 outbox 持续重试，消费者丢弃相同或更低 resource_version。
  failure_policy: Artifact 表是处理事实源；发布失败不回滚 Artifact 或已终态 AtomicTask，不在事件中携带正文、凭证或长期公开 URL。
  related_rules: [BR-AIAPP-177, BR-AIAPP-178, BR-AIAPP-179, BR-AIAPP-180]
  related_user_stories: [US-AIAPP-050]

provider_capability_correction_required:
  producer: application-platform.operation-executor
  consumers: [application-platform.admin-diagnostics]
  trigger_condition: 外部平台拒绝清单声明为有效的模型、Operation 或参数组合。
  payload:
    provider_capability_id: string
    provider_capability_revision: string
    model_id: string
    operation_id: string
    field: string
    rejected_value: object
    provider_error: object
    occurred_at: string(date-time)
  idempotency_key: provider_capability_id:provider_capability_revision:operation_id:occurred_at
  retry_policy: 诊断事项发布失败后重试，不自动修改清单。
  failure_policy: 运行按外部平台失败结束；维护人员核实文档并通过新 revision 与重启修正。
  related_rules: [BR-AIAPP-130, BR-AIAPP-138]
  related_user_stories: [US-AIAPP-039, US-AIAPP-043]

application_artifact_registration_changed:
  producer: application-platform.application-run
  consumers: [application-platform.application-run-view, sse-event-projector, audit-service]
  trigger_condition: Artifact 的 UserAsset 登记状态变为 registered 或 failed。
  payload:
    artifact_id: string
    application_run_id: string
    atomic_task_id: string
    owner_user_id: string
    output_key: string
    processing_status: string(ready|deleted)
    registration_status: string
    asset_id: string|null
    registration_error_code: string|null
    registration_retryable: boolean
    resource_version: integer
    occurred_at: string(date-time)
  idempotency_key: artifact_id:registration_status:resource_version
  retry_policy: 事件失败后按 Artifact resource_version 重试。
  failure_policy: Artifact 表是登记状态事实源；事件失败不改变 AtomicTask 终态，也不重复创建 UserAsset。
  related_rules: [BR-AIAPP-150, BR-AIAPP-177, BR-AIAPP-180]
  related_user_stories: [US-AIAPP-043, US-AIAPP-050]

comfyui_workflow_api_converted:
  producer: application-platform.comfyui-workflow
  consumers: [application-platform.comfyui-workflow-view, audit-service]
  trigger_condition: visual_workflow 首次成功保存 API Workflow。
  payload:
    workflow_id: string
    source_checksum: string
    api_workflow_checksum: string
    converted_by_user_id: string
    resource_version: integer
    occurred_at: string(date-time)
  idempotency_key: workflow_id:api_workflow_checksum
  retry_policy: outbox 重试直到投递成功。
  failure_policy: 工作流表是转换事实源，事件失败不回滚转换。
  related_rules: [BR-AIAPP-164, BR-AIAPP-165]
  related_user_stories: [US-AIAPP-047]

comfyui_workflow_test_run_changed:
  producer: application-platform.comfyui-workflow-test-run
  consumers: [application-platform.comfyui-workflow-view, audit-service]
  trigger_condition: 试运行绑定 DAG、恢复 prompt ID 或收集预览描述。
  payload:
    test_run_id: string
    workflow_id: string
    dag_task_group_id: string|null
    external_job_id: string|null
    resource_version: integer
    occurred_at: string(date-time)
  idempotency_key: test_run_id:resource_version
  retry_policy: outbox 按资源版本重试。
  failure_policy: test run 与 Task Center 投影仍为事实源。
  related_rules: [BR-AIAPP-166, BR-AIAPP-168]
  related_user_stories: [US-AIAPP-048]
