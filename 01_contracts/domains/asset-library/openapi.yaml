components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    page_num:
      name: page_num
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    page_size:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    keyword:
      name: keyword
      in: query
      description: 对 search_fields 指定字段执行模糊搜索；可与 selector 和精确过滤条件按 AND 组合。
      schema: { type: string, maxLength: 256, default: "" }
    search_fields:
      name: search_fields
      in: query
      description: 逗号分隔且不得重复；仅允许 display_name、original_name、description。
      schema:
        type: string
        pattern: '^(display_name|original_name|description)(,(display_name|original_name|description))*$'
        default: display_name,original_name,description
    selector:
      name: selector
      in: query
      description: 统一 Label/Tag/分组选择器；与 natural_language_query 互斥。
      schema: { type: string, maxLength: 4096 }
    natural_language_query:
      name: natural_language_query
      in: query
      description: 自然语言查询；与 selector、keyword 互斥，允许和普通精确过滤条件按 AND 组合。
      schema: { type: string, minLength: 1, maxLength: 1000 }
    created_after:
      name: created_after
      in: query
      schema: { type: string, format: date-time }
    created_before:
      name: created_before
      in: query
      schema: { type: string, format: date-time }

  schemas:
    MediaType:
      type: string
      enum: [image, video, audio, text, document, model_3d, prompt, prompt_template, pdf, other]
    SourceType:
      type: string
      enum: [upload, canvas_output, application_output]
    LabelSource:
      type: string
      enum: [manual, auto]
    QueryRequestedMode:
      type: string
      enum: [filters_only, selector, keyword, combined, natural_language]
    QueryAppliedMode:
      type: string
      enum: [filters_only, selector, keyword, combined, keyword_fallback]
    QueryResolution:
      type: object
      required: [requested_mode, applied_mode]
      properties:
        requested_mode:
          $ref: "#/components/schemas/QueryRequestedMode"
        applied_mode:
          $ref: "#/components/schemas/QueryAppliedMode"
        resolved_selector:
          type: string
          maxLength: 4096
