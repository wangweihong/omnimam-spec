openapi: 3.0.3
info:
  title: OmniMAM Asset Library API
  version: 0.2.0-draft
  description: 素材、Artifact、AssetVersion、AssetRepresentation、标签查询与周期修复协作契约。
servers:
  - url: /api/v1
security:
  - bearer_auth: []
tags:
  - name: assets
    description: 当前用户素材查询与标签操作。
  - name: artifact-registrations
    description: Artifact 到 Asset/AssetVersion 的幂等登记。
  - name: artifacts
    description: 受信 producer 创建、上传、完成和查询 Artifact。
  - name: representations
    description: AssetVersion 与 AssetRepresentation 查询和受控写入。

paths:
  /api/v1/assets:
    get:
      tags: [assets]
      summary: 查询当前用户素材列表
      operationId: list_assets
      description: |
        所有条件均在当前 Bearer Token 对应的用户范围内执行。`selector` 与
        `natural_language_query` 互斥；`keyword` 可以与 selector 和精确过滤条件组合，
        条件之间按 AND 执行。`natural_language_query` 可与普通精确过滤条件组合，
        但不得与 `selector` 或 `keyword` 同时提交。

        selector 文法：Label 支持 `key=value`、`key!=value`、`key`、`!key`、
        `key in (v1,v2)`、`key notin (v1,v2)`；Tag 支持 `#tag`、`#-tag`；
        分组支持 `@group=value`。`,` 为 AND，`;` 为 OR，AND 优先于 OR，括号可覆盖优先级。
        空 Label value 仅写作 `key=""`。含空白或保留字符的 value、Tag、分组名使用
        JSON 风格双引号及转义，例如 `#"人物,汽车"`。最大嵌套深度 8、谓词数 100，
        单个 `in/notin` 最多 100 个非空值。Label、Tag 匹配区分大小写。
      x-s1-refs:
        user_stories: [US-USER-ASSET-01, US-USER-ASSET-03, US-USER-ASSET-04, US-USER-ASSET-20, US-USER-ASSET-22, US-USER-ASSET-24, US-USER-ASSET-27, US-USER-ASSET-28, US-USER-ASSET-38]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-05, BR-USER-ASSET-08, BR-USER-ASSET-09, BR-USER-ASSET-10, BR-USER-ASSET-35, BR-USER-ASSET-37, BR-USER-ASSET-39, BR-USER-ASSET-52]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
        - $ref: "#/components/parameters/search_fields"
        - $ref: "#/components/parameters/selector"
        - $ref: "#/components/parameters/natural_language_query"
        - $ref: "#/components/parameters/created_after"
        - $ref: "#/components/parameters/created_before"
        - name: media_type
          in: query
          schema:
            $ref: "#/components/schemas/MediaType"
        - name: format
          in: query
          schema:
            type: string
            maxLength: 64
        - name: source_type
          in: query
          schema:
            $ref: "#/components/schemas/SourceType"
        - name: width
          in: query
          schema: { type: integer, minimum: 0 }
        - name: height
          in: query
          schema: { type: integer, minimum: 0 }
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [display_name, size_bytes, media_type, format, created_at, updated_at]
            default: created_at
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 素材列表或业务错误；业务结果通过响应体结构与 code/value 判断。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AssetListResponse"
                  - $ref: "#/components/schemas/BusinessError"

  /api/v1/assets/batch-labels:
    post:
      tags: [assets]
      summary: 批量应用 Labels 与 Tags
      operationId: batch_apply_asset_labels
      description: |
        每个素材独立校验并提交，单项失败不回滚其他合法项。请求中的 Label upsert、
        Tag 添加和 Tag 删除均按 trim 后的区分大小写原文处理；写入来源统一为 manual。
        Label 同 key 覆盖，Tag 添加与删除为幂等操作。不提供批量删除 Label 能力。
      x-s1-refs:
        user_stories: [US-USER-ASSET-23]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-03, BR-USER-ASSET-32, BR-USER-ASSET-35, BR-USER-ASSET-36, BR-USER-ASSET-40]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchLabelRequest"
      responses:
        "200":
          description: 逐项批量结果或请求级业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BatchLabelResponse"
                  - $ref: "#/components/schemas/BusinessError"

  /api/v1/artifacts:
    get:
      tags: [artifacts]
      summary: 查询当前用户 Artifact 列表
      operationId: list_artifacts
      x-permission: asset.artifact.read
      x-s1-refs:
        user_stories: [US-USER-ASSET-42, US-USER-ASSET-45]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-64, BR-USER-ASSET-66, BR-USER-ASSET-76]
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
        - {name: processing_status, in: query, schema: {type: string, enum: [created, transferring, processing, ready, failed, deleted]}}
        - {name: registration_status, in: query, schema: {type: string, enum: [pending, registered, failed]}}
        - {name: producer_type, in: query, schema: {type: string, enum: [application_run, canvas_run, atomic_task]}}
      responses:
        '200':
          description: Artifact 列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/ArtifactListResponse'}
                  - {$ref: '#/components/schemas/BusinessError'}
    post:
      tags: [artifacts]
      summary: 幂等创建 Artifact
      operationId: create_artifact
      x-permission: asset.artifact.create
      x-s1-refs:
        user_stories: [US-USER-ASSET-42]
        business_rules: [BR-USER-ASSET-64, BR-USER-ASSET-66, BR-USER-ASSET-67, BR-USER-ASSET-68]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateArtifactRequest'}
      responses:
        '200':
          description: Artifact 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Artifact'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/artifacts/{artifact_id}:
    get:
      tags: [artifacts]
      summary: 查询 Artifact
      operationId: get_artifact
      x-permission: asset.artifact.read
      x-s1-refs:
        user_stories: [US-USER-ASSET-42, US-USER-ASSET-45]
        business_rules: [BR-USER-ASSET-64, BR-USER-ASSET-66, BR-USER-ASSET-76]
      parameters:
        - {name: artifact_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: Artifact 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Artifact'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/artifacts/{artifact_id}/content:
    post:
      tags: [artifacts]
      summary: 上传 Artifact 受控内容
      operationId: upload_artifact_content
      x-permission: asset.artifact.create
      x-s1-refs:
        user_stories: [US-USER-ASSET-42]
        business_rules: [BR-USER-ASSET-66, BR-USER-ASSET-67, BR-USER-ASSET-68]
      parameters:
        - {name: artifact_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: {type: string, format: binary}
      responses:
        '200':
          description: 当前 Artifact 投影或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Artifact'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/artifacts/{artifact_id}/complete:
    post:
      tags: [artifacts]
      summary: 完成 Artifact 上传并进入处理
      operationId: complete_artifact
      x-permission: asset.artifact.create
      x-s1-refs:
        user_stories: [US-USER-ASSET-42]
        business_rules: [BR-USER-ASSET-64, BR-USER-ASSET-65, BR-USER-ASSET-67, BR-USER-ASSET-68, BR-USER-ASSET-76]
      parameters:
        - {name: artifact_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CompleteArtifactRequest'}
      responses:
        '200':
          description: 当前 Artifact 投影或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Artifact'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/artifacts/{artifact_id}/register:
    post:
      tags: [artifact-registrations]
      summary: 幂等登记 Artifact 为 Asset/AssetVersion
      operationId: register_artifact
      description: >-
        仅接受当前 owner 可见且 processing_status=ready 的 Artifact。首次成功登记创建或追加
        AssetVersion，并复用 Blob 创建 original Representation；重复请求返回同一结果。
      x-permission: asset.artifact.register
      x-s1-refs:
        user_stories: [US-USER-ASSET-41, US-USER-ASSET-43]
        business_rules: [BR-USER-ASSET-64, BR-USER-ASSET-65, BR-USER-ASSET-66, BR-USER-ASSET-67, BR-USER-ASSET-69]
      parameters:
        - {name: artifact_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterArtifactRequest'}
      responses:
        '200':
          description: 登记结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ArtifactRegistrationResponse'
                  - $ref: '#/components/schemas/BusinessError'

  /api/v1/artifact-registrations:
    post:
      deprecated: true
      tags: [artifact-registrations]
      summary: 兼容入口：幂等登记 Artifact
      operationId: register_artifact_compat
      description: 兼容旧调用方；行为与 `POST /api/v1/artifacts/{artifact_id}/register` 相同。
      x-permission: asset.artifact.register
      x-s1-refs:
        user_stories: [US-USER-ASSET-41]
        business_rules: [BR-USER-ASSET-67, BR-USER-ASSET-69]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ArtifactRegistrationRequest'}
      responses:
        '200':
          description: 登记结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/ArtifactRegistrationResponse'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/assets/{asset_id}/versions:
    get:
      tags: [representations]
      summary: 查询 AssetVersion 列表
      operationId: list_asset_versions
      x-permission: asset.representation.read
      x-s1-refs:
        user_stories: [US-USER-ASSET-43, US-USER-ASSET-45]
        business_rules: [BR-USER-ASSET-69, BR-USER-ASSET-72, BR-USER-ASSET-77]
      parameters:
        - {name: asset_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 版本列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/AssetVersionListResponse'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/asset-versions/{asset_version_id}/representations:
    get:
      tags: [representations]
      summary: 查询 AssetRepresentation
      operationId: list_asset_representations
      x-permission: asset.representation.read
      x-s1-refs:
        user_stories: [US-USER-ASSET-43, US-USER-ASSET-44]
        business_rules: [BR-USER-ASSET-70, BR-USER-ASSET-72, BR-USER-ASSET-74]
      parameters:
        - {name: asset_version_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: Representation 列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/AssetRepresentationListResponse'}
                  - {$ref: '#/components/schemas/BusinessError'}
    post:
      tags: [representations]
      summary: Worker 幂等登记 AssetRepresentation
      operationId: register_asset_representation
      x-permission: asset.representation.write
      x-s1-refs:
        user_stories: [US-USER-ASSET-43, US-USER-ASSET-44]
        business_rules: [BR-USER-ASSET-67, BR-USER-ASSET-70, BR-USER-ASSET-71, BR-USER-ASSET-74]
      parameters:
        - {name: asset_version_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterRepresentationRequest'}
      responses:
        '200':
          description: Representation 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/AssetRepresentation'}
                  - {$ref: '#/components/schemas/BusinessError'}

components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    page_num:
      name: page_num
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    page_size:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    keyword:
      name: keyword
      in: query
      description: 对 search_fields 指定字段执行模糊搜索；可与 selector 和精确过滤条件按 AND 组合。
      schema: { type: string, maxLength: 256, default: "" }
    search_fields:
      name: search_fields
      in: query
      description: 逗号分隔且不得重复；仅允许 display_name、original_name、description。
      schema:
        type: string
        pattern: '^(display_name|original_name|description)(,(display_name|original_name|description))*$'
        default: display_name,original_name,description
    selector:
      name: selector
      in: query
      description: 统一 Label/Tag/分组选择器；与 natural_language_query 互斥。
      schema: { type: string, maxLength: 4096 }
    natural_language_query:
      name: natural_language_query
      in: query
      description: 自然语言查询；与 selector、keyword 互斥，允许和普通精确过滤条件按 AND 组合。
      schema: { type: string, minLength: 1, maxLength: 1000 }
    created_after:
      name: created_after
      in: query
      schema: { type: string, format: date-time }
    created_before:
      name: created_before
      in: query
      schema: { type: string, format: date-time }

  schemas:
    MediaType:
      type: string
      enum: [image, video, audio, text, document, model_3d, prompt, prompt_template, pdf, other]
    SourceType:
      type: string
      enum: [upload, canvas_output, application_output]
    LabelSource:
      type: string
      enum: [manual, auto]
    QueryRequestedMode:
      type: string
      enum: [filters_only, selector, keyword, combined, natural_language]
    QueryAppliedMode:
      type: string
      enum: [filters_only, selector, keyword, combined, keyword_fallback]
    QueryResolution:
      type: object
      required: [requested_mode, applied_mode]
      properties:
        requested_mode:
          $ref: "#/components/schemas/QueryRequestedMode"
        applied_mode:
          $ref: "#/components/schemas/QueryAppliedMode"
        resolved_selector:
          type: string
          maxLength: 4096
          nullable: true
          description: 自然语言成功解析后的规范化 selector；其他模式省略或返回 null。
    UserAsset:
      type: object
      required: [id, owner_user_id, display_name, media_type, size_bytes, source_type, status, thumbnail_status, labels, tags, label_sources, tag_sources, resource_version, created_at, updated_at]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        display_name: { type: string }
        original_name: { type: string }
        description: { type: string }
        media_type:
          $ref: "#/components/schemas/MediaType"
        format: { type: string }
        size_bytes: { type: integer, format: int64, minimum: 0 }
        width: { type: integer, minimum: 0 }
        height: { type: integer, minimum: 0 }
        duration_seconds: { type: number, minimum: 0 }
        source_type:
          $ref: "#/components/schemas/SourceType"
        status: {type: string, enum: [active, archived, deleted]}
        current_version_id: {type: string, nullable: true}
        thumbnail_status:
          type: string
          enum: [none, pending, ready, failed]
        preview_status:
          type: string
          enum: [none, pending, ready, failed]
        labels:
          $ref: "#/components/schemas/Labels"
        tags:
          $ref: "#/components/schemas/Tags"
        label_sources:
          $ref: "#/components/schemas/LabelSources"
        tag_sources:
          $ref: "#/components/schemas/TagSources"
        resource_version: { type: integer, minimum: 0 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ArtifactRegistrationRequest:
      allOf:
        - {$ref: '#/components/schemas/RegisterArtifactRequest'}
        - type: object
          required: [artifact_id]
          properties:
            artifact_id: {type: string}
    RegisterArtifactRequest:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode: {type: string, enum: [create_asset, append_version]}
        asset_id: {type: string, nullable: true, description: append_version 时必填且必须属于 Artifact owner。}
        name: {type: string, minLength: 1, maxLength: 255}
        version_note: {type: string, maxLength: 1000}
        profile_version: {type: string, minLength: 1, maxLength: 128}
    ArtifactRegistrationResponse:
      type: object
      required: [artifact_id, registration_result, asset, asset_version]
      properties:
        artifact_id: {type: string}
        registration_result: {type: string, enum: [created, already_registered]}
        asset: {$ref: '#/components/schemas/UserAsset'}
        asset_version: {$ref: '#/components/schemas/AssetVersion'}
    CreateArtifactRequest:
      type: object
      additionalProperties: false
      required: [producer_type, producer_id, producer_idempotency_key, output_key, sequence, artifact_type, media_type, save_policy, processing_profile_version]
      properties:
        producer_type: {type: string, enum: [application_run, canvas_run, atomic_task]}
        producer_id: {type: string}
        producer_idempotency_key: {type: string, minLength: 1, maxLength: 512}
        atomic_task_id: {type: string, nullable: true}
        task_attempt_id: {type: string, nullable: true}
        application_run_id: {type: string, nullable: true}
        canvas_run_id: {type: string, nullable: true}
        node_run_id: {type: string, nullable: true}
        node_id: {type: string, nullable: true}
        output_key: {type: string, minLength: 1, maxLength: 255}
        sequence: {type: integer, minimum: 0}
        artifact_type: {type: string, minLength: 1, maxLength: 128}
        media_type: {$ref: '#/components/schemas/MediaType'}
        save_policy: {type: string, enum: [transient, manual_save, auto_save]}
        processing_profile_version: {type: string, minLength: 1, maxLength: 128}
        expires_at: {type: string, format: date-time, nullable: true}
        metadata: {type: object, additionalProperties: true}
    CompleteArtifactRequest:
      type: object
      additionalProperties: false
      required: [sha256, size_bytes, mime_type, processing_profile_version]
      properties:
        sha256: {type: string, minLength: 64, maxLength: 64}
        size_bytes: {type: integer, format: int64, minimum: 0}
        mime_type: {type: string, minLength: 1, maxLength: 255}
        processing_profile_version: {type: string, minLength: 1, maxLength: 128}
        metadata: {type: object, additionalProperties: true}
    Artifact:
      type: object
      required: [id, owner_user_id, producer_type, producer_id, producer_idempotency_key, output_key, sequence, artifact_type, media_type, processing_status, registration_status, save_policy, processing_profile_version, preview_available, resource_version, created_at, updated_at]
      properties:
        id: {type: string}
        owner_user_id: {type: string}
        producer_type: {type: string, enum: [application_run, canvas_run, atomic_task]}
        producer_id: {type: string}
        producer_idempotency_key: {type: string}
        atomic_task_id: {type: string, nullable: true}
        task_attempt_id: {type: string, nullable: true}
        application_run_id: {type: string, nullable: true}
        canvas_run_id: {type: string, nullable: true}
        node_run_id: {type: string, nullable: true}
        node_id: {type: string, nullable: true}
        output_key: {type: string}
        sequence: {type: integer, minimum: 0}
        artifact_type: {type: string}
        media_type: {$ref: '#/components/schemas/MediaType'}
        processing_status: {type: string, enum: [created, transferring, processing, ready, failed, deleted]}
        registration_status: {type: string, enum: [pending, registered, failed]}
        save_policy: {type: string, enum: [transient, manual_save, auto_save]}
        processing_profile_version: {type: string}
        preview_available: {type: boolean}
        preview_ref: {type: string, nullable: true, description: 受保护短期引用。}
        thumbnail_ref: {type: string, nullable: true, description: 受保护短期引用。}
        asset_id: {type: string, nullable: true}
        asset_version_id: {type: string, nullable: true}
        processing_error_code: {type: string, nullable: true}
        registration_error_code: {type: string, nullable: true}
        expires_at: {type: string, format: date-time, nullable: true}
        resource_version: {type: integer, minimum: 0}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    ArtifactListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer, minimum: 0}
        items: {type: array, items: {$ref: '#/components/schemas/Artifact'}}
    AssetVersion:
      type: object
      required: [id, asset_id, owner_user_id, version_no, status, source_type, profile_version, expected_count, completed_count, failed_count, resource_version, created_at, updated_at]
      properties:
        id: {type: string}
        asset_id: {type: string}
        owner_user_id: {type: string}
        version_no: {type: integer, minimum: 1}
        status: {type: string, enum: [uploading, processing, ready, ready_with_warnings, failed]}
        source_type: {type: string, enum: [upload, artifact, asset_edit, asset_conversion, external_import]}
        source_ref_id: {type: string, nullable: true}
        profile_version: {type: string}
        expected_count: {type: integer, minimum: 0}
        completed_count: {type: integer, minimum: 0}
        failed_count: {type: integer, minimum: 0}
        resource_version: {type: integer, minimum: 0}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    AssetRepresentation:
      type: object
      required: [id, asset_version_id, representation_type, profile, profile_version, status, required, retry_count, resource_version, created_at, updated_at]
      properties:
        id: {type: string}
        asset_version_id: {type: string}
        representation_type: {type: string, enum: [original, canonical, thumbnail, preview, playback, package, manifest]}
        profile: {type: string}
        profile_version: {type: string}
        blob_id: {type: string, nullable: true}
        status: {type: string, enum: [pending, processing, ready, failed, irreparable, deleted]}
        required: {type: boolean}
        retry_count: {type: integer, minimum: 0}
        error_code: {type: string, nullable: true}
        error_detail: {type: string, nullable: true}
        resource_version: {type: integer, minimum: 0}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    RegisterRepresentationRequest:
      type: object
      additionalProperties: false
      required: [representation_type, profile, profile_version, status, required]
      properties:
        representation_type: {type: string, enum: [original, canonical, thumbnail, preview, playback, package, manifest]}
        profile: {type: string, minLength: 1, maxLength: 128}
        profile_version: {type: string, minLength: 1, maxLength: 128}
        blob_id: {type: string, nullable: true}
        content: {type: object, additionalProperties: true}
        metadata: {type: object, additionalProperties: true}
        status: {type: string, enum: [ready, failed, irreparable]}
        required: {type: boolean}
        error_code: {type: string, nullable: true}
        error_detail: {type: string, nullable: true}
    AssetVersionListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer, minimum: 0}
        items: {type: array, items: {$ref: '#/components/schemas/AssetVersion'}}
    AssetRepresentationListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer, minimum: 0}
        items: {type: array, items: {$ref: '#/components/schemas/AssetRepresentation'}}
    Labels:
      type: object
      description: |
        trim 后最多 20 项。key 为 1-63 个 Unicode code point，禁止空白、控制字符和
        `,;()=!"#@`；value 为 0-63 个 Unicode code point。key/value 区分大小写。
      maxProperties: 20
      additionalProperties:
        type: string
        maxLength: 63
    Tags:
      type: array
      description: trim 后区分大小写去重且无序，最多 30 项，每项 1-64 个 Unicode code point。
      maxItems: 30
      uniqueItems: true
      items: { type: string, minLength: 1, maxLength: 64 }
    LabelSources:
      type: object
      description: key 必须与 labels 中的 key 完全一致。
      maxProperties: 20
      additionalProperties:
        $ref: "#/components/schemas/LabelSource"
    TagSources:
      type: object
      description: key 必须与 tags 中的值完全一致。
      maxProperties: 30
      additionalProperties:
        $ref: "#/components/schemas/LabelSource"
    AssetListResponse:
      type: object
      required: [total, items, query_resolution]
      properties:
        total: { type: integer, minimum: 0 }
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserAsset"
        query_resolution:
          $ref: "#/components/schemas/QueryResolution"
    BatchAssetItem:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id: { type: string, minLength: 1 }
    BatchLabelRequest:
      type: object
      additionalProperties: false
      required: [items]
      description: |
        items 中 id 必须唯一且至少提供一项实际标签变更。tags_to_add 与 tags_to_remove
        trim、去重后不得有交集。请求字段上限先做整体校验；每个素材变更后的 20/30 上限逐项校验。
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/BatchAssetItem"
        labels_to_upsert:
          $ref: "#/components/schemas/Labels"
        tags_to_add:
          $ref: "#/components/schemas/Tags"
        tags_to_remove:
          $ref: "#/components/schemas/Tags"
    BatchLabelData:
      type: object
      required: [id, labels, tags, label_sources, tag_sources, resource_version]
      properties:
        id: { type: string }
        labels:
          $ref: "#/components/schemas/Labels"
        tags:
          $ref: "#/components/schemas/Tags"
        label_sources:
          $ref: "#/components/schemas/LabelSources"
        tag_sources:
          $ref: "#/components/schemas/TagSources"
        resource_version: { type: integer, minimum: 0 }
    BusinessError:
      type: object
      required: [code, value, message, messages, retryable]
      properties:
        code: { type: string }
        value: { type: integer }
        message: { type: string }
        messages:
          type: object
          required: [zh-CN, en-US]
          properties:
            zh-CN: { type: string }
            en-US: { type: string }
        detail: { type: string }
        retryable: { type: boolean }
        data:
          type: object
          additionalProperties: true
          description: selector 错误时至少包含 position、actual_token、expected_tokens；其他错误按错误码提供上下文。
    BatchLabelResult:
      type: object
      required: [id, success]
      properties:
        id: { type: string }
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/BatchLabelData"
        error:
          $ref: "#/components/schemas/BusinessError"
    BatchLabelResponse:
      type: object
      required: [total, success, fail, results]
      properties:
        total: { type: integer, minimum: 0 }
        success: { type: integer, minimum: 0 }
        fail: { type: integer, minimum: 0 }
        results:
          type: array
          items:
            $ref: "#/components/schemas/BatchLabelResult"
