    AssetLineage:
      type: object
      required: [asset_id, nodes, edges]
      properties:
        asset_id: {type: string}
        nodes: {type: array, items: {$ref: '#/components/schemas/UserAsset'}}
        edges: {type: array, items: {$ref: '#/components/schemas/AssetRelation'}}
    AssetReference:
      type: object
      required: [id, asset_id, source_type, source_id, version_policy, created_at]
      properties:
        id: {type: string}
        asset_id: {type: string}
        asset_version_id: {type: string, nullable: true}
        source_type: {type: string, enum: [canvas, application, atomic_task, application_run, canvas_run, collection, asset_relation]}
        source_id: {type: string}
        source_label: {type: string}
        version_policy: {type: string, enum: [latest, pinned]}
        created_at: {type: string, format: date-time}
    AssetReferenceListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer, minimum: 0}
        items: {type: array, items: {$ref: '#/components/schemas/AssetReference'}}
    AssetUsage:
      type: object
      required: [source_type, source_id, source_label]
      properties:
        source_type: {type: string}
        source_id: {type: string}
        source_label: {type: string}
        location: {type: object, additionalProperties: true}
    AssetUsageListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer, minimum: 0}
        items: {type: array, items: {$ref: '#/components/schemas/AssetUsage'}}
    ReferenceSummary:
      type: object
      required: [reference_count, sources]
      properties:
        reference_count: {type: integer, minimum: 0}
        sources: {type: array, items: {$ref: '#/components/schemas/AssetReference'}}
    BusinessError:
      type: object
      required: [code, value, message, messages, retryable]
      properties:
        code: { type: string }
        value: { type: integer }
        message: { type: string }
        messages:
          type: object
          required: [zh-CN, en-US]
          properties:
            zh-CN: { type: string }
            en-US: { type: string }
        detail: { type: string }
        retryable: { type: boolean }
        data:
          type: object
          additionalProperties: true
          description: selector 错误时至少包含 position、actual_token、expected_tokens；其他错误按错误码提供上下文。
    BatchLabelResult:
      type: object
      required: [id, success]
      properties:
        id: { type: string }
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/BatchLabelData"
        error:
          $ref: "#/components/schemas/BusinessError"
    BatchLabelResponse:
      type: object
      required: [total, success, fail, results]
      properties:
        total: { type: integer, minimum: 0 }
        success: { type: integer, minimum: 0 }
        fail: { type: integer, minimum: 0 }
        results:
          type: array
          items:
            $ref: "#/components/schemas/BatchLabelResult"
