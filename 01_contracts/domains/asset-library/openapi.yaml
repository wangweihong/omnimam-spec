openapi: 3.0.3
info:
  title: OmniMAM Asset Library API
  version: 0.3.0-draft
  description: 素材、上传、Collection、Artifact、AssetVersion、AssetRepresentation、内容访问与周期修复协作契约。
servers:
  - url: /api/v1
security:
  - bearer_auth: []
tags:
  - name: assets
    description: 当前用户素材创建、查询、更新、回收站与引用聚合。
  - name: asset-uploads
    description: 当前用户普通或分片素材上传会话。
  - name: collections
    description: 当前用户 Collection 与成员关系。
  - name: labeling
    description: 当前用户素材 Label 与 Tag。
  - name: artifact-registrations
    description: Artifact 到 Asset/AssetVersion 的幂等登记。
  - name: artifacts
    description: 受信 producer 创建、上传、完成和查询 Artifact。
  - name: representations
    description: AssetVersion 与 AssetRepresentation 查询和受控写入。

paths:
  /api/v1/assets:
    get:
      tags: [assets]
      summary: 查询当前用户素材列表
      operationId: list_assets
      x-permission: asset.read
      description: |
        所有条件均在当前 Bearer Token 对应的用户范围内执行。`selector` 与
        `natural_language_query` 互斥；`keyword` 可以与 selector 和精确过滤条件组合，
        条件之间按 AND 执行。`natural_language_query` 可与普通精确过滤条件组合，
        但不得与 `selector` 或 `keyword` 同时提交。

        selector 文法：Label 支持 `key=value`、`key!=value`、`key`、`!key`、
        `key in (v1,v2)`、`key notin (v1,v2)`；Tag 支持 `#tag`、`#-tag`；
        分组支持 `@group=value`。`,` 为 AND，`;` 为 OR，AND 优先于 OR，括号可覆盖优先级。
        空 Label value 仅写作 `key=""`。含空白或保留字符的 value、Tag、分组名使用
        JSON 风格双引号及转义，例如 `#"人物,汽车"`。最大嵌套深度 8、谓词数 100，
        单个 `in/notin` 最多 100 个非空值。Label、Tag 匹配区分大小写。
      x-s1-refs:
        user_stories: [US-USER-ASSET-01, US-USER-ASSET-03, US-USER-ASSET-04, US-USER-ASSET-20, US-USER-ASSET-22, US-USER-ASSET-24, US-USER-ASSET-27, US-USER-ASSET-28, US-USER-ASSET-38]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-05, BR-USER-ASSET-08, BR-USER-ASSET-09, BR-USER-ASSET-10, BR-USER-ASSET-35, BR-USER-ASSET-37, BR-USER-ASSET-39, BR-USER-ASSET-52]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
        - $ref: "#/components/parameters/search_fields"
        - $ref: "#/components/parameters/selector"
        - $ref: "#/components/parameters/natural_language_query"
        - $ref: "#/components/parameters/created_after"
        - $ref: "#/components/parameters/created_before"
        - name: media_type
          in: query
          schema:
            $ref: "#/components/schemas/MediaType"
        - name: format
          in: query
          schema:
            type: string
            maxLength: 64
        - name: source_type
          in: query
          schema:
            $ref: "#/components/schemas/SourceType"
        - name: status
          in: query
          description: 默认查询 active,archived；显式 deleted 用于回收站。
          schema: {type: string, enum: [active, archived, deleted]}
        - name: width
          in: query
          schema: { type: integer, minimum: 0 }
        - name: height
          in: query
          schema: { type: integer, minimum: 0 }
        - name: sort_field
          in: query
          description: 排序字段；默认按 created_at 排序。
          schema:
            type: string
            enum: [display_name, size_bytes, media_type, format, created_at, updated_at]
            default: created_at
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: 素材列表或业务错误；业务结果通过响应体结构与 code/value 判断。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AssetListResponse"
                  - $ref: "#/components/schemas/BusinessError"
    post:
      tags: [assets]
      summary: 创建 canonical 内容素材
      operationId: create_asset
      description: 二进制素材必须使用 AssetUpload；本入口只创建 text、prompt 或 prompt_template canonical 内容。
      x-permission: asset.create
      x-s1-refs:
        user_stories: [US-USER-ASSET-06]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-03, BR-USER-ASSET-19]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateCanonicalAssetRequest'}
      responses:
        '200':
          description: 已创建素材详情或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/AssetDetail'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/assets/{asset_id}:
    get:
      tags: [assets]
      summary: 查询素材详情
      operationId: get_asset
      x-permission: asset.read
      x-s1-refs:
        user_stories: [US-USER-ASSET-10, US-USER-ASSET-18]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-03, BR-USER-ASSET-20, BR-USER-ASSET-23]
      parameters:
        - {name: asset_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 素材详情或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/AssetDetail'}
                  - {$ref: '#/components/schemas/BusinessError'}
    patch:
      tags: [assets]
      summary: 更新素材名称、描述或归档状态
      operationId: update_asset
      x-permission: asset.update
      x-s1-refs:
        user_stories: [US-USER-ASSET-14]
        business_rules: [BR-USER-ASSET-03, BR-USER-ASSET-24, BR-USER-ASSET-32]
      parameters:
        - {name: asset_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateAssetRequest'}
      responses:
        '200':
          description: 更新后的素材或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/UserAsset'}
                  - {$ref: '#/components/schemas/BusinessError'}
    delete:
      tags: [assets]
      summary: 将素材移入回收站
      operationId: delete_asset
      x-permission: asset.delete
      x-s1-refs:
        user_stories: [US-USER-ASSET-15]
        business_rules: [BR-USER-ASSET-03, BR-USER-ASSET-25, BR-USER-ASSET-26]
      parameters:
        - {name: asset_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 已软删除素材或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/UserAsset'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/assets/{asset_id}/restore:
    post:
      tags: [assets]
      summary: 从回收站恢复素材
      operationId: restore_asset
      x-permission: asset.delete
      x-s1-refs:
        user_stories: [US-USER-ASSET-15]
        business_rules: [BR-USER-ASSET-03, BR-USER-ASSET-25, BR-USER-ASSET-26]
      parameters:
        - {name: asset_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 已恢复素材或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/UserAsset'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/assets/{asset_id}/permanent:
    delete:
      tags: [assets]
      summary: 永久删除回收站素材
      operationId: permanently_delete_asset
      description: 执行画布、应用、运行、Collection、AssetRelation、Representation、Artifact 与 Blob 强引用检查；存在阻塞引用时不删除任何事实。
      x-permission: asset.delete
      x-s1-refs:
        user_stories: [US-USER-ASSET-15, US-USER-ASSET-40]
        business_rules: [BR-USER-ASSET-03, BR-USER-ASSET-25, BR-USER-ASSET-57, BR-USER-ASSET-58]
      parameters:
        - {name: asset_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 永久删除结果、阻塞引用错误或其他业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/PermanentDeleteResult'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/assets/batch-labels:
    post:
      tags: [assets]
      summary: 批量应用 Labels 与 Tags
      operationId: batch_apply_asset_labels
      x-permission: asset.label.manage
      description: |
        每个素材独立校验并提交，单项失败不回滚其他合法项。请求中的 Label upsert、
        Tag 添加和 Tag 删除均按 trim 后的区分大小写原文处理；写入来源统一为 manual。
        Label 同 key 覆盖，Tag 添加与删除为幂等操作。不提供批量删除 Label 能力。
      x-s1-refs:
        user_stories: [US-USER-ASSET-23]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-03, BR-USER-ASSET-32, BR-USER-ASSET-35, BR-USER-ASSET-36, BR-USER-ASSET-40]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchLabelRequest"
      responses:
        "200":
          description: 逐项批量结果或请求级业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BatchLabelResponse"
                  - $ref: "#/components/schemas/BusinessError"

  /api/v1/asset-uploads:
    post:
      tags: [asset-uploads]
      summary: 批量初始化用户素材上传会话
      operationId: create_asset_uploads
      description: 服务端按文件大小返回 single 或 chunked；SHA256 命中当前用户可见素材时返回 existing_asset 并跳过二进制上传。
      x-permission: asset.upload
      x-s1-refs:
        user_stories: [US-USER-ASSET-05, US-USER-ASSET-06, US-USER-ASSET-07, US-USER-ASSET-31]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-03, BR-USER-ASSET-11, BR-USER-ASSET-12, BR-USER-ASSET-13, BR-USER-ASSET-14, BR-USER-ASSET-15, BR-USER-ASSET-41, BR-USER-ASSET-42]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateAssetUploadsRequest'}
      responses:
        '200':
          description: 逐文件初始化或去重结果，或请求级业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CreateAssetUploadsResponse'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/asset-uploads/{upload_id}/content:
    post:
      tags: [asset-uploads]
      summary: 上传单文件或一个分片的内容
      operationId: upload_asset_content
      description: single 会话不得提交 part_number；chunked 会话必须提交从 1 开始的 part_number、part_sha256 与 content_range。
      x-permission: asset.upload
      x-s1-refs:
        user_stories: [US-USER-ASSET-06, US-USER-ASSET-07]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-03, BR-USER-ASSET-13, BR-USER-ASSET-14, BR-USER-ASSET-15, BR-USER-ASSET-41]
      parameters:
        - {name: upload_id, in: path, required: true, schema: {type: string}}
        - {name: part_number, in: query, required: false, schema: {type: integer, minimum: 1}}
        - {name: part_sha256, in: header, required: false, schema: {type: string, pattern: '^[a-fA-F0-9]{64}$'}}
        - {name: content_range, in: header, required: false, schema: {type: string, pattern: '^bytes [0-9]+-[0-9]+/[0-9]+$'}}
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: {type: string, format: binary}
      responses:
        '200':
          description: 更新后的上传会话或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/AssetUploadSession'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/asset-uploads/{upload_id}/complete:
    post:
      tags: [asset-uploads]
      summary: 完成上传并创建素材版本
      operationId: complete_asset_upload
      description: 校验完整 SHA256 后，在事务中创建或追加 AssetVersion、Blob、original Representation，并写 Representation 请求 outbox。
      x-permission: asset.upload
      x-s1-refs:
        user_stories: [US-USER-ASSET-06, US-USER-ASSET-07, US-USER-ASSET-09, US-USER-ASSET-31]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-03, BR-USER-ASSET-15, BR-USER-ASSET-18, BR-USER-ASSET-19, BR-USER-ASSET-41, BR-USER-ASSET-42]
      parameters:
        - {name: upload_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CompleteAssetUploadRequest'}
      responses:
        '200':
          description: 上传完成结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CompleteAssetUploadResponse'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/asset-uploads/{upload_id}:
    delete:
      tags: [asset-uploads]
      summary: 取消上传会话
      operationId: cancel_asset_upload
      x-permission: asset.upload
      x-s1-refs:
        user_stories: [US-USER-ASSET-08]
        business_rules: [BR-USER-ASSET-02, BR-USER-ASSET-03, BR-USER-ASSET-16, BR-USER-ASSET-17]
      parameters:
        - {name: upload_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 已取消会话或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/AssetUploadSession'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/collections:
    get:
      tags: [collections]
      summary: 查询当前用户 Collection
      operationId: list_collections
      x-permission: asset.collection.read
      x-s1-refs:
        user_stories: [US-USER-ASSET-34, US-USER-ASSET-36]
        business_rules: [BR-USER-ASSET-49, BR-USER-ASSET-52, BR-USER-ASSET-53, BR-USER-ASSET-55]
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {name: keyword, in: query, description: 按 Collection name、description 模糊搜索。, schema: {type: string, maxLength: 256, default: ''}}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
        - {name: parent_collection_id, in: query, schema: {type: string}}
        - {name: sort_field, in: query, schema: {type: string, enum: [name, sort_order, created_at, updated_at], default: sort_order}}
        - {name: sort_order, in: query, schema: {type: string, enum: [asc, desc], default: asc}}
      responses:
        '200':
          description: Collection 列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CollectionListResponse'}
                  - {$ref: '#/components/schemas/BusinessError'}
    post:
      tags: [collections]
      summary: 创建 Collection
      operationId: create_collection
      x-permission: asset.collection.manage
      x-s1-refs:
        user_stories: [US-USER-ASSET-34]
        business_rules: [BR-USER-ASSET-49, BR-USER-ASSET-55]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateCollectionRequest'}
      responses:
        '200':
          description: 已创建 Collection 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Collection'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/collections/{collection_id}:
    get:
      tags: [collections]
      summary: 查询 Collection 详情与成员
      operationId: get_collection
      x-permission: asset.collection.read
      x-s1-refs:
        user_stories: [US-USER-ASSET-34, US-USER-ASSET-36]
        business_rules: [BR-USER-ASSET-49, BR-USER-ASSET-51, BR-USER-ASSET-53]
      parameters:
        - {name: collection_id, in: path, required: true, schema: {type: string}}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
      responses:
        '200':
          description: Collection 详情或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CollectionDetail'}
                  - {$ref: '#/components/schemas/BusinessError'}
    patch:
      tags: [collections]
      summary: 更新 Collection
      operationId: update_collection
      x-permission: asset.collection.manage
      x-s1-refs:
        user_stories: [US-USER-ASSET-34]
        business_rules: [BR-USER-ASSET-49, BR-USER-ASSET-53, BR-USER-ASSET-55]
      parameters:
        - {name: collection_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateCollectionRequest'}
      responses:
        '200':
          description: 更新后的 Collection 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Collection'}
                  - {$ref: '#/components/schemas/BusinessError'}
    delete:
      tags: [collections]
      summary: 删除 Collection 及成员关系
      operationId: delete_collection
      description: 只删除 Collection 与成员关系，不删除任何 Asset。
      x-permission: asset.collection.manage
      x-s1-refs:
        user_stories: [US-USER-ASSET-34]
        business_rules: [BR-USER-ASSET-49, BR-USER-ASSET-50, BR-USER-ASSET-51]
      parameters:
        - {name: collection_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 删除结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/DeleteResult'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/collections/{collection_id}/items:
    post:
      tags: [collections]
      summary: 批量加入 Collection
      operationId: add_collection_items
      x-permission: asset.collection.manage
      x-s1-refs:
        user_stories: [US-USER-ASSET-35, US-USER-ASSET-39]
        business_rules: [BR-USER-ASSET-49, BR-USER-ASSET-51, BR-USER-ASSET-54, BR-USER-ASSET-56]
      parameters:
        - {name: collection_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AddCollectionItemsRequest'}
      responses:
        '200':
          description: 逐项添加结果或请求级业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CollectionItemBatchResponse'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/collections/{collection_id}/items/{item_id}:
    patch:
      tags: [collections]
      summary: 更新 Collection 成员固定版本、角色或排序
      operationId: update_collection_item
      x-permission: asset.collection.manage
      x-s1-refs:
        user_stories: [US-USER-ASSET-35, US-USER-ASSET-39]
        business_rules: [BR-USER-ASSET-49, BR-USER-ASSET-51, BR-USER-ASSET-53, BR-USER-ASSET-56]
      parameters:
        - {name: collection_id, in: path, required: true, schema: {type: string}}
        - {name: item_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateCollectionItemRequest'}
      responses:
        '200':
          description: 更新后的成员或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CollectionItem'}
                  - {$ref: '#/components/schemas/BusinessError'}
    delete:
      tags: [collections]
      summary: 从 Collection 移除素材
      operationId: delete_collection_item
      x-permission: asset.collection.manage
      x-s1-refs:
        user_stories: [US-USER-ASSET-37, US-USER-ASSET-39]
        business_rules: [BR-USER-ASSET-50, BR-USER-ASSET-51, BR-USER-ASSET-56]
      parameters:
        - {name: collection_id, in: path, required: true, schema: {type: string}}
        - {name: item_id, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: 移除结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/DeleteResult'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/assets/{asset_id}/labels:
    put:
      tags: [labeling]
      summary: 整体保存素材 Labels
      operationId: replace_asset_labels
      x-permission: asset.label.manage
      x-s1-refs:
        user_stories: [US-USER-ASSET-19, US-USER-ASSET-25, US-USER-ASSET-26]
        business_rules: [BR-USER-ASSET-03, BR-USER-ASSET-35, BR-USER-ASSET-36]
      parameters:
        - {name: asset_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ReplaceLabelsRequest'}
      responses:
        '200':
          description: 完整标签结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/BatchLabelData'}
                  - {$ref: '#/components/schemas/BusinessError'}

  /api/v1/assets/{asset_id}/labels/{label_id}:
    delete:
      tags: [labeling]
      summary: 删除一个素材 Label
      operationId: delete_asset_label
      x-permission: asset.label.manage
      x-s1-refs:
