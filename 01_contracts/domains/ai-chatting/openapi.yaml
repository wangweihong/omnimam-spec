openapi: 3.0.3
info:
  title: OmniMAM AI Chatting API
  version: 0.2.0
  description: AI 聊天 S2 API 契约，覆盖话题、消息、generation、SSE、助手、快捷短语和翻译。
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: topics
  - name: messages
  - name: generations
  - name: assistants
  - name: quick-phrases
  - name: translations
paths:
  /api/v1/ai-chat/topics:
    get:
      tags: [topics]
      operationId: listChatTopics
      summary: 查询当前用户话题
      x-s1-refs:
        user_stories: [US-AICHAT-01, US-AICHAT-05]
        business_rules: [BR-AICHAT-01, BR-AICHAT-02, BR-AICHAT-23]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
      responses:
        "200":
          description: 当前用户话题列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicListResponse"
    post:
      tags: [topics]
      operationId: createChatTopic
      summary: 创建话题
      x-s1-refs:
        user_stories: [US-AICHAT-01, US-AICHAT-02]
        business_rules: [BR-AICHAT-01, BR-AICHAT-02, BR-AICHAT-24]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicCreateRequest"
      responses:
        "200":
          description: 已创建的话题。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
  /api/v1/ai-chat/topics/{topic_id}:
    get:
      tags: [topics]
      operationId: getChatTopic
      summary: 查询话题详情
      x-s1-refs:
        user_stories: [US-AICHAT-01, US-AICHAT-05]
        business_rules: [BR-AICHAT-01, BR-AICHAT-02]
      parameters:
        - $ref: "#/components/parameters/topic_id"
      responses:
        "200":
          description: 话题详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
    patch:
      tags: [topics]
      operationId: updateChatTopic
      summary: 更新话题
      x-s1-refs:
        user_stories: [US-AICHAT-01, US-AICHAT-06]
        business_rules: [BR-AICHAT-01, BR-AICHAT-02, BR-AICHAT-24]
      parameters:
        - $ref: "#/components/parameters/topic_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicUpdateRequest"
      responses:
        "200":
          description: 已更新的话题。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
    delete:
      tags: [topics]
      operationId: deleteChatTopic
      summary: 删除话题
      x-s1-refs:
        user_stories: [US-AICHAT-01]
        business_rules: [BR-AICHAT-02]
      parameters:
        - $ref: "#/components/parameters/topic_id"
      responses:
        "200":
          description: 删除结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/v1/ai-chat/topics/{topic_id}/messages:
    get:
      tags: [messages]
      operationId: listChatMessages
      summary: 查询话题消息
      x-s1-refs:
        user_stories: [US-AICHAT-01, US-AICHAT-05]
        business_rules: [BR-AICHAT-03]
      parameters:
        - $ref: "#/components/parameters/topic_id"
      responses:
        "200":
          description: 话题消息列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
    post:
      tags: [messages]
      operationId: sendChatMessage
      summary: 发送消息并创建生成任务
      x-s1-refs:
        user_stories: [US-AICHAT-02, US-AICHAT-08]
        business_rules: [BR-AICHAT-03, BR-AICHAT-04, BR-AICHAT-05, BR-AICHAT-14, BR-AICHAT-15, BR-AICHAT-16, BR-AICHAT-17, BR-AICHAT-18, BR-AICHAT-21, BR-AICHAT-22]
      parameters:
        - $ref: "#/components/parameters/topic_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: 已创建的 user message、assistant message 和 generation。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
  /api/v1/ai-chat/messages/{message_id}/regenerate:
    post:
      tags: [generations]
      operationId: regenerateAssistantMessage
      summary: 重新生成助手回复
      x-s1-refs:
        user_stories: [US-AICHAT-03]
        business_rules: [BR-AICHAT-06, BR-AICHAT-21]
      parameters:
        - $ref: "#/components/parameters/message_id"
      responses:
        "200":
          description: 重生成 generation。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationRun"
  /api/v1/ai-chat/messages/{message_id}/edit-regenerate:
    post:
      tags: [generations]
      operationId: editAndRegenerateMessage
      summary: 编辑用户消息并重新生成
      x-s1-refs:
        user_stories: [US-AICHAT-03]
        business_rules: [BR-AICHAT-07, BR-AICHAT-21]
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditRegenerateRequest"
      responses:
        "200":
          description: 编辑后新 generation。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
  /api/v1/ai-chat/generations/{generation_id}/events:
    get:
      tags: [generations]
      operationId: streamGenerationEvents
      summary: 订阅生成增量事件
      x-s1-refs:
        user_stories: [US-AICHAT-02, US-AICHAT-04]
        business_rules: [BR-AICHAT-04, BR-AICHAT-14, BR-AICHAT-20]
      parameters:
        - $ref: "#/components/parameters/generation_id"
      responses:
        "200":
          description: SSE 增量事件，包含 delta、done、failed、interrupted。
          content:
            text/event-stream:
              schema:
                type: string
  /api/v1/ai-chat/generations/{generation_id}/stop:
    post:
      tags: [generations]
      operationId: stopGeneration
      summary: 停止生成
      x-s1-refs:
        user_stories: [US-AICHAT-03]
        business_rules: [BR-AICHAT-04, BR-AICHAT-21]
      parameters:
        - $ref: "#/components/parameters/generation_id"
      responses:
        "200":
          description: 停止后的 generation。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationRun"
  /api/v1/ai-chat/assistants:
    get:
      tags: [assistants]
      operationId: listAssistants
      summary: 查询助手
      x-s1-refs:
        user_stories: [US-AICHAT-01, US-AICHAT-06]
        business_rules: [BR-AICHAT-02, BR-AICHAT-09, BR-AICHAT-10]
      parameters:
        - $ref: "#/components/parameters/keyword"
      responses:
        "200":
          description: 助手列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantListResponse"
    post:
      tags: [assistants]
      operationId: createAssistant
      summary: 创建助手
      x-s1-refs:
        user_stories: [US-AICHAT-06]
        business_rules: [BR-AICHAT-02, BR-AICHAT-10]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantCreateRequest"
      responses:
        "200":
          description: 已创建的助手。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assistant"
  /api/v1/ai-chat/assistants/{assistant_id}:
    patch:
      tags: [assistants]
      operationId: updateAssistant
      summary: 更新助手
      x-s1-refs:
        user_stories: [US-AICHAT-06]
        business_rules: [BR-AICHAT-09, BR-AICHAT-10]
      parameters:
        - $ref: "#/components/parameters/assistant_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantUpdateRequest"
      responses:
        "200":
          description: 已更新的助手。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assistant"
    delete:
      tags: [assistants]
      operationId: deleteAssistant
      summary: 删除助手
      x-s1-refs:
        user_stories: [US-AICHAT-06]
        business_rules: [BR-AICHAT-09]
      parameters:
        - $ref: "#/components/parameters/assistant_id"
      responses:
        "200":
          description: 删除结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/v1/ai-chat/quick-phrases:
    get:
      tags: [quick-phrases]
      operationId: listQuickPhrases
      summary: 查询快捷短语
      x-s1-refs:
        user_stories: [US-AICHAT-01, US-AICHAT-06]
        business_rules: [BR-AICHAT-02, BR-AICHAT-11]
      responses:
        "200":
          description: 快捷短语列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickPhraseListResponse"
    post:
      tags: [quick-phrases]
      operationId: createQuickPhrase
      summary: 创建快捷短语
      x-s1-refs:
        user_stories: [US-AICHAT-06]
        business_rules: [BR-AICHAT-02, BR-AICHAT-11]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuickPhraseCreateRequest"
      responses:
        "200":
          description: 已创建的快捷短语。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickPhrase"
  /api/v1/ai-chat/translations:
    post:
      tags: [translations]
      operationId: translateChatContent
      summary: 翻译聊天内容
      x-s1-refs:
        user_stories: [US-AICHAT-09]
        business_rules: [BR-AICHAT-12, BR-AICHAT-13, BR-AICHAT-14]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationRequest"
      responses:
        "200":
          description: 翻译结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageTranslation"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    page_num:
      name: page_num
      in: query
      schema: { type: integer, default: 0, minimum: 0 }
    page_size:
      name: page_size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    keyword:
      name: keyword
      in: query
      schema: { type: string, default: "" }
    topic_id:
      name: topic_id
      in: path
      required: true
      schema: { type: string }
    message_id:
      name: message_id
      in: path
      required: true
      schema: { type: string }
    generation_id:
      name: generation_id
      in: path
      required: true
      schema: { type: string }
    assistant_id:
      name: assistant_id
      in: path
      required: true
      schema: { type: string }
  schemas:
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
    MessageStatus:
      type: string
      enum: [queued, generating, done, interrupted, failed]
    GenerationStatus:
      type: string
      enum: [queued, generating, done, interrupted, failed]
    Operation:
      type: string
      enum: [chat, translate]
    Topic:
      type: object
      required: [id, owner_user_id, title, pinned, assistant_id, model_id, last_active_at, created_at, updated_at]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        title: { type: string }
        pinned: { type: boolean }
        assistant_id: { type: string }
        assistant: { $ref: '#/components/schemas/AssistantSummary', nullable: true, readOnly: true }
        model_id:
          type: string
          description: 引用 model-management.UserProviderModel.id。
        model: { $ref: '#/components/schemas/ProviderModelRefSummary', nullable: true, readOnly: true }
        branch_source: { type: object, additionalProperties: true }
        last_active_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TopicCreateRequest:
      type: object
      properties:
        title: { type: string }
        assistant_id: { type: string }
        model_id: { type: string }
    TopicUpdateRequest:
      type: object
      properties:
        title: { type: string }
        pinned: { type: boolean }
        assistant_id: { type: string }
        model_id: { type: string }
    Assistant:
      type: object
      required: [id, owner_user_id, name, is_system, use_suggested_model, stream_enabled, created_at, updated_at]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        name: { type: string }
        system_prompt: { type: string }
        is_system: { type: boolean }
        suggested_model_id:
          type: string
          description: 引用 model-management.UserProviderModel.id。
        suggested_model: { $ref: '#/components/schemas/ProviderModelRefSummary', nullable: true, readOnly: true }
        use_suggested_model: { type: boolean }
        context_message_count: { type: integer }
        stream_enabled: { type: boolean }
        tool_call_mode: { type: string, enum: [none, manual, auto] }
        max_tool_call_count: { type: integer }
        temperature: { type: number }
        top_p: { type: number }
        max_tokens: { type: integer }
        custom_params: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AssistantCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        system_prompt: { type: string }
        suggested_model_id: { type: string }
        use_suggested_model: { type: boolean }
        runtime_config: { type: object, additionalProperties: true }
    AssistantUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/AssistantCreateRequest"
    Message:
      type: object
      required: [id, topic_id, role, content, status, version, created_at, updated_at]
      properties:
        id: { type: string }
        topic_id: { type: string, description: 消息列表 endpoint 已由父 Topic 限定，客户端无需按该 ID 补查 Topic。 }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        status:
          $ref: "#/components/schemas/MessageStatus"
        version: { type: integer }
        parent_message_id: { type: string, description: 父消息来自同一 Topic 消息集合，客户端按当前列表构建分支，不递归展开。 }
        model_snapshot:
          type: object
          additionalProperties: true
          description: 生成时来自 model-management 的模型快照。
        assistant_snapshot:
          type: object
          additionalProperties: true
        attachment_icons:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ImageAttachmentInput:
      type: object
      required: [id, mime_type, size_bytes, base64_data, not_persisted]
      properties:
        id: { type: string }
        message_id: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer }
        base64_data: { type: string }
        not_persisted: { type: boolean }
    GenerationRun:
      type: object
      required: [id, topic_id, assistant_message_id, operation, status]
      properties:
        id: { type: string }
        topic_id: { type: string, description: 当前 generation 操作已由 Topic 上下文限定。 }
        assistant_message_id: { type: string, description: SendMessageResponse 同时返回对应 assistant_message，不重复展开。 }
        operation:
          $ref: "#/components/schemas/Operation"
        status:
          $ref: "#/components/schemas/GenerationStatus"
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
        model_id: { type: string }
        assistant_id: { type: string }
        slash_command: { type: string }
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/ImageAttachmentInput"
    SendMessageResponse:
      type: object
      required: [user_message, assistant_message, generation]
      properties:
        user_message:
          $ref: "#/components/schemas/Message"
        assistant_message:
          $ref: "#/components/schemas/Message"
        generation:
          $ref: "#/components/schemas/GenerationRun"
    EditRegenerateRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
    QuickPhrase:
      type: object
      required: [id, owner_user_id, title, content, scope, phrase_type]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        title: { type: string }
        content: { type: string }
        scope: { type: string, enum: [global, assistant] }
        assistant_id: { type: string }
        assistant: { $ref: '#/components/schemas/AssistantSummary', nullable: true, readOnly: true }
        phrase_type: { type: string, enum: [plain, prompt] }
    QuickPhraseCreateRequest:
      type: object
      required: [title, content, scope, phrase_type]
      properties:
        title: { type: string }
        content: { type: string }
        scope: { type: string, enum: [global, assistant] }
        assistant_id: { type: string }
        phrase_type: { type: string, enum: [plain, prompt] }
    TranslationRequest:
      type: object
      required: [content, target_language]
      properties:
        message_id: { type: string }
        content: { type: string }
        target_language: { type: string }
    MessageTranslation:
      type: object
      required: [id, target_language, translated_content, model_snapshot, created_at]
      properties:
        id: { type: string }
        message_id: { type: string, description: 翻译动作已携带原消息上下文，历史模型信息由 model_snapshot 提供。 }
        target_language: { type: string }
        translated_content: { type: string }
        model_snapshot:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
    AssistantSummary:
      type: object
      description: AI Chat Assistant 的一跳可读摘要，不展开系统提示词或运行参数。
      x-s1-refs: {business_rules: [BR-GLOBAL-001, BR-GLOBAL-002, BR-GLOBAL-003, BR-AICHAT-25]}
      required: [id, name, is_system]
      properties:
        id: { type: string }
        name: { type: string }
        is_system: { type: boolean }
    ProviderModelRefSummary:
      type: object
      description: model-management 提供的当前用户模型一跳只读投影。
      x-s1-refs: {business_rules: [BR-GLOBAL-001, BR-GLOBAL-002, BR-GLOBAL-003, BR-GLOBAL-005, BR-AICHAT-02, BR-AICHAT-25]}
      required: [id, display_name, provider_id, provider_name, model, health_status, enabled]
      properties:
        id: { type: string }
        display_name: { type: string }
        provider_id: { type: string }
        provider_name: { type: string }
        model: { type: string }
        health_status: { type: string, enum: [unknown, healthy, unhealthy] }
        enabled: { type: boolean }
    TopicListResponse:
      type: object
      required: [total, items]
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/Topic"
    MessageListResponse:
      type: object
      required: [total, items]
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/Message"
    AssistantListResponse:
      type: object
      required: [total, items]
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/Assistant"
    QuickPhraseListResponse:
      type: object
      required: [total, items]
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuickPhrase"
