openapi: 3.0.3
info:
  title: OmniMAM Task Center API
  version: 1.3.0
  description: AtomicTask、组合任务、DAG 可观测详情、Schedule、Attempt、执行日志与汇总查询契约。
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - {name: atomic-tasks, description: 唯一业务执行单元。}
  - {name: task-groups, description: SERIAL/PARALLEL AtomicTask 组合。}
  - {name: dag-task-groups, description: AtomicTask DAG 编排。}
  - {name: task-schedules, description: 周期和单次调度。}

paths:
  /api/v1/atomic-tasks:
    get:
      tags: [atomic-tasks]
      summary: 查询 AtomicTask 列表
      operationId: list_atomic_tasks
      x-permission: task.atomic.operate
      x-s1-refs: {user_stories: [US-TASK-008, US-TASK-011], business_rules: [BR-TASK-073, BR-TASK-087, BR-TASK-103]}
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/status'}
        - {$ref: '#/components/parameters/root_task_id'}
        - {$ref: '#/components/parameters/owner_id'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
      responses:
        '200':
          description: AtomicTask 列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/AtomicTaskListResponse'}}}
    post:
      tags: [atomic-tasks]
      summary: 创建并启动 AtomicTask
      operationId: create_atomic_task
      x-permission: task.atomic.operate
      x-s1-refs: {user_stories: [US-TASK-008], business_rules: [BR-TASK-073, BR-TASK-087, BR-TASK-100]}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/AtomicTaskCreateRequest'}}}
      responses:
        '200':
          description: AtomicTask。
          content: {application/json: {schema: {$ref: '#/components/schemas/AtomicTask'}}}
  /api/v1/atomic-tasks/{atomic_task_id}:
    get:
      tags: [atomic-tasks]
      summary: 获取 AtomicTask 详情
      operationId: get_atomic_task
      x-permission: task.atomic.operate
      x-s1-refs: {user_stories: [US-TASK-008], business_rules: [BR-TASK-075, BR-TASK-087]}
      parameters: [{$ref: '#/components/parameters/atomic_task_id'}]
      responses:
        '200':
          description: AtomicTask 详情。
          content: {application/json: {schema: {$ref: '#/components/schemas/AtomicTask'}}}
  /api/v1/atomic-tasks/{atomic_task_id}/attempts:
    get:
      tags: [atomic-tasks]
      summary: 查询 AtomicTask 自动重试历史
      operationId: list_atomic_task_attempts
      x-permission: task.atomic.operate
      x-s1-refs: {user_stories: [US-TASK-008, US-TASK-014], business_rules: [BR-TASK-075, BR-TASK-077]}
      parameters:
        - {$ref: '#/components/parameters/atomic_task_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
      responses:
        '200':
          description: Attempt 列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskAttemptListResponse'}}}
  /api/v1/atomic-tasks/{atomic_task_id}/attempts/{task_attempt_id}/logs:
    get:
      tags: [atomic-tasks]
      summary: 分页查询 TaskAttempt 运行中执行日志
      operationId: list_task_attempt_logs
      x-permission: task.atomic.operate
      x-s1-refs: {user_stories: [US-TASK-022, US-TASK-023], business_rules: [BR-TASK-129, BR-TASK-130, BR-TASK-131, BR-TASK-132, BR-TASK-140]}
      parameters:
        - {$ref: '#/components/parameters/atomic_task_id'}
        - {$ref: '#/components/parameters/task_attempt_id'}
        - {$ref: '#/components/parameters/page_num'}
        - name: page_size
          in: query
          schema: {type: integer, minimum: 1, maximum: 200, default: 100}
        - {name: keyword, in: query, schema: {type: string, maxLength: 256}}
        - {name: levels, in: query, description: INFO,WARN,ERROR 逗号分隔。, schema: {type: string}}
        - {name: sources, in: query, description: LIFECYCLE,WORKER 逗号分隔。, schema: {type: string}}
        - {name: cursor, in: query, description: 不透明日志游标；提供时忽略 page_num。, schema: {type: string}}
        - {name: direction, in: query, schema: {type: string, enum: [forward, backward], default: forward}}
        - {name: sort_order, in: query, schema: {type: string, enum: [asc, desc], default: asc}}
      responses:
        '200':
          description: 按 occurred_at 与运行时原始顺序稳定分页；cursor 存在时忽略 page_num，无日志时成功返回空列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskAttemptLogListResponse'}}}
  /api/v1/atomic-tasks/{atomic_task_id}/attempts/{task_attempt_id}/logs/download:
    get:
      tags: [atomic-tasks]
      summary: 下载筛选后的 TaskAttempt 执行日志
      operationId: download_task_attempt_logs
      x-permission: task.atomic.operate
      x-s1-refs: {user_stories: [US-TASK-022, US-TASK-023], business_rules: [BR-TASK-129, BR-TASK-130, BR-TASK-131, BR-TASK-132, BR-TASK-140]}
      parameters:
        - {$ref: '#/components/parameters/atomic_task_id'}
        - {$ref: '#/components/parameters/task_attempt_id'}
        - {name: keyword, in: query, schema: {type: string, maxLength: 256}}
        - {name: levels, in: query, description: INFO,WARN,ERROR 逗号分隔。, schema: {type: string}}
        - {name: sources, in: query, description: LIFECYCLE,WORKER 逗号分隔。, schema: {type: string}}
        - {name: sort_order, in: query, schema: {type: string, enum: [asc, desc], default: asc}}
      responses:
        '200':
          description: 使用与在线查询相同授权、过滤和脱敏规则生成的 UTF-8 日志附件。
          headers:
            Content-Disposition: {schema: {type: string}}
          content:
            text/plain: {schema: {type: string}}
  /api/v1/atomic-tasks/{atomic_task_id}/cancel:
    post:
      tags: [atomic-tasks]
      summary: 请求取消 AtomicTask
      operationId: cancel_atomic_task
      x-permission: task.atomic.operate
      x-s1-refs: {user_stories: [US-TASK-008], business_rules: [BR-TASK-098]}
      parameters: [{$ref: '#/components/parameters/atomic_task_id'}]
      requestBody: {content: {application/json: {schema: {$ref: '#/components/schemas/ActionReason'}}}}
      responses:
        '200':
          description: 取消请求后的 AtomicTask。
          content: {application/json: {schema: {$ref: '#/components/schemas/AtomicTask'}}}
  /api/v1/atomic-tasks/{atomic_task_id}/retry:
    post:
      tags: [atomic-tasks]
      summary: 手动重试并创建新 AtomicTask
      operationId: retry_atomic_task
      x-permission: task.atomic.operate
      x-s1-refs: {user_stories: [US-TASK-008], business_rules: [BR-TASK-076]}
      parameters: [{$ref: '#/components/parameters/atomic_task_id'}]
      requestBody: {content: {application/json: {schema: {$ref: '#/components/schemas/ActionReason'}}}}
      responses:
        '200':
          description: 新 AtomicTask。
          content: {application/json: {schema: {$ref: '#/components/schemas/AtomicTask'}}}

  /api/v1/task-groups:
    get:
      tags: [task-groups]
      summary: 查询 TaskGroup 列表
      operationId: list_task_groups
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-009, US-TASK-011], business_rules: [BR-TASK-078, BR-TASK-080, BR-TASK-103]}
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/status'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
      responses:
        '200':
          description: TaskGroup 列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskGroupListResponse'}}}
    post:
      tags: [task-groups]
      summary: 创建并启动 TaskGroup
      operationId: create_task_group
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-009], business_rules: [BR-TASK-078, BR-TASK-079]}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/TaskGroupCreateRequest'}}}
      responses:
        '200':
          description: TaskGroup。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskGroup'}}}
  /api/v1/task-groups/{task_group_id}:
    get:
      tags: [task-groups]
      summary: 获取 TaskGroup 汇总详情
      operationId: get_task_group
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-009], business_rules: [BR-TASK-080]}
      parameters: [{$ref: '#/components/parameters/task_group_id'}]
      responses:
        '200':
          description: TaskGroup 详情。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskGroup'}}}
  /api/v1/task-groups/{task_group_id}/tasks:
    get:
      tags: [task-groups]
      summary: 查询 TaskGroup 子 AtomicTask
      operationId: list_task_group_tasks
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-009], business_rules: [BR-TASK-080]}
      parameters:
        - {$ref: '#/components/parameters/task_group_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/status'}
      responses:
        '200':
          description: 子任务列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/AtomicTaskListResponse'}}}
  /api/v1/task-groups/{task_group_id}/cancel:
    post:
      tags: [task-groups]
      summary: 取消 TaskGroup 和未终态子任务
      operationId: cancel_task_group
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-009], business_rules: [BR-TASK-098]}
      parameters: [{$ref: '#/components/parameters/task_group_id'}]
      responses:
        '200':
          description: TaskGroup。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskGroup'}}}
  /api/v1/task-groups/{task_group_id}/retry:
    post:
      tags: [task-groups]
      summary: 创建新的 TaskGroup 重跑资源
      operationId: retry_task_group
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-009], business_rules: [BR-TASK-099]}
      parameters: [{$ref: '#/components/parameters/task_group_id'}]
      responses:
        '200':
          description: 新 TaskGroup。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskGroup'}}}

  /api/v1/dag-task-groups:
    get:
      tags: [dag-task-groups]
      summary: 查询 DAGTaskGroup 列表
      operationId: list_dag_task_groups
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-010, US-TASK-011], business_rules: [BR-TASK-081, BR-TASK-082, BR-TASK-103]}
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/status'}
      responses:
        '200':
          description: DAGTaskGroup 列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/DAGTaskGroupListResponse'}}}
    post:
      tags: [dag-task-groups]
      summary: 创建并启动 DAGTaskGroup
      operationId: create_dag_task_group
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-010], business_rules: [BR-TASK-081, BR-TASK-094, BR-TASK-097]}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/DAGTaskGroupCreateRequest'}}}
      responses:
        '200':
          description: DAGTaskGroup。
          content: {application/json: {schema: {$ref: '#/components/schemas/DAGTaskGroup'}}}
  /api/v1/dag-task-groups/{dag_task_group_id}:
    get:
      tags: [dag-task-groups]
      summary: 获取 DAGTaskGroup 汇总详情
      operationId: get_dag_task_group
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-010, US-TASK-023], business_rules: [BR-TASK-080, BR-TASK-082, BR-TASK-133, BR-TASK-134, BR-TASK-139, BR-TASK-141]}
      parameters: [{$ref: '#/components/parameters/dag_task_group_id'}]
      responses:
        '200':
          description: DAGTaskGroup。
          content: {application/json: {schema: {$ref: '#/components/schemas/DAGTaskGroupDetail'}}}
  /api/v1/dag-task-groups/{dag_task_group_id}/tasks:
    get:
      tags: [dag-task-groups]
      summary: 查询 DAGTaskGroup 节点 AtomicTask
      operationId: list_dag_task_group_tasks
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-010, US-TASK-023], business_rules: [BR-TASK-082, BR-TASK-135]}
      parameters:
        - {$ref: '#/components/parameters/dag_task_group_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/status'}
        - {name: node_key, in: query, schema: {type: string, minLength: 1, maxLength: 128}}
      responses:
        '200':
          description: 节点任务列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/AtomicTaskListResponse'}}}
  /api/v1/dag-task-groups/{dag_task_group_id}/events:
    get:
      tags: [dag-task-groups]
      summary: 查询规范化 DAG 执行事件
      operationId: list_dag_task_group_events
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-023], business_rules: [BR-TASK-136]}
      parameters:
        - {$ref: '#/components/parameters/dag_task_group_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {name: node_key, in: query, schema: {type: string, maxLength: 128}}
        - {name: atomic_task_id, in: query, schema: {type: string}}
        - {name: task_attempt_id, in: query, schema: {type: string}}
        - {name: attempt_no, in: query, schema: {type: integer, minimum: 1}}
        - {name: event_types, in: query, description: DAGExecutionEventType 逗号分隔。, schema: {type: string}}
        - {name: occurred_after, in: query, schema: {type: string, format: date-time}}
        - {name: occurred_before, in: query, schema: {type: string, format: date-time}}
        - {name: sort_order, in: query, schema: {type: string, enum: [asc, desc], default: asc}}
      responses:
        '200':
          description: 由运行时投影白名单映射且不含原始 payload 的 DAG 执行事件。
          content: {application/json: {schema: {$ref: '#/components/schemas/DAGExecutionEventListResponse'}}}
  /api/v1/dag-task-groups/{dag_task_group_id}/timeline:
    get:
      tags: [dag-task-groups]
      summary: 查询 DAG 节点与 Attempt 规范化时间线
      operationId: list_dag_task_group_timeline
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-023], business_rules: [BR-TASK-134, BR-TASK-137]}
      parameters:
        - {$ref: '#/components/parameters/dag_task_group_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {name: node_key, in: query, schema: {type: string, maxLength: 128}}
      responses:
        '200':
          description: 按实际 AtomicTask 分行的规范化时间线；历史缺失通过 complete=false 表达。
          content: {application/json: {schema: {$ref: '#/components/schemas/DAGTimelineListResponse'}}}
  /api/v1/dag-task-groups/{dag_task_group_id}/cancel:
    post:
      tags: [dag-task-groups]
      summary: 取消 DAGTaskGroup
      operationId: cancel_dag_task_group
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-010], business_rules: [BR-TASK-098]}
      parameters: [{$ref: '#/components/parameters/dag_task_group_id'}]
      responses:
        '200':
          description: DAGTaskGroup。
          content: {application/json: {schema: {$ref: '#/components/schemas/DAGTaskGroup'}}}
  /api/v1/dag-task-groups/{dag_task_group_id}/retry:
    post:
      tags: [dag-task-groups]
      summary: 创建新的 DAGTaskGroup 重跑资源
      operationId: retry_dag_task_group
      x-permission: task.group.operate
      x-s1-refs: {user_stories: [US-TASK-010], business_rules: [BR-TASK-099]}
      parameters: [{$ref: '#/components/parameters/dag_task_group_id'}]
      responses:
        '200':
          description: 新 DAGTaskGroup。
          content: {application/json: {schema: {$ref: '#/components/schemas/DAGTaskGroup'}}}

  /api/v1/task-schedules:
    get:
      tags: [task-schedules]
      summary: 查询 TaskSchedule 列表
      operationId: list_task_schedules
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-011, US-TASK-017], business_rules: [BR-TASK-083, BR-TASK-086, BR-TASK-102, BR-TASK-107, BR-TASK-112]}
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - name: status
          in: query
          schema: {$ref: '#/components/schemas/TaskScheduleStatus'}
        - name: execution_mode
          in: query
          schema: {$ref: '#/components/schemas/TaskScheduleExecutionMode'}
      responses:
        '200':
          description: Schedule 列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskScheduleListResponse'}}}
    post:
      tags: [task-schedules]
      summary: 创建 MATERIALIZED TaskSchedule
      operationId: create_task_schedule
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-011, US-TASK-017], business_rules: [BR-TASK-083, BR-TASK-085, BR-TASK-107, BR-TASK-112]}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/TaskScheduleCreateRequest'}}}
      responses:
        '200':
          description: TaskSchedule。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskSchedule'}}}
  /api/v1/task-schedules/{task_schedule_id}:
    get:
      tags: [task-schedules]
      summary: 获取 TaskSchedule 及执行汇总
      operationId: get_task_schedule
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-011], business_rules: [BR-TASK-084, BR-TASK-085, BR-TASK-102]}
      parameters: [{$ref: '#/components/parameters/task_schedule_id'}]
      responses:
        '200':
          description: TaskSchedule。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskSchedule'}}}
    patch:
      tags: [task-schedules]
      summary: 更新未来调度配置
      operationId: update_task_schedule
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-011, US-TASK-017], business_rules: [BR-TASK-083, BR-TASK-086, BR-TASK-112, BR-TASK-118]}
      parameters: [{$ref: '#/components/parameters/task_schedule_id'}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/TaskScheduleUpdateRequest'}}}
      responses:
        '200':
          description: TaskSchedule。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskSchedule'}}}
    delete:
      tags: [task-schedules]
      summary: 软删除 TaskSchedule
      operationId: delete_task_schedule
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-011, US-TASK-017], business_rules: [BR-TASK-086, BR-TASK-112]}
      parameters: [{$ref: '#/components/parameters/task_schedule_id'}]
      responses:
        '200':
          description: 删除结果。
          content: {application/json: {schema: {$ref: '#/components/schemas/SuccessResponse'}}}
  /api/v1/task-schedules/{task_schedule_id}/pause:
    post:
      tags: [task-schedules]
      summary: 暂停未来触发
      operationId: pause_task_schedule
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-011], business_rules: [BR-TASK-086]}
      parameters: [{$ref: '#/components/parameters/task_schedule_id'}]
      responses:
        '200':
          description: TaskSchedule。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskSchedule'}}}
  /api/v1/task-schedules/{task_schedule_id}/resume:
    post:
      tags: [task-schedules]
      summary: 恢复未来触发
      operationId: resume_task_schedule
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-011], business_rules: [BR-TASK-086]}
      parameters: [{$ref: '#/components/parameters/task_schedule_id'}]
      responses:
        '200':
          description: TaskSchedule。
          content: {application/json: {schema: {$ref: '#/components/schemas/TaskSchedule'}}}
  /api/v1/task-schedules/{task_schedule_id}/executions:
    get:
      tags: [task-schedules]
      summary: 查询全部调度执行历史
      operationId: list_task_schedule_executions
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-011, US-TASK-013, US-TASK-017], business_rules: [BR-TASK-084, BR-TASK-085, BR-TASK-092, BR-TASK-102, BR-TASK-104, BR-TASK-114, BR-TASK-115]}
      parameters:
        - {$ref: '#/components/parameters/task_schedule_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - name: status
          in: query
          schema: {$ref: '#/components/schemas/ScheduleExecutionStatus'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
      responses:
        '200':
          description: ScheduleExecution 列表。
          content: {application/json: {schema: {$ref: '#/components/schemas/ScheduleExecutionListResponse'}}}
  /api/v1/task-schedules/{task_schedule_id}/reconcile-state:
    get:
      tags: [task-schedules]
      summary: 查询 RECONCILE 计划的当前轻量运行投影
      operationId: get_task_schedule_reconcile_state
      x-permission: task.schedule.manage
      x-s1-refs: {user_stories: [US-TASK-017], business_rules: [BR-TASK-108, BR-TASK-110, BR-TASK-113]}
      parameters: [{$ref: '#/components/parameters/task_schedule_id'}]
      responses:
        '200':
          description: 不暴露原始 checkpoint JSON 的巡检状态。
          content: {application/json: {schema: {$ref: '#/components/schemas/ScheduleReconcileState'}}}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
