    ReconcileSpecUpdate:
      type: object
      minProperties: 1
      properties:
        config: {type: object, additionalProperties: true}
        max_parallelism: {type: integer, minimum: 1, maximum: 64}
        max_items_per_run: {type: integer, minimum: 1, maximum: 1000}
        per_item_timeout_seconds: {type: integer, minimum: 1, maximum: 30}
        overall_timeout_seconds: {type: integer, minimum: 1, maximum: 300, description: 更新后必须大于或等于 per_item_timeout_seconds。}
    TaskScheduleCreateRequest:
      type: object
      required: [name, trigger_type, target, project_id, namespace]
      properties:
        name: {type: string, maxLength: 256}
        description: {type: string, maxLength: 2048}
        execution_mode: {type: string, enum: [MATERIALIZED], default: MATERIALIZED, description: 对外创建 API 仅允许 MATERIALIZED；SYSTEM RECONCILE 由后端注册。}
        trigger_type: {type: string, enum: [CRON, RUN_AT]}
        cron_expression: {type: string}
        run_at: {type: string, format: date-time}
        time_zone: {type: string, default: UTC}
        target: {$ref: '#/components/schemas/ScheduleTarget'}
        project_id: {type: string}
        namespace: {type: string}
    TaskScheduleUpdateRequest:
      type: object
      properties:
        name: {type: string, maxLength: 256}
        description: {type: string, maxLength: 2048}
        cron_expression: {type: string}
        run_at: {type: string, format: date-time}
        time_zone: {type: string}
        target: {$ref: '#/components/schemas/ScheduleTarget'}
        reconcile_spec:
          allOf:
            - {$ref: '#/components/schemas/ReconcileSpecUpdate'}
          description: SYSTEM RECONCILE 只允许修改 config、并发、单轮上限和超时，请求结构不接受 reconcile_ref。
    ScheduleSummary:
      type: object
      properties:
        total_triggered: {type: integer}
        running: {type: integer}
        success: {type: integer}
        failed: {type: integer}
        canceled: {type: integer}
        skipped_overlap: {type: integer}
    TaskSchedule:
      type: object
      required: [id, name, execution_mode, management_mode, trigger_type, time_zone, status, summary, history_retention, project_id, namespace, resource_version, created_at, updated_at]
      properties:
        id: {type: string}
        name: {type: string}
        description: {type: string}
        execution_mode: {$ref: '#/components/schemas/TaskScheduleExecutionMode'}
        management_mode: {$ref: '#/components/schemas/TaskScheduleManagementMode'}
        system_key: {type: string}
        trigger_type: {type: string, enum: [CRON, RUN_AT]}
        cron_expression: {type: string}
        run_at: {type: string, format: date-time}
        time_zone: {type: string}
        target: {$ref: '#/components/schemas/ScheduleTarget'}
        target_summary: {$ref: '#/components/schemas/TaskTargetSummary'}
        reconcile_spec: {$ref: '#/components/schemas/ReconcileSpec'}
        history_retention: {$ref: '#/components/schemas/HistoryRetention'}
        status: {$ref: '#/components/schemas/TaskScheduleStatus'}
        summary: {$ref: '#/components/schemas/ScheduleSummary'}
        last_execution: {$ref: '#/components/schemas/ScheduleExecution'}
        next_trigger_at: {type: string, format: date-time}
        runtime_schedule_name: {type: string}
        project_id: {type: string}
        namespace: {type: string}
        created_by: {type: string}
        resource_version: {type: integer}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    TaskScheduleListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer}
        items: {type: array, items: {$ref: '#/components/schemas/TaskSchedule'}}
    ScheduleExecution:
      type: object
      required: [id, schedule_id, execution_mode, scheduled_at, status, created_at]
      properties:
        id: {type: string}
        schedule_id: {type: string}
        schedule: {$ref: '#/components/schemas/TaskScheduleSummary', nullable: true, readOnly: true}
        execution_mode: {$ref: '#/components/schemas/TaskScheduleExecutionMode'}
        scheduled_at: {type: string, format: date-time}
        triggered_at: {type: string, format: date-time}
        target_type: {type: string, enum: [ATOMIC_TASK, TASK_GROUP, DAG_TASK_GROUP]}
        target_id: {type: string}
        target_summary: {$ref: '#/components/schemas/TaskTargetSummary'}
        reconcile_summary: {$ref: '#/components/schemas/ReconcileSummary'}
        runtime_execution_id: {type: string}
        status: {$ref: '#/components/schemas/ScheduleExecutionStatus'}
        reason: {type: string}
        completed_at: {type: string, format: date-time}
        created_at: {type: string, format: date-time}
    ReconcileSummary:
      type: object
      required: [scanned, findings, actions_created, deferred, duration_ms, checkpoint_advanced, cycle_completed]
      properties:
        scanned: {type: integer, minimum: 0}
        findings: {type: integer, minimum: 0}
        actions_created: {type: integer, minimum: 0}
        deferred: {type: integer, minimum: 0}
        irreparable: {type: integer, minimum: 0}
        repaired: {type: integer, minimum: 0}
        duration_ms: {type: integer, minimum: 0}
        checkpoint_advanced: {type: boolean}
        cycle_completed: {type: boolean}
        summary: {type: object, additionalProperties: true}
    ScheduleReconcileState:
      type: object
      required: [schedule_id, consecutive_failures, total_runs, total_scanned, total_findings, total_actions_created, resource_version, updated_at]
      properties:
        schedule_id: {type: string}
        last_started_at: {type: string, format: date-time}
        last_completed_at: {type: string, format: date-time}
        last_summary: {$ref: '#/components/schemas/ReconcileSummary'}
        checkpoint_age_seconds: {type: integer, minimum: 0, description: 基于当前 checkpoint 更新时间计算，不返回原始 checkpoint JSON。}
        consecutive_failures: {type: integer, minimum: 0}
        total_runs: {type: integer, minimum: 0}
        total_scanned: {type: integer, minimum: 0}
        total_findings: {type: integer, minimum: 0}
        total_actions_created: {type: integer, minimum: 0}
        resource_version: {type: integer, minimum: 0}
        updated_at: {type: string, format: date-time}
    ScheduleExecutionListResponse:
      type: object
      required: [total, items]
      properties:
        total: {type: integer}
        items: {type: array, items: {$ref: '#/components/schemas/ScheduleExecution'}}
