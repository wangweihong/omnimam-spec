task_run_created:
  producer: run-service
  consumers:
    - scheduler-service
    - application-platform
  trigger_condition: TaskRun 创建成功。
  payload:
    run_id: string
    application_run_id: string|null
    definition_type: string
    definition_id: string
    status: string
    resource_version: integer
    adapter_key: string
    operation_key: string
    operation_version: string
    requested_engine_id: string
    resolved_engine_id: string
    project_id: string
    namespace: string
    created_by: string
    occurred_at: string(date-time)
  idempotency_key: run_id:task_run_created
  retry_policy: 失败后按固定间隔重试，直到消费者接收或进入人工排查。
  failure_policy: 事件失败不得回滚 TaskRun 创建，必须保留可重放记录。
  related_user_stories:
    - US-TASK-001
  related_rules:
    - BR-TASK-007
    - BR-TASK-061
    - BR-TASK-062

task_run_status_changed:
  producer: run-service
  consumers:
    - application-platform
    - notification-service
    - audit-service
  trigger_condition: TaskRun 状态发生变化，包括 ready、claimed、started、retrying、succeeded、failed、canceled、timeout。
  payload:
    run_id: string
    application_run_id: string|null
    from_status: string
    to_status: string
    progress: number
    resource_version: integer
    last_error: object
    occurred_at: string(date-time)
  idempotency_key: run_id:resource_version
  retry_policy: 失败后按固定间隔重试，直到消费者接收或进入人工排查。
  failure_policy: TaskRun 状态以 schema 记录为准，事件可从 task_run_events 重放。
  related_user_stories:
    - US-TASK-001
    - US-TASK-002
    - US-TASK-003
  related_rules:
    - BR-TASK-011
    - BR-TASK-037
    - BR-TASK-039
    - BR-TASK-062

task_run_progress_updated:
  producer: worker-protocol-service
  consumers:
    - application-platform
    - frontend-realtime-adapter
  trigger_condition: Worker 持有效 lease 上报 TaskRun 进度。
  payload:
    run_id: string
    application_run_id: string|null
    attempt_id: string
    worker_id: string
    lease_id: string
    progress: number
    resource_version: integer
    output_snapshot: object
    occurred_at: string(date-time)
  idempotency_key: run_id:resource_version
  retry_policy: 失败后按固定间隔重试；实时刷新消费者允许丢弃过期进度事件。
  failure_policy: 最新进度以 TaskRun 记录为准，事件失败不影响 Worker 继续执行。
  related_user_stories:
    - US-TASK-001
  related_rules:
    - BR-TASK-016
    - BR-TASK-019
    - BR-TASK-062

task_attempt_failed:
  producer: worker-protocol-service
  consumers:
    - run-service
    - audit-service
    - operations-monitor
  trigger_condition: TaskAttempt 以 FAILED、TIMEOUT、WORKER_LOST、LEASE_EXPIRED 或 STALLED 结束。
  payload:
    run_id: string
    attempt_id: string
    worker_id: string
    failure_type: string
    retryable: boolean
    error: object
    logs_ref: string
    external_job_id: string
    occurred_at: string(date-time)
  idempotency_key: attempt_id:task_attempt_failed
  retry_policy: 失败后按固定间隔重试，直到消费者接收。
  failure_policy: Attempt 失败事实以 task_attempts 记录为准，不得覆盖历史失败记录。
  related_user_stories:
    - US-TASK-003
    - US-TASK-007
  related_rules:
    - BR-TASK-010
    - BR-TASK-012
    - BR-TASK-044

worker_lost:
  producer: watchdog-service
  consumers:
    - scheduler-service
    - operations-monitor
    - audit-service
  trigger_condition: watchdog 判断 Worker heartbeat 超时并将 Worker 标记为 LOST。
  payload:
    worker_id: string
    heartbeat_at: string(date-time)
    affected_lease_count: integer
    occurred_at: string(date-time)
  idempotency_key: worker_id:worker_lost:occurred_at
  retry_policy: 失败后按固定间隔重试，直到消费者接收。
  failure_policy: Worker LOST 事实以 task_workers 和 task_watchdog_records 为准。
  related_user_stories:
    - US-TASK-007
  related_rules:
    - BR-TASK-042
    - BR-TASK-043
    - BR-TASK-044

lease_expired:
  producer: watchdog-service
  consumers:
    - scheduler-service
    - operations-monitor
  trigger_condition: watchdog 发现 ExecutionLease 过期。
  payload:
    lease_id: string
    run_id: string
    attempt_id: string
    worker_id: string
    expire_at: string(date-time)
    occurred_at: string(date-time)
  idempotency_key: lease_id:lease_expired
  retry_policy: 失败后按固定间隔重试，直到消费者接收。
  failure_policy: Lease 过期事实以 task_execution_leases 为准，调度恢复可通过 watchdog 记录补偿。
  related_user_stories:
    - US-TASK-007
  related_rules:
    - BR-TASK-030
    - BR-TASK-031
    - BR-TASK-043
