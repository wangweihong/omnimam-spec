atomic_task_created:
  producer: atomic-task-service
  consumers: [application-platform, workflow-canvas, audit-service]
  trigger_condition: AtomicTask 业务记录和运行时启动请求已持久化。
  payload:
    atomic_task_id: string
    function_ref: string
    owner_type: string|null
    owner_id: string|null
    root_task_id: string
    status: string
    resource_version: integer
    project_id: string
    namespace: string
    occurred_at: string(date-time)
  idempotency_key: atomic_task_id:atomic_task_created
  retry_policy: 由 PostgreSQL outbox 持续重试并支持人工重放。
  failure_policy: 发布失败不得回滚 AtomicTask；消费者按事件幂等键去重。
  related_user_stories: [US-TASK-008]
  related_rules: [BR-TASK-073, BR-TASK-088, BR-TASK-090]

atomic_task_status_changed:
  producer: runtime-projection-service
  consumers: [application-platform, workflow-canvas, notification-service, audit-service]
  trigger_condition: AtomicTask 状态、进度、Attempt 或结果投影发生单调更新。
  payload:
    atomic_task_id: string
    owner_type: string|null
    owner_id: string|null
    from_status: string
    to_status: string
    progress: number
    current_attempt: integer
    output: object
    last_error: object
    resource_version: integer
    occurred_at: string(date-time)
  idempotency_key: atomic_task_id:resource_version
  retry_policy: 由 outbox 重试；消费者丢弃相同或更低 resource_version。
  failure_policy: AtomicTask 投影为业务事实源，遗漏事件由运行时 reconciler 修复后重新发布。
  related_user_stories: [US-TASK-008, US-TASK-015]
  related_rules: [BR-TASK-075, BR-TASK-087, BR-TASK-088]

task_group_status_changed:
  producer: orchestration-projection-service
  consumers: [workflow-canvas, application-platform, audit-service]
  trigger_condition: TaskGroup 或 DAGTaskGroup 的状态、进度或汇总发生变化。
  payload:
    group_type: string
    group_id: string
    status: string
    progress: number
    summary: object
    resource_version: integer
    occurred_at: string(date-time)
  idempotency_key: group_type:group_id:resource_version
  retry_policy: 由 outbox 重试，消费者按版本幂等。
  failure_policy: 子 AtomicTask 和组合投影可重新计算汇总，不覆盖较新版本。
  related_user_stories: [US-TASK-009, US-TASK-010]
  related_rules: [BR-TASK-080, BR-TASK-088]

task_schedule_execution_recorded:
  producer: schedule-service
  consumers: [operations-monitor, audit-service]
  trigger_condition: ScheduleExecution 创建或进入终态。
  payload:
    task_schedule_id: string
    schedule_execution_id: string
    scheduled_at: string(date-time)
    execution_mode: string
    status: string
    target_type: string|null
    target_id: string|null
    reconcile_summary: object|null
    reason: string|null
    occurred_at: string(date-time)
  idempotency_key: schedule_execution_id:status
  retry_policy: 由 outbox 重试并支持按 schedule_execution_id 重放。
  failure_policy: ScheduleExecution 数据库记录为事实源；事件失败不重复启动目标。
  related_user_stories: [US-TASK-011, US-TASK-013, US-TASK-017]
  related_rules: [BR-TASK-084, BR-TASK-085, BR-TASK-114]

task_runtime_projection_reconciled:
  producer: runtime-reconciler
  consumers: [operations-monitor, audit-service]
  trigger_condition: 对账发现运行时与业务投影不一致并完成单调修复。
  payload:
    resource_type: string
    resource_id: string
    runtime_execution_id: string
    previous_version: integer
    current_version: integer
    occurred_at: string(date-time)
  idempotency_key: resource_type:resource_id:current_version:reconciled
  retry_policy: 由 outbox 重试。
  failure_policy: 对账事实保留在 runtime_projection_events；告警事件失败不回滚修复。
  related_user_stories: [US-TASK-015]
  related_rules: [BR-TASK-088]
