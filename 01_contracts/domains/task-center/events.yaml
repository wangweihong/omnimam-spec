atomic_task_created:
  producer: atomic-task-service
  consumers: [application-platform, workflow-canvas, sse-event-projector, audit-service]
  trigger_condition: AtomicTask 业务记录和运行时启动请求已持久化。
  payload:
    atomic_task_id: string
    function_ref: string
    owner_type: string|null
    owner_id: string|null
    root_task_id: string
    application_run_id: string|null
    canvas_run_id: string|null
    status: string
    resource_version: integer
    project_id: string
    namespace: string
    created_by: string
    correlation_id: string|null
    occurred_at: string(date-time)
  idempotency_key: atomic_task_id:atomic_task_created
  retry_policy: 由 PostgreSQL outbox 持续重试并支持人工重放。
  failure_policy: 发布失败不得回滚 AtomicTask；消费者按事件幂等键去重。
  related_user_stories: [US-TASK-008, US-TASK-018]
  related_rules: [BR-TASK-073, BR-TASK-088, BR-TASK-090, BR-TASK-120]

atomic_task_status_changed:
  producer: runtime-projection-service
  consumers: [application-platform, workflow-canvas, sse-event-projector, notification-service, audit-service]
  trigger_condition: AtomicTask 状态、进度或结果投影发生单调更新。TaskAttempt 变化另行发布 task_attempt_status_changed。
  payload:
    atomic_task_id: string
    owner_type: string|null
    owner_id: string|null
    application_run_id: string|null
    canvas_run_id: string|null
    from_status: string
    to_status: string
    progress: number
    progress_detail: object
    current_attempt: integer
    output: object
    last_error: object
    resource_version: integer
    project_id: string
    namespace: string
    created_by: string
    correlation_id: string|null
    occurred_at: string(date-time)
  idempotency_key: atomic_task_id:resource_version
  retry_policy: 由 outbox 重试；消费者丢弃相同或更低 resource_version。
  failure_policy: AtomicTask 投影为业务事实源，遗漏事件由运行时 reconciler 修复后重新发布。
  related_user_stories: [US-TASK-008, US-TASK-015, US-TASK-018]
  related_rules: [BR-TASK-075, BR-TASK-087, BR-TASK-088, BR-TASK-120]

task_attempt_status_changed:
  producer: runtime-projection-service
  consumers: [application-platform, workflow-canvas, sse-event-projector, audit-service]
  trigger_condition: TaskAttempt 创建，开始执行，或进入 SUCCESS、FAILED、CANCELED、TIMEOUT 终态。
  payload:
    task_attempt_id: string
    atomic_task_id: string
    attempt_no: integer
    from_status: string|null
    to_status: string(SCHEDULED|RUNNING|SUCCESS|FAILED|CANCELED|TIMEOUT)
    error: object|null
    external_job_id: string|null
    resource_version: integer
    atomic_task_resource_version: integer
    project_id: string
    namespace: string
    created_by: string
    correlation_id: string|null
    occurred_at: string(date-time)
  idempotency_key: task_attempt_id:resource_version
  retry_policy: 由 outbox 重试；消费者按 task_attempt_id 和 resource_version 丢弃重复或旧事件。
  failure_policy: TaskAttempt 表是尝试历史事实源；发布失败不回滚 Attempt 或 AtomicTask，对账后可重放。
  related_user_stories: [US-TASK-008, US-TASK-014, US-TASK-018]
  related_rules: [BR-TASK-075, BR-TASK-077, BR-TASK-088, BR-TASK-120]

task_group_status_changed:
  producer: orchestration-projection-service
  consumers: [workflow-canvas, application-platform, sse-event-projector, audit-service]
  trigger_condition: TaskGroup 或 DAGTaskGroup 创建，或状态、进度、汇总发生变化。
  payload:
    group_type: string
    group_id: string
    from_status: string|null
    to_status: string
    progress: number
    summary: object
    resource_version: integer
    project_id: string
    namespace: string
    created_by: string
    correlation_id: string|null
    occurred_at: string(date-time)
  idempotency_key: group_type:group_id:resource_version
  retry_policy: 由 outbox 重试，消费者按版本幂等。
  failure_policy: 子 AtomicTask 和组合投影可重新计算汇总，不覆盖较新版本。
  related_user_stories: [US-TASK-009, US-TASK-010, US-TASK-018, US-TASK-023]
  related_rules: [BR-TASK-080, BR-TASK-088, BR-TASK-120, BR-TASK-133, BR-TASK-134]

task_schedule_execution_recorded:
  producer: schedule-service
  consumers: [operations-monitor, audit-service]
  trigger_condition: ScheduleExecution 创建或进入终态。
  payload:
    task_schedule_id: string
    schedule_execution_id: string
    scheduled_at: string(date-time)
    execution_mode: string
    status: string
    target_type: string|null
    target_id: string|null
    reconcile_summary: object|null
    reason: string|null
    occurred_at: string(date-time)
  idempotency_key: schedule_execution_id:status
  retry_policy: 由 outbox 重试并支持按 schedule_execution_id 重放。
  failure_policy: ScheduleExecution 数据库记录为事实源；事件失败不重复启动目标。
  related_user_stories: [US-TASK-011, US-TASK-013, US-TASK-017]
  related_rules: [BR-TASK-084, BR-TASK-085, BR-TASK-114]

representation_build_requested:
  producer: asset-library.asset-version
  consumers: [task-center.orchestration]
  trigger_condition: asset-library 写入 asset_version_representation_requested outbox。
  payload:
    asset_version_id: string
    asset_id: string
    owner_user_id: string
    profile_version: string
    requested_representations: array<object>
    idempotency_key: string
    occurred_at: string(date-time)
  idempotency_key: asset_version_id:profile_version:representation-build
  retry_policy: 由 outbox 重试；Task Center 返回同一 DAGTaskGroup。
  failure_policy: 不保存媒体正文；创建失败保留可恢复请求，backfill 负责补偿。
  related_user_stories: [US-TASK-019, US-USER-ASSET-43]
  related_rules: [BR-TASK-123, BR-USER-ASSET-69, BR-USER-ASSET-71]

artifact_processing_requested:
  producer: asset-library.artifact
  consumers: [task-center.atomic-task]
  trigger_condition: asset-library 发布 artifact_content_completed。
  payload:
    artifact_id: string
    owner_user_id: string
    project_id: string
    namespace: string
    processing_profile_version: string
    idempotency_key: string
    occurred_at: string(date-time)
  idempotency_key: artifact_id:processing_profile_version:process
  retry_policy: 由 outbox 重试；Task Center 返回同一 asset-library.artifact.process AtomicTask。
  failure_policy: 不保存内容；创建失败保留可重放请求，Artifact 不伪造 ready。
  related_user_stories: [US-TASK-021, US-USER-ASSET-46]
  related_rules: [BR-TASK-121, BR-TASK-127, BR-USER-ASSET-79]

representation_backfill_action_created:
  producer: asset-library.representation-backfill
  consumers: [operations-monitor, asset-library]
  trigger_condition: RECONCILE 发现缺失、可重试或可重建 Representation 并创建 AtomicTask action。
  payload:
    schedule_id: string
    schedule_execution_id: string
    asset_version_id: string
    representation_type: string
    profile_version: string
    atomic_task_id: string
    idempotency_key: string
    occurred_at: string(date-time)
  idempotency_key: asset_version_id:representation_type:profile_version:action-created
  retry_policy: 由 Task Center outbox 重试；相同 action 幂等。
  failure_policy: action 创建失败计入 reconcile deferred/failed 摘要，不回滚 AssetVersion。
  related_user_stories: [US-TASK-020, US-USER-ASSET-44]
  related_rules: [BR-TASK-124, BR-TASK-125]

task_runtime_projection_reconciled:
  producer: runtime-reconciler
  consumers: [operations-monitor, audit-service]
  trigger_condition: 对账发现运行时与业务投影不一致并完成单调修复。
  payload:
    resource_type: string
    resource_id: string
    runtime_execution_id: string
    previous_version: integer
    current_version: integer
    occurred_at: string(date-time)
  idempotency_key: resource_type:resource_id:current_version:reconciled
  retry_policy: 由 outbox 重试。
  failure_policy: 对账事实保留在 runtime_projection_events；告警事件失败不回滚修复。
  related_user_stories: [US-TASK-015]
  related_rules: [BR-TASK-088]
