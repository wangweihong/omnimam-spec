task.atomic.operate:
  domain: task-center
  module: atomic-task
  resource: atomic_task, task_attempt
  action: create, read, cancel, retry
  subject: ordinary_user, business_service, system_admin
  description: 创建、查询、取消和手动重试 AtomicTask，并查看 Attempt 历史。
  frontend_usage: 控制任务详情、取消、重试和 Attempt 历史入口。
  backend_enforcement: 按 project_id、namespace、created_by 和业务授权校验；手动重试必须创建新 AtomicTask。
  related_user_stories: [US-TASK-008]
  related_rules: [BR-TASK-073, BR-TASK-075, BR-TASK-076, BR-TASK-103]

task.group.operate:
  domain: task-center
  module: orchestration
  resource: task_group, dag_task_group
  action: create, read, cancel, retry
  subject: ordinary_user, business_developer, business_service, system_admin
  description: 创建和操作串并行 TaskGroup 与 DAGTaskGroup，查看子任务和汇总。
  frontend_usage: 控制组合任务列表、详情、节点状态、取消和重跑入口。
  backend_enforcement: 校验租户边界、functionRef 白名单、节点和边限制；重跑必须创建新组合资源。
  related_user_stories: [US-TASK-009, US-TASK-010]
  related_rules: [BR-TASK-078, BR-TASK-081, BR-TASK-096, BR-TASK-099, BR-TASK-103]

task.schedule.manage:
  domain: task-center
  module: schedule
  resource: task_schedule, task_schedule_execution, schedule_reconcile_state
  action: create, read, update, pause, resume, delete
  subject: business_developer, system_admin
  description: 管理 MATERIALIZED 周期/单次计划，管理员可查看并受限调整 SYSTEM RECONCILE 计划。
  frontend_usage: 控制 Schedule 列表、执行模式筛选、详情、暂停、恢复、运行参数编辑和轻量历史；SYSTEM 计划隐藏删除。
  backend_enforcement: 创建 API 只接受 MATERIALIZED；校验目标模板、六段 cron、显式时区、run_at 和租户边界。SYSTEM RECONCILE 只允许管理员暂停、恢复和编辑 cron、时区及安全运行参数，禁止创建、删除或更换 reconcile_ref。
  related_user_stories: [US-TASK-011, US-TASK-013, US-TASK-017]
  related_rules: [BR-TASK-083, BR-TASK-084, BR-TASK-085, BR-TASK-086, BR-TASK-101, BR-TASK-102, BR-TASK-104, BR-TASK-107, BR-TASK-112, BR-TASK-118]

task.runtime.internal:
  domain: task-center
  module: runtime
  resource: workflow_runtime, runtime_projection_event
  action: register_definition, start, query, cancel, reconcile, project_event
  subject: task_center_service, runtime_adapter
  description: Task Center 与 WorkflowRuntime 的内部运行协议。
  frontend_usage: 不向业务前端或普通 Open API 暴露。
  backend_enforcement: 仅服务身份可调用；运行时事件按 runtime_event_id 幂等并按版本单调投影。
  related_user_stories: [US-TASK-015]
  related_rules: [BR-TASK-087, BR-TASK-088, BR-TASK-100]

task.operation.admin:
  domain: task-center
  module: operations
  resource: atomic_task, task_group, dag_task_group, task_schedule, runtime_projection
  action: inspect_all, reconcile, read_health
  subject: system_admin, ops_user
  description: 跨项目查看异常任务、计划执行和运行时投影健康。
  frontend_usage: 控制内部运维诊断入口；不提供 Conductor 原生 UI 权限。
  backend_enforcement: 必须校验运维身份，诊断操作不得改写业务结果或绕过租户审计。
  related_user_stories: [US-TASK-015]
  related_rules: [BR-TASK-087, BR-TASK-088]
