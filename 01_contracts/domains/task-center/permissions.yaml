task.definition.manage:
  domain: task-center
  module: definition
  resource: atomic_task, task_group, dag_flow_task
  action: create, read, update, delete
  subject: business_developer, system_admin
  description: 管理任务定义，包括 AtomicTask、TaskGroup 和 DAGFlowTask。
  frontend_usage: 控制任务定义列表、创建、编辑、删除和 DAG 配置入口。
  backend_enforcement: 必须校验项目、命名空间和创建人范围；DAGFlowTask 保存前必须校验无环。
  related_user_stories:
    - US-TASK-004
    - US-TASK-005
    - US-TASK-006
  related_rules:
    - BR-TASK-001
    - BR-TASK-002
    - BR-TASK-003
    - BR-TASK-006

task.run.operate:
  domain: task-center
  module: run
  resource: task_run
  action: create, read, cancel, retry, delete
  subject: ordinary_user, business_developer, system_admin
  description: 创建、查询、取消、重试和软删除 TaskRun。
  frontend_usage: 控制任务状态页、进度查询、取消、重试和终态删除入口。
  backend_enforcement: 必须校验项目、命名空间、创建人或授权可见性；取消和删除必须校验 TaskRun 状态。
  related_user_stories:
    - US-TASK-001
    - US-TASK-002
    - US-TASK-003
  related_rules:
    - BR-TASK-007
    - BR-TASK-037
    - BR-TASK-041

task.worker.protocol:
  domain: task-center
  module: worker
  resource: worker, task_attempt, execution_lease
  action: register, heartbeat, claim, progress, complete, fail, renew_lease
  subject: worker_process
  description: Worker 使用任务中心协议领取任务、续约 lease、上报进度并回写结果。
  frontend_usage: 不直接暴露给普通前端页面，仅用于 Worker 运行协议和运维诊断。
  backend_enforcement: 必须校验 worker_id、attempt_id 和 lease_id；无有效 lease 时禁止更新 TaskRun。
  related_user_stories:
    - US-TASK-001
    - US-TASK-007
  related_rules:
    - BR-TASK-013
    - BR-TASK-014
    - BR-TASK-015
    - BR-TASK-016
    - BR-TASK-018
    - BR-TASK-029

task.operation.admin:
  domain: task-center
  module: operations
  resource: worker, watchdog, task_run, task_attempt
  action: read_health, manage_worker, inspect_all
  subject: system_admin, ops_user
  description: 查看任务中心健康、Worker 状态、watchdog 结果和跨项目异常任务。
  frontend_usage: 控制运维健康页、Worker 管理和异常任务排查入口。
  backend_enforcement: 必须校验运维或系统管理员身份；跨项目查询不得授予普通用户。
  related_user_stories:
    - US-TASK-003
    - US-TASK-007
  related_rules:
    - BR-TASK-042
    - BR-TASK-043
    - BR-TASK-044
    - BR-TASK-047
