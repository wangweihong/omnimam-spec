openapi: 3.0.3
info:
  title: OmniMAM Model Management API
  version: 0.1.0
  description: 用户模型管理 S2 API 契约，覆盖个人模型提供商、模型清单、连接检测、默认模型和下游模型选项。
servers:
  - url: /api/v1
tags:
  - name: model-providers
  - name: provider-models
  - name: default-models
  - name: model-options
paths:
  /api/v1/model-providers:
    get:
      tags: [model-providers]
      operationId: listModelProviders
      x-s1-refs:
        user_stories: [US-USER-MODEL-01]
        business_rules: [BR-USER-MODEL-02, BR-USER-MODEL-03, BR-USER-MODEL-04]
      parameters:
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
      responses:
        "200":
          description: 当前用户模型提供商列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProviderListResponse"
    post:
      tags: [model-providers]
      operationId: createModelProvider
      x-s1-refs:
        user_stories: [US-USER-MODEL-02]
        business_rules: [BR-USER-MODEL-02, BR-USER-MODEL-03, BR-USER-MODEL-05]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelProviderCreateRequest"
      responses:
        "200":
          description: 已创建的模型提供商。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProvider"
  /api/v1/model-providers/test:
    post:
      tags: [model-providers]
      operationId: testUnsavedModelProvider
      x-s1-refs:
        user_stories: [US-USER-MODEL-05]
        business_rules: [BR-USER-MODEL-08, BR-USER-MODEL-09]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelProviderTestRequest"
      responses:
        "200":
          description: 未保存表单连接检测结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResult"
  /api/v1/model-providers/{provider_id}:
    get:
      tags: [model-providers]
      operationId: getModelProvider
      x-s1-refs:
        user_stories: [US-USER-MODEL-01]
        business_rules: [BR-USER-MODEL-02, BR-USER-MODEL-04]
      parameters:
        - $ref: "#/components/parameters/provider_id"
      responses:
        "200":
          description: 模型提供商详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProvider"
    patch:
      tags: [model-providers]
      operationId: updateModelProvider
      x-s1-refs:
        user_stories: [US-USER-MODEL-03]
        business_rules: [BR-USER-MODEL-03, BR-USER-MODEL-05, BR-USER-MODEL-06]
      parameters:
        - $ref: "#/components/parameters/provider_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelProviderUpdateRequest"
      responses:
        "200":
          description: 已更新的模型提供商。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProvider"
    delete:
      tags: [model-providers]
      operationId: deleteModelProvider
      x-s1-refs:
        user_stories: [US-USER-MODEL-04]
        business_rules: [BR-USER-MODEL-07]
      parameters:
        - $ref: "#/components/parameters/provider_id"
      responses:
        "200":
          description: 删除结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/v1/model-providers/{provider_id}/test:
    post:
      tags: [model-providers]
      operationId: testModelProvider
      x-s1-refs:
        user_stories: [US-USER-MODEL-05]
        business_rules: [BR-USER-MODEL-08, BR-USER-MODEL-09]
      parameters:
        - $ref: "#/components/parameters/provider_id"
      responses:
        "200":
          description: 已保存提供商连接检测结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResult"
  /api/v1/model-providers/{provider_id}/models:
    get:
      tags: [provider-models]
      operationId: listProviderModels
      x-s1-refs:
        user_stories: [US-USER-MODEL-09]
        business_rules: [BR-USER-MODEL-02, BR-USER-MODEL-12, BR-USER-MODEL-15]
      parameters:
        - $ref: "#/components/parameters/provider_id"
        - $ref: "#/components/parameters/page_num"
        - $ref: "#/components/parameters/page_size"
        - $ref: "#/components/parameters/keyword"
      responses:
        "200":
          description: 提供商模型列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModelListResponse"
    post:
      tags: [provider-models]
      operationId: createProviderModel
      x-s1-refs:
        user_stories: [US-USER-MODEL-07]
        business_rules: [BR-USER-MODEL-11, BR-USER-MODEL-12]
      parameters:
        - $ref: "#/components/parameters/provider_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderModelCreateRequest"
      responses:
        "200":
          description: 已创建的模型。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModel"
  /api/v1/model-providers/{provider_id}/models/sync:
    post:
      tags: [provider-models]
      operationId: syncProviderModels
      x-s1-refs:
        user_stories: [US-USER-MODEL-06]
        business_rules: [BR-USER-MODEL-10, BR-USER-MODEL-12]
      parameters:
        - $ref: "#/components/parameters/provider_id"
      responses:
        "200":
          description: 同步结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelSyncResult"
  /api/v1/provider-models/{model_id}:
    patch:
      tags: [provider-models]
      operationId: updateProviderModel
      x-s1-refs:
        user_stories: [US-USER-MODEL-08]
        business_rules: [BR-USER-MODEL-12, BR-USER-MODEL-13, BR-USER-MODEL-14]
      parameters:
        - $ref: "#/components/parameters/model_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderModelUpdateRequest"
      responses:
        "200":
          description: 已更新的模型。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModel"
    delete:
      tags: [provider-models]
      operationId: deleteProviderModel
      x-s1-refs:
        user_stories: [US-USER-MODEL-11]
        business_rules: [BR-USER-MODEL-22]
      parameters:
        - $ref: "#/components/parameters/model_id"
      responses:
        "200":
          description: 删除结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /api/v1/provider-models/{model_id}/test:
    post:
      tags: [provider-models]
      operationId: testProviderModel
      x-s1-refs:
        user_stories: [US-USER-MODEL-10]
        business_rules: [BR-USER-MODEL-19]
      parameters:
        - $ref: "#/components/parameters/model_id"
      responses:
        "200":
          description: 单模型连接检测结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResult"
  /api/v1/default-models/{usage}:
    get:
      tags: [default-models]
      operationId: getDefaultModel
      x-s1-refs:
        user_stories: [US-USER-MODEL-12, US-USER-MODEL-13]
        business_rules: [BR-USER-MODEL-23, BR-USER-MODEL-24, BR-USER-MODEL-26]
      parameters:
        - $ref: "#/components/parameters/usage"
      responses:
        "200":
          description: 当前用户默认模型配置。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultModelConfig"
    put:
      tags: [default-models]
      operationId: saveDefaultModel
      x-s1-refs:
        user_stories: [US-USER-MODEL-12]
        business_rules: [BR-USER-MODEL-23, BR-USER-MODEL-24, BR-USER-MODEL-25]
      parameters:
        - $ref: "#/components/parameters/usage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefaultModelSaveRequest"
      responses:
        "200":
          description: 已保存的默认模型配置。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultModelConfig"
  /api/v1/model-options:
    get:
      tags: [model-options]
      operationId: listModelOptions
      x-s1-refs:
        user_stories: [US-USER-MODEL-13]
        business_rules: [BR-USER-MODEL-24, BR-USER-MODEL-26, BR-USER-MODEL-27]
      parameters:
        - name: usage
          in: query
          schema:
            $ref: "#/components/schemas/DefaultUsage"
        - name: capability
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 下游功能可选择的当前用户模型。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelOptionListResponse"
components:
  parameters:
    page_num:
      name: page_num
      in: query
      schema: { type: integer, default: 0, minimum: 0 }
    page_size:
      name: page_size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    keyword:
      name: keyword
      in: query
      schema: { type: string, default: "" }
    provider_id:
      name: provider_id
      in: path
      required: true
      schema: { type: string }
    model_id:
      name: model_id
      in: path
      required: true
      schema: { type: string }
    usage:
      name: usage
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/DefaultUsage"
  schemas:
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
    DefaultUsage:
      type: string
      enum: [assistant.default, quick, translation]
    HealthStatus:
      type: string
      enum: [unknown, healthy, unhealthy]
    ModelProvider:
      type: object
      required: [id, owner_user_id, name, provider_type, api_base_url, auth_type, enabled, created_at, updated_at]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        name: { type: string }
        provider_type: { type: string }
        api_base_url: { type: string, format: uri }
        auth_type: { type: string }
        api_key_ref: { type: string }
        enabled: { type: boolean }
        description: { type: string }
        extra_config: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ModelProviderCreateRequest:
      type: object
      required: [name, provider_type, api_base_url, auth_type, enabled]
      properties:
        name: { type: string }
        provider_type: { type: string }
        api_base_url: { type: string, format: uri }
        auth_type: { type: string }
        api_key_ref: { type: string }
        enabled: { type: boolean }
        description: { type: string }
        extra_config: { type: object, additionalProperties: true }
    ModelProviderUpdateRequest:
      type: object
      properties:
        name: { type: string }
        provider_type: { type: string }
        api_base_url: { type: string, format: uri }
        auth_type: { type: string }
        api_key_ref: { type: string }
        enabled: { type: boolean }
        description: { type: string }
        extra_config: { type: object, additionalProperties: true }
    ModelProviderTestRequest:
      allOf:
        - $ref: "#/components/schemas/ModelProviderCreateRequest"
    ProviderModel:
      type: object
      required: [id, owner_user_id, provider_id, model, display_name, capabilities, stream_supported, health_status, enabled, created_at, updated_at]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        provider_id: { type: string }
        provider_name: { type: string }
        model: { type: string }
        display_name: { type: string }
        group: { type: string }
        capabilities:
          type: array
          items: { type: string }
        stream_supported: { type: boolean }
        health_status:
          $ref: "#/components/schemas/HealthStatus"
        unhealthy_reason: { type: string }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProviderModelCreateRequest:
      type: object
      required: [model, display_name]
      properties:
        model: { type: string }
        display_name: { type: string }
        group: { type: string }
        capabilities:
          type: array
          items: { type: string }
        stream_supported: { type: boolean, default: true }
        enabled: { type: boolean, default: true }
    ProviderModelUpdateRequest:
      type: object
      properties:
        display_name: { type: string }
        group: { type: string }
        capabilities:
          type: array
          items: { type: string }
        stream_supported: { type: boolean }
        enabled: { type: boolean }
    DefaultModelConfig:
      type: object
      required: [id, owner_user_id, usage, provider_id, model_id, created_at, updated_at]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        usage:
          $ref: "#/components/schemas/DefaultUsage"
        provider_id: { type: string }
        model_id: { type: string }
        model:
          $ref: "#/components/schemas/ProviderModel"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DefaultModelSaveRequest:
      type: object
      required: [provider_id, model_id]
      properties:
        provider_id: { type: string }
        model_id: { type: string }
    HealthCheckResult:
      type: object
      required: [target_type, provider_id, success, health_status, checked_at]
      properties:
        target_type: { type: string, enum: [provider, model] }
        provider_id: { type: string }
        model_id: { type: string }
        success: { type: boolean }
        health_status:
          $ref: "#/components/schemas/HealthStatus"
        message: { type: string }
        checked_at: { type: string, format: date-time }
    ModelSyncResult:
      type: object
      required: [total, created, updated, skipped]
      properties:
        total: { type: integer }
        created: { type: integer }
        updated: { type: integer }
        skipped: { type: integer }
        models:
          type: array
          items:
            $ref: "#/components/schemas/ProviderModel"
    ModelProviderListResponse:
      type: object
      required: [total, items]
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ModelProvider"
    ProviderModelListResponse:
      type: object
      required: [total, items]
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProviderModel"
    ModelOptionListResponse:
      type: object
      required: [total, items]
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProviderModel"
