workflow.node_definition.read:
  domain: workflow-canvas
  module: node-definition
  resource: node_definition
  action: read
  subject: ordinary_user, business_developer, system_admin
  description: 浏览当前 project、namespace 和主体有权使用的节点定义固定版本。
  frontend_usage: 控制节点目录、节点详情和交互编辑器入口。
  backend_enforcement: 按 availability_scope、project、namespace、弃用状态和引用能力裁剪；不返回内部 handler、Worker、Provider endpoint 或凭证。
  related_user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-004, BR-WORKFLOW-017, BR-WORKFLOW-031]

workflow.node_definition.manage:
  domain: workflow-canvas
  module: node-definition
  resource: node_definition
  action: register, deprecate
  subject: authorized_admin, system_admin
  description: 注册新的不可变节点定义版本或阻止其被新画布引用。
  frontend_usage: 仅管理员节点能力管理界面使用。
  backend_enforcement: 禁止原地改写历史定义版本；renderer、functionRef 和 ApplicationVersion 必须来自受控注册表。
  related_user_stories: [US-WORKFLOW-001, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-004, BR-WORKFLOW-005, BR-WORKFLOW-017]

workflow.canvas.read:
  domain: workflow-canvas
  module: canvas
  resource: canvas, canvas_version
  action: read
  subject: ordinary_user, business_developer, system_admin
  description: 读取可见 Canvas 草稿和不可变版本历史。
  frontend_usage: 控制画布列表、编辑器只读态和版本历史入口。
  backend_enforcement: 校验 owner、project、namespace、visibility；关联摘要不可见时仅保留原始 ID。
  related_user_stories: [US-WORKFLOW-001, US-WORKFLOW-004, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-001, BR-WORKFLOW-012, BR-WORKFLOW-016, BR-WORKFLOW-031, BR-WORKFLOW-034]

workflow.canvas.edit:
  domain: workflow-canvas
  module: canvas
  resource: canvas
  action: create, update, validate
  subject: ordinary_user, business_developer, system_admin
  description: 创建 Canvas，并按 expected_draft_revision 更新或预检草稿。
  frontend_usage: 控制新建、编辑、自动保存和草稿校验入口。
  backend_enforcement: 校验 project、namespace、owner、revision、NodeDefinition 和外部资源引用；禁止任意运行时配置。
  related_user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-001, BR-WORKFLOW-005, BR-WORKFLOW-017, BR-WORKFLOW-029, BR-WORKFLOW-031]

workflow.canvas.publish:
  domain: workflow-canvas
  module: version
  resource: canvas_version
  action: publish
  subject: ordinary_user, business_developer, system_admin
  description: 原子校验并发布不可变 CanvasVersion。
  frontend_usage: 控制发布入口和发布错误展示。
  backend_enforcement: 在事务边界重新校验 revision、图、引用、权限、输入映射、无环和规模，并幂等注册内容寻址 workflow definition。
  related_user_stories: [US-WORKFLOW-001, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-002, BR-WORKFLOW-003, BR-WORKFLOW-004, BR-WORKFLOW-011, BR-WORKFLOW-017, BR-WORKFLOW-018, BR-WORKFLOW-031]

workflow.canvas.delete:
  domain: workflow-canvas
  module: canvas
  resource: canvas
  action: delete
  subject: ordinary_user, business_developer, system_admin
  description: 软删除 Canvas，保留版本、运行和跨域历史事实。
  frontend_usage: 控制画布删除入口。
  backend_enforcement: 仅软删除可管理的 Canvas；不得级联删除 CanvasVersion、CanvasRun、Task 或 Artifact。
  related_user_stories: [US-WORKFLOW-001, US-WORKFLOW-004]
  related_rules: [BR-WORKFLOW-012, BR-WORKFLOW-034]

workflow.run.create:
  domain: workflow-canvas
  module: run
  resource: canvas_run, canvas_flow_run, canvas_node_run
  action: validate, create
  subject: ordinary_user, business_developer, system_admin
  description: 预检并幂等创建固定版本 CanvasRun。
  frontend_usage: 控制运行节点、上游链、下游链、指定流和全部流的入口。
  backend_enforcement: 校验固定版本、scope、输入闭包、复用资格、配额和所有引用；只向 Task Center 创建一个 DAGTaskGroup。
  related_user_stories: [US-WORKFLOW-002, US-WORKFLOW-003, US-WORKFLOW-004, US-WORKFLOW-005, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-006, BR-WORKFLOW-007, BR-WORKFLOW-010, BR-WORKFLOW-019, BR-WORKFLOW-021, BR-WORKFLOW-031, BR-WORKFLOW-032, BR-WORKFLOW-033]

workflow.run.read:
  domain: workflow-canvas
  module: run
  resource: canvas_run, canvas_flow_run, canvas_node_run, task_binding, output_binding
  action: read
  subject: ordinary_user, business_developer, system_admin
  description: 读取运行、流、节点、任务绑定和输出绑定事实快照。
  frontend_usage: 控制运行历史、节点进度、错误、任务追溯和渐进制品展示。
  backend_enforcement: 按 project、namespace、created_by 和 visibility 过滤；Task 与 Artifact 摘要由事实源批量裁剪，不允许跨表穿透或 N+1。
  related_user_stories: [US-WORKFLOW-002, US-WORKFLOW-004, US-WORKFLOW-005, US-WORKFLOW-006, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-014, BR-WORKFLOW-016, BR-WORKFLOW-021, BR-WORKFLOW-022, BR-WORKFLOW-031, BR-WORKFLOW-034]

workflow.run.cancel:
  domain: workflow-canvas
  module: run
  resource: canvas_run
  action: cancel
  subject: ordinary_user, business_developer, system_admin
  description: 幂等请求 Task Center 取消整个 CanvasRun 的唯一 DAGTaskGroup。
  frontend_usage: 控制首期“取消所有运行”入口。
  backend_enforcement: 校验调用方和运行范围；不覆盖已终态 AtomicTask，不在 Canvas 内本地取消任务。
  related_user_stories: [US-WORKFLOW-002, US-WORKFLOW-008, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-013, BR-WORKFLOW-027, BR-WORKFLOW-031]

workflow.run.retry:
  domain: workflow-canvas
  module: run
  resource: canvas_run
  action: retry_failed, retry_node, retry_from_node, retry_flow, rerun_all
  subject: ordinary_user, business_developer, system_admin
  description: 按明确意图创建新的 CanvasRun 并保留原运行历史。
  frontend_usage: 控制所有用户手动重跑入口。
  backend_enforcement: 默认固定原版本和输入，重新校验引用和复用；不得重开原 AtomicTask 或 TaskAttempt。
  related_user_stories: [US-WORKFLOW-005, US-WORKFLOW-008, US-WORKFLOW-009]
  related_rules: [BR-WORKFLOW-013, BR-WORKFLOW-021, BR-WORKFLOW-027, BR-WORKFLOW-031, BR-WORKFLOW-034]

workflow.projection.internal:
  domain: workflow-canvas
  module: projection
  resource: canvas_run, canvas_flow_run, canvas_node_run, task_binding, output_binding, outbox, reconcile_cursor
  action: bind_task, project_task, project_artifact, publish_event, reconcile
  subject: workflow_canvas_service
  description: 绑定跨域 ID、投影 Task/Artifact 事实并发布 Canvas 语义事件。
  frontend_usage: 不向前端直接暴露。
  backend_enforcement: 仅服务身份可用；只接受匹配绑定与更高 resource_version/aggregate_version，所有写入先持久化再通知。
  related_user_stories: [US-WORKFLOW-002, US-WORKFLOW-003, US-WORKFLOW-004, US-WORKFLOW-006]
  related_rules: [BR-WORKFLOW-008, BR-WORKFLOW-014, BR-WORKFLOW-022, BR-WORKFLOW-023, BR-WORKFLOW-025, BR-WORKFLOW-032, BR-WORKFLOW-034]
