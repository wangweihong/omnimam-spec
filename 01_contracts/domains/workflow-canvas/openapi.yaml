openapi: 3.0.3
info:
  title: OmniMAM Workflow Canvas API
  version: 1.2.0-draft
  description: |
    Workflow Canvas S2 契约。Canvas 保存编辑事实并发布不可变版本；每次运行固定版本、
    输入、scope 与复用决策，并展平到 Task Center 的唯一 DAGTaskGroup。
    业务错误使用 HTTP 200 和 ErrorResponse 表达；HTTP 404 仅表示路由不存在。
servers:
  - url: /
security:
  - bearer_auth: []
tags:
  - {name: node-definitions, description: 受控节点能力目录。}
  - {name: canvases, description: Canvas 草稿、校验与发布。}
  - {name: canvas-versions, description: 不可变 CanvasVersion。}
  - {name: canvas-runs, description: 固定版本运行、快照、取消与手动重跑。}

paths:
  /api/v1/node-definitions:
    get:
      tags: [node-definitions]
      operationId: list_node_definitions
      summary: 查询当前调用方可用的节点定义版本
      x-permission: workflow.node_definition.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-004, BR-WORKFLOW-017, BR-WORKFLOW-029, BR-WORKFLOW-031]
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/search_fields'}
        - {$ref: '#/components/parameters/sort_field'}
        - {$ref: '#/components/parameters/sort_order'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
        - {name: category, in: query, schema: {type: string}}
        - {name: node_kind, in: query, schema: {$ref: '#/components/schemas/NodeKind'}}
        - {name: execution_mode, in: query, schema: {$ref: '#/components/schemas/ExecutionMode'}}
        - {name: include_deprecated, in: query, schema: {type: boolean, default: false}}
      responses:
        '200':
          description: 节点定义列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/NodeDefinitionList'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
    post:
      tags: [node-definitions]
      operationId: register_node_definition
      summary: 注册新的不可变节点定义版本
      x-permission: workflow.node_definition.manage
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-003, BR-WORKFLOW-004, BR-WORKFLOW-005, BR-WORKFLOW-017, BR-WORKFLOW-029, BR-WORKFLOW-031]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/RegisterNodeDefinitionRequest'}}}
      responses:
        '200':
          description: 新节点定义版本或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/NodeDefinition'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/node-definitions/{node_type}/versions/{definition_version}:
    get:
      tags: [node-definitions]
      operationId: get_node_definition
      summary: 查询节点定义的固定版本
      x-permission: workflow.node_definition.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-017, BR-WORKFLOW-029, BR-WORKFLOW-031]
      parameters:
        - {$ref: '#/components/parameters/node_type'}
        - {$ref: '#/components/parameters/definition_version'}
      responses:
        '200':
          description: 节点定义或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/NodeDefinition'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/node-definitions/{node_type}/versions/{definition_version}/deprecate:
    post:
      tags: [node-definitions]
      operationId: deprecate_node_definition
      summary: 阻止节点定义版本被新画布引用
      x-permission: workflow.node_definition.manage
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-017, BR-WORKFLOW-031]
      parameters:
        - {$ref: '#/components/parameters/node_type'}
        - {$ref: '#/components/parameters/definition_version'}
      requestBody:
        content: {application/json: {schema: {$ref: '#/components/schemas/DeprecateNodeDefinitionRequest'}}}
      responses:
        '200':
          description: 已下线节点定义；历史版本和历史运行仍可读，或返回业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/NodeDefinition'}
                  - {$ref: '#/components/schemas/ErrorResponse'}

  /api/v1/canvases:
    get:
      tags: [canvases]
      operationId: list_canvases
      summary: 查询可见 Canvas
      x-permission: workflow.canvas.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-001, BR-WORKFLOW-031]
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/search_fields'}
        - {$ref: '#/components/parameters/sort_field'}
        - {$ref: '#/components/parameters/sort_order'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
        - {name: visibility, in: query, schema: {$ref: '#/components/schemas/Visibility'}}
        - {name: project_id, in: query, schema: {type: string}}
        - {name: namespace, in: query, schema: {type: string}}
      responses:
        '200':
          description: Canvas 列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasList'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
    post:
      tags: [canvases]
      operationId: create_canvas
      summary: 创建 Canvas 草稿
      x-permission: workflow.canvas.edit
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-001, BR-WORKFLOW-017, BR-WORKFLOW-029, BR-WORKFLOW-031]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/CreateCanvasRequest'}}}
      responses:
        '200':
          description: 新 Canvas 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Canvas'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvases/{canvas_id}:
    parameters:
      - {$ref: '#/components/parameters/canvas_id'}
    get:
      tags: [canvases]
      operationId: get_canvas
      summary: 查询 Canvas 与当前草稿
      x-permission: workflow.canvas.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-001, BR-WORKFLOW-029, BR-WORKFLOW-031]
      responses:
        '200':
          description: Canvas 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Canvas'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
    patch:
      tags: [canvases]
      operationId: update_canvas_draft
      summary: 按期望 revision 更新 Canvas 元数据和草稿图
      x-permission: workflow.canvas.edit
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-001, BR-WORKFLOW-012, BR-WORKFLOW-029, BR-WORKFLOW-031]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/UpdateCanvasDraftRequest'}}}
      responses:
        '200':
          description: 更新后的 Canvas 或业务错误；revision 冲突时 ErrorResponse.data 返回 current_revision。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/Canvas'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
    delete:
      tags: [canvases]
      operationId: delete_canvas
      summary: 软删除 Canvas
      x-permission: workflow.canvas.delete
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-004]
        business_rules: [BR-WORKFLOW-012, BR-WORKFLOW-034]
      responses:
        '200':
          description: 删除结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/ActionResult'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvases/{canvas_id}/validate:
    post:
      tags: [canvases]
      operationId: validate_canvas_draft
      summary: 校验当前 Canvas 草稿并一次返回全部可定位问题
      x-permission: workflow.canvas.edit
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-007, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-002, BR-WORKFLOW-003, BR-WORKFLOW-004, BR-WORKFLOW-005, BR-WORKFLOW-011, BR-WORKFLOW-017, BR-WORKFLOW-029, BR-WORKFLOW-031]
      parameters:
        - {$ref: '#/components/parameters/canvas_id'}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ValidateDraftRequest'}}}
      responses:
        '200':
          description: 校验结果或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/ValidationResult'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvases/{canvas_id}/publish:
    post:
      tags: [canvases]
      operationId: publish_canvas
      summary: 原子校验并发布不可变 CanvasVersion
      x-permission: workflow.canvas.publish
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-002, BR-WORKFLOW-003, BR-WORKFLOW-004, BR-WORKFLOW-005, BR-WORKFLOW-011, BR-WORKFLOW-017, BR-WORKFLOW-018, BR-WORKFLOW-031]
      parameters:
        - {$ref: '#/components/parameters/canvas_id'}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/PublishCanvasRequest'}}}
      responses:
        '200':
          description: 不可变版本或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasVersion'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvases/{canvas_id}/versions:
    get:
      tags: [canvas-versions]
      operationId: list_canvas_versions
      summary: 查询 Canvas 的不可变版本
      x-permission: workflow.canvas.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-004]
        business_rules: [BR-WORKFLOW-001, BR-WORKFLOW-012, BR-WORKFLOW-034]
      parameters:
        - {$ref: '#/components/parameters/canvas_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/search_fields'}
        - {$ref: '#/components/parameters/sort_field'}
        - {$ref: '#/components/parameters/sort_order'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
      responses:
        '200':
          description: CanvasVersion 列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasVersionList'}
                  - {$ref: '#/components/schemas/ErrorResponse'}

  /api/v1/canvas-versions/{canvas_version_id}:
    get:
      tags: [canvas-versions]
      operationId: get_canvas_version
      summary: 查询不可变 CanvasVersion
      x-permission: workflow.canvas.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-001, US-WORKFLOW-002, US-WORKFLOW-004]
        business_rules: [BR-WORKFLOW-001, BR-WORKFLOW-006, BR-WORKFLOW-012, BR-WORKFLOW-016, BR-WORKFLOW-034]
      parameters:
        - {$ref: '#/components/parameters/canvas_version_id'}
      responses:
        '200':
          description: CanvasVersion 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasVersion'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvas-versions/{canvas_version_id}/validate-run:
    post:
      tags: [canvas-versions]
      operationId: validate_canvas_run
      summary: 在创建任务前预检固定版本、scope、输入和复用策略
      x-permission: workflow.run.create
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-003, US-WORKFLOW-005, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-006, BR-WORKFLOW-010, BR-WORKFLOW-019, BR-WORKFLOW-020, BR-WORKFLOW-021, BR-WORKFLOW-028, BR-WORKFLOW-031, BR-WORKFLOW-033]
      parameters:
        - {$ref: '#/components/parameters/canvas_version_id'}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/ValidateRunRequest'}}}
      responses:
        '200':
          description: 运行预检结果或业务错误；不会创建 CanvasRun 或 Task Center 资源。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/RunValidationResult'}
                  - {$ref: '#/components/schemas/ErrorResponse'}

  /api/v1/canvas-runs:
    get:
      tags: [canvas-runs]
      operationId: list_canvas_runs
      summary: 查询 CanvasRun
      x-permission: workflow.run.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-004, US-WORKFLOW-005, US-WORKFLOW-008, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-006, BR-WORKFLOW-012, BR-WORKFLOW-016, BR-WORKFLOW-031, BR-WORKFLOW-034]
      parameters:
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/search_fields'}
        - {$ref: '#/components/parameters/sort_field'}
        - {$ref: '#/components/parameters/sort_order'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
        - {name: canvas_id, in: query, schema: {type: string}}
        - {name: canvas_version_id, in: query, schema: {type: string}}
        - {name: status, in: query, schema: {$ref: '#/components/schemas/CanvasRunStatus'}}
        - {name: retry_of_canvas_run_id, in: query, schema: {type: string}}
        - {name: project_id, in: query, schema: {type: string}}
        - {name: namespace, in: query, schema: {type: string}}
      responses:
        '200':
          description: CanvasRun 列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasRunList'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
    post:
      tags: [canvas-runs]
      operationId: create_canvas_run
      summary: 幂等创建并启动固定版本 CanvasRun
      x-permission: workflow.run.create
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-003, US-WORKFLOW-004, US-WORKFLOW-005, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-006, BR-WORKFLOW-007, BR-WORKFLOW-010, BR-WORKFLOW-018, BR-WORKFLOW-019, BR-WORKFLOW-020, BR-WORKFLOW-021, BR-WORKFLOW-028, BR-WORKFLOW-031, BR-WORKFLOW-032, BR-WORKFLOW-033]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/CreateCanvasRunRequest'}}}
      responses:
        '200':
          description: 新建或幂等命中的 CanvasRun 初始快照，或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasRun'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvas-runs/{canvas_run_id}:
    get:
      tags: [canvas-runs]
      operationId: get_canvas_run
      summary: 查询 CanvasRun 事实快照与聚合摘要
      x-permission: workflow.run.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-004, US-WORKFLOW-005, US-WORKFLOW-006, US-WORKFLOW-008, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-006, BR-WORKFLOW-014, BR-WORKFLOW-016, BR-WORKFLOW-021, BR-WORKFLOW-023, BR-WORKFLOW-031, BR-WORKFLOW-034]
      parameters:
        - {$ref: '#/components/parameters/canvas_run_id'}
      responses:
        '200':
          description: CanvasRun 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasRun'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvas-runs/{canvas_run_id}/flows:
    get:
      tags: [canvas-runs]
      operationId: list_canvas_flow_runs
      summary: 查询 CanvasFlowRun 投影
      x-permission: workflow.run.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-004, US-WORKFLOW-005, US-WORKFLOW-008]
        business_rules: [BR-WORKFLOW-007, BR-WORKFLOW-014, BR-WORKFLOW-020, BR-WORKFLOW-026, BR-WORKFLOW-034]
      parameters:
        - {$ref: '#/components/parameters/canvas_run_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/search_fields'}
        - {$ref: '#/components/parameters/sort_field'}
        - {$ref: '#/components/parameters/sort_order'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
        - {name: status, in: query, schema: {$ref: '#/components/schemas/CanvasRunStatus'}}
      responses:
        '200':
          description: FlowRun 列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasFlowRunList'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvas-runs/{canvas_run_id}/nodes:
    get:
      tags: [canvas-runs]
      operationId: list_canvas_node_runs
      summary: 查询 CanvasNodeRun 执行实例投影
      x-permission: workflow.run.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-003, US-WORKFLOW-004, US-WORKFLOW-005, US-WORKFLOW-006, US-WORKFLOW-008]
        business_rules: [BR-WORKFLOW-008, BR-WORKFLOW-014, BR-WORKFLOW-016, BR-WORKFLOW-020, BR-WORKFLOW-021, BR-WORKFLOW-023, BR-WORKFLOW-027]
      parameters:
        - {$ref: '#/components/parameters/canvas_run_id'}
        - {$ref: '#/components/parameters/page_num'}
        - {$ref: '#/components/parameters/page_size'}
        - {$ref: '#/components/parameters/keyword'}
        - {$ref: '#/components/parameters/search_fields'}
        - {$ref: '#/components/parameters/sort_field'}
        - {$ref: '#/components/parameters/sort_order'}
        - {$ref: '#/components/parameters/created_after'}
        - {$ref: '#/components/parameters/created_before'}
        - {name: status, in: query, schema: {$ref: '#/components/schemas/NodeRunStatus'}}
        - {name: flow_id, in: query, schema: {type: string}}
        - {name: node_id, in: query, schema: {type: string}}
      responses:
        '200':
          description: NodeRun 列表或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasNodeRunList'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvas-runs/{canvas_run_id}/cancel:
    post:
      tags: [canvas-runs]
      operationId: cancel_canvas_run
      summary: 幂等取消整个 CanvasRun
      x-permission: workflow.run.cancel
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-008, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-013, BR-WORKFLOW-027, BR-WORKFLOW-031]
      description: 首期只支持整次 CanvasRun 取消；流级和分片级取消未在本版本开放。
      parameters:
        - {$ref: '#/components/parameters/canvas_run_id'}
      requestBody:
        content: {application/json: {schema: {$ref: '#/components/schemas/CancelCanvasRunRequest'}}}
      responses:
        '200':
          description: 取消请求后的 CanvasRun 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasRun'}
                  - {$ref: '#/components/schemas/ErrorResponse'}
  /api/v1/canvas-runs/{canvas_run_id}/retry:
    post:
      tags: [canvas-runs]
      operationId: retry_canvas_run
      summary: 按明确意图创建新的 CanvasRun
      x-permission: workflow.run.retry
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-005, US-WORKFLOW-008, US-WORKFLOW-009]
        business_rules: [BR-WORKFLOW-013, BR-WORKFLOW-021, BR-WORKFLOW-027, BR-WORKFLOW-031, BR-WORKFLOW-034]
      description: |
        retry_failed、retry_node、retry_from_node、retry_flow 和 rerun_all 均创建新 CanvasRun、
        DAGTaskGroup 与需要执行的 AtomicTask；原运行和自动 TaskAttempt 历史保持不变。
      parameters:
        - {$ref: '#/components/parameters/canvas_run_id'}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/RetryCanvasRunRequest'}}}
      responses:
        '200':
          description: 新 CanvasRun 或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasRun'}
                  - {$ref: '#/components/schemas/ErrorResponse'}

  /api/v1/canvas-node-runs/{canvas_node_run_id}:
    get:
      tags: [canvas-runs]
      operationId: get_canvas_node_run
      summary: 查询单个 CanvasNodeRun、任务绑定和输出绑定
      x-permission: workflow.run.read
      x-s1-refs:
        user_stories: [US-WORKFLOW-002, US-WORKFLOW-003, US-WORKFLOW-004, US-WORKFLOW-005, US-WORKFLOW-006]
        business_rules: [BR-WORKFLOW-008, BR-WORKFLOW-014, BR-WORKFLOW-016, BR-WORKFLOW-021, BR-WORKFLOW-022, BR-WORKFLOW-023]
      parameters:
        - {$ref: '#/components/parameters/canvas_node_run_id'}
      responses:
        '200':
          description: NodeRun 详情或业务错误。
          content:
            application/json:
              schema:
                oneOf:
                  - {$ref: '#/components/schemas/CanvasNodeRunDetail'}
                  - {$ref: '#/components/schemas/ErrorResponse'}

components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    page_num: {name: page_num, in: query, schema: {type: integer, minimum: 0, default: 0}}
    page_size: {name: page_size, in: query, schema: {type: integer, minimum: 1, maximum: 200, default: 20}}
    keyword: {name: keyword, in: query, schema: {type: string, default: ''}}
    search_fields: {name: search_fields, in: query, schema: {type: string, default: 'name,description'}, description: 逗号分隔的允许搜索字段。}
    sort_field: {name: sort_field, in: query, schema: {type: string, default: ''}, description: 允许的排序字段；支持逗号分隔的稳定多字段排序。}
    sort_order: {name: sort_order, in: query, schema: {type: string, enum: [asc, desc], default: asc}}
    created_after: {name: created_after, in: query, schema: {type: string, format: date-time}}
    created_before: {name: created_before, in: query, schema: {type: string, format: date-time}}
    canvas_id: {name: canvas_id, in: path, required: true, schema: {type: string}}
    canvas_version_id: {name: canvas_version_id, in: path, required: true, schema: {type: string}}
    canvas_run_id: {name: canvas_run_id, in: path, required: true, schema: {type: string}}
    canvas_node_run_id: {name: canvas_node_run_id, in: path, required: true, schema: {type: string}}
    node_type: {name: node_type, in: path, required: true, schema: {type: string}}
    definition_version: {name: definition_version, in: path, required: true, schema: {type: string}}

  schemas:
    ErrorResponse:
      type: object
      required: [code, value, message, messages, retryable]
      properties:
        code: {type: string, example: ERR_CANVAS_GRAPH_INVALID}
        value: {type: integer, example: 160202}
        message: {type: string}
        messages:
          type: object
          required: [zh-CN, en-US]
          properties:
            zh-CN: {type: string}
            en-US: {type: string}
        detail: {type: string, nullable: true}
        retryable: {type: boolean}
        causes: {type: array, items: {$ref: '#/components/schemas/ValidationIssue'}}
        data:
          type: object
          additionalProperties: true
          nullable: true
    ActionResult:
      type: object
      required: [success]
      properties:
        success: {type: boolean}

    Visibility:
      type: string
      enum: [PRIVATE, PROJECT]
    NodeKind:
      type: string
      enum: [data, processor, generator, controller, orchestrator, viewer]
    ExecutionMode:
      type: string
      enum: [passive, atomic, expanded]
    PortDirection:
      type: string
      enum: [input, output]
    PortCardinality:
      type: string
      enum: [single, multiple]
    ConnectionType:
      type: string
      enum: [data, control]
    CanvasRunStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCESS, PARTIAL_SUCCESS, FAILED, CANCELED, TIMEOUT]
    NodeRunStatus:
      type: string
      enum: [PENDING, BLOCKED, READY, RUNNING, RETRYING, SUCCESS, PARTIAL_SUCCESS, FAILED, CANCELED, TIMEOUT, SKIPPED, REUSED]
    TaskCreationStatus:
      type: string
      enum: [PENDING, CREATED, RETRYABLE_FAILED]
    ReusePolicy:
      type: string
      enum: [rerun_all, reuse_valid_outputs, reuse_required]
    RunFailurePolicy:
      type: string
      enum: [continue_independent_flows, fail_fast]
      description: 节点 fan-out 首期仍仅支持 all_success；本字段只控制独立流聚合。
    RunScopeMode:
      type: string
      enum: [all, flows, only_nodes, until_nodes, from_nodes]
      description: selected_subgraph 属于第二阶段，当前契约不接受该值。
    ResultMode:
      type: string
      enum: [executed, reused, passive, client_generated]
    JsonValue:
      nullable: true
      anyOf:
        - {type: object, additionalProperties: true}
        - {type: array, items: {}}
        - {type: string}
        - {type: number}
        - {type: boolean}

    PortDefinition:
      type: object
      required: [key, label, direction, data_type, required, cardinality, connection_type]
      properties:
        key: {type: string, pattern: '^[a-z][a-z0-9_]{0,99}$'}
        label: {type: string}
        direction: {$ref: '#/components/schemas/PortDirection'}
        data_type: {type: string}
        required: {type: boolean}
        cardinality: {$ref: '#/components/schemas/PortCardinality'}
        connection_type: {$ref: '#/components/schemas/ConnectionType'}
        allows_literal: {type: boolean, default: false}
        default_value: {$ref: '#/components/schemas/JsonValue'}
        required_for_completion: {type: boolean, default: false}
        artifact_ready_timeout_seconds: {type: integer, minimum: 1, nullable: true}
    ExecutionBinding:
      type: object
      required: [mode, binding_version]
      properties:
        mode: {$ref: '#/components/schemas/ExecutionMode'}
        binding_version: {type: string}
        function_ref: {type: string, nullable: true}
        application_version_id: {type: string, nullable: true}
        max_dynamic_tasks: {type: integer, minimum: 1, maximum: 1000, nullable: true}
      description: passive 不携带执行引用；atomic/expanded 只能携带受控 function_ref 或已发布 application_version_id。
    RendererCapability:
      type: object
      required: [renderer_key, renderer_version]
      properties:
        renderer_key: {type: string}
        renderer_version: {type: string}
        supports_client_generated_output: {type: boolean, default: false}
    NodeDefinition:
      type: object
      required: [node_type, definition_version, title, category, node_kind, ports, config_schema, execution_binding, availability_scope, deprecated, created_at]
      properties:
        node_type: {type: string}
        definition_version: {type: string}
        title: {type: string}
        description: {type: string}
        category: {type: string}
        node_kind: {$ref: '#/components/schemas/NodeKind'}
        ports: {type: array, items: {$ref: '#/components/schemas/PortDefinition'}}
        config_schema:
          type: object
          additionalProperties: true
          x-naming-exception: JSON Schema 原始关键字与节点定义属性名由注册能力拥有，不强制 lower_snake_case。
        controller_state_schema:
          type: object
          additionalProperties: true
          nullable: true
          x-naming-exception: ControllerState 由固定 NodeDefinition schema 约束，历史节点可能保留注册时字段名。
        controller_schema_version: {type: string, nullable: true}
        execution_binding: {$ref: '#/components/schemas/ExecutionBinding'}
        renderer: {$ref: '#/components/schemas/RendererCapability'}
        cache_allowed: {type: boolean, default: false}
        reuse_ttl_seconds: {type: integer, minimum: 1, nullable: true}
        availability_scope: {type: string, enum: [SYSTEM, PROJECT]}
        project_id: {type: string, nullable: true}
        namespace: {type: string, nullable: true}
        deprecated: {type: boolean}
        created_at: {type: string, format: date-time}
    NodeDefinitionListItem:
      type: object
      required: [node_type, definition_version, title, category, node_kind, execution_mode, availability_scope, deprecated, created_at]
      properties:
        node_type: {type: string}
        definition_version: {type: string}
        title: {type: string}
        description: {type: string}
        category: {type: string}
        node_kind: {$ref: '#/components/schemas/NodeKind'}
        execution_mode: {$ref: '#/components/schemas/ExecutionMode'}
        renderer_key: {type: string, nullable: true}
        availability_scope: {type: string, enum: [SYSTEM, PROJECT]}
        deprecated: {type: boolean}
        created_at: {type: string, format: date-time}
    NodeDefinitionList:
      type: object
      required: [total, items]
      properties:
        total: {type: integer, minimum: 0}
        items: {type: array, items: {$ref: '#/components/schemas/NodeDefinitionListItem'}}
    RegisterNodeDefinitionRequest:
      type: object
      required: [node_type, definition_version, title, category, node_kind, ports, config_schema, execution_binding, availability_scope]
      properties:
        node_type: {type: string}
        definition_version: {type: string}
        title: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, maxLength: 2000, default: ''}
        category: {type: string}
        node_kind: {$ref: '#/components/schemas/NodeKind'}
        ports: {type: array, items: {$ref: '#/components/schemas/PortDefinition'}}
        config_schema:
          type: object
          additionalProperties: true
          x-naming-exception: 注册的 JSON Schema 原始关键字和业务属性名不强制 lower_snake_case。
        controller_state_schema:
          type: object
          additionalProperties: true
          nullable: true
        controller_schema_version: {type: string, nullable: true}
        execution_binding: {$ref: '#/components/schemas/ExecutionBinding'}
        renderer: {$ref: '#/components/schemas/RendererCapability'}
        cache_allowed: {type: boolean, default: false}
        reuse_ttl_seconds: {type: integer, minimum: 1, nullable: true}
        availability_scope: {type: string, enum: [SYSTEM, PROJECT]}
        project_id: {type: string, nullable: true}
        namespace: {type: string, nullable: true}
    DeprecateNodeDefinitionRequest:
      type: object
      properties:
        reason: {type: string, maxLength: 1000}

    CanvasNodeInstance:
      type: object
      required: [node_id, node_type, definition_version, position, config]
      properties:
        node_id: {type: string}
        node_type: {type: string}
        definition_version: {type: string}
        position: {$ref: '#/components/schemas/CanvasPosition'}
        size: {$ref: '#/components/schemas/CanvasSize'}
        config: {type: object, additionalProperties: true}
        controller_state:
          type: object
          additionalProperties: true
          nullable: true
          description: 必须包含匹配节点定义的 schema_version 和坐标系；不得含任意 URL、凭证或大型二进制。
        literal_inputs: {type: object, additionalProperties: true}
        ui_state: {type: object, additionalProperties: true, description: 仅编辑态使用，不参与执行指纹。}
    CanvasPosition:
      type: object
      required: [x, y]
      properties:
        x: {type: number}
        y: {type: number}
    CanvasSize:
      type: object
      required: [width, height]
      properties:
        width: {type: number, exclusiveMinimum: true, minimum: 0}
        height: {type: number, exclusiveMinimum: true, minimum: 0}
    CanvasEdge:
      type: object
      required: [edge_id, source_node_id, source_port_key, target_node_id, target_port_key, connection_type, enabled]
      properties:
        edge_id: {type: string}
        source_node_id: {type: string}
        source_port_key: {type: string}
        target_node_id: {type: string}
        target_port_key: {type: string}
        connection_type: {$ref: '#/components/schemas/ConnectionType'}
        order: {type: integer, minimum: 0, nullable: true}
        enabled: {type: boolean}
        display: {type: object, additionalProperties: true}
    CanvasFlowDefinition:
      type: object
      required: [flow_id, name, entry_node_ids, output_node_ids]
      properties:
        flow_id: {type: string}
        name: {type: string}
        entry_node_ids: {type: array, items: {type: string}}
        output_node_ids: {type: array, minItems: 1, items: {type: string}}
        run_policy: {type: object, additionalProperties: true}
    CanvasGraph:
      type: object
      required: [nodes, edges, flows]
      properties:
        nodes: {type: array, maxItems: 1000, items: {$ref: '#/components/schemas/CanvasNodeInstance'}}
        edges: {type: array, maxItems: 5000, items: {$ref: '#/components/schemas/CanvasEdge'}}
        flows: {type: array, items: {$ref: '#/components/schemas/CanvasFlowDefinition'}}
        groups: {type: array, items: {type: object, additionalProperties: true}}
        viewport: {type: object, additionalProperties: true}
    CanvasSummary:
      type: object
