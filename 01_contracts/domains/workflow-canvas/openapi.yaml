        canvas: {$ref: '#/components/schemas/CanvasSummary', nullable: true, readOnly: true}
        version: {type: integer, minimum: 1}
        content_digest: {type: string}
        execution_template_digest: {type: string}
        node_count: {type: integer, minimum: 0, maximum: 1000}
        edge_count: {type: integer, minimum: 0, maximum: 5000}
        published_by: {type: string}
        published_at: {type: string, format: date-time}
    CanvasVersionList:
