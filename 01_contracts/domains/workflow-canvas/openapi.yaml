        flow_id: {type: string}
        name: {type: string}
        execution_keys: {type: array, items: {type: string}}
        status: {$ref: '#/components/schemas/CanvasRunStatus'}
        progress: {type: number, minimum: 0, maximum: 1}
        summary: {$ref: '#/components/schemas/ProgressSummary'}
        result_summary: {type: object, additionalProperties: true}
        warnings: {type: array, items: {$ref: '#/components/schemas/RunWarning'}}
        aggregate_version: {type: integer, format: int64, minimum: 0}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        finished_at: {type: string, format: date-time, nullable: true}
