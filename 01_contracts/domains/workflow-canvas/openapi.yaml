        resource_version: {type: integer, format: int64, minimum: 0}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    CanvasListItem:
      type: object
      required: [canvas_id, name, description, visibility, draft_revision, latest_version, project_id, namespace, created_by, created_at, updated_at]
      properties:
        canvas_id: {type: string}
        name: {type: string}
        description: {type: string}
        visibility: {$ref: '#/components/schemas/Visibility'}
        draft_revision: {type: integer, format: int64, minimum: 1}
        latest_version: {type: integer, minimum: 0}
        latest_published_version_id: {type: string, nullable: true}
        project_id: {type: string}
        namespace: {type: string}
        created_by: {type: string}
        created_at: {type: string, format: date-time}
