    UpdateCanvasDraftRequest:
      type: object
      required: [expected_draft_revision]
      properties:
        expected_draft_revision: {type: integer, format: int64, minimum: 1}
        name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, maxLength: 2000}
        visibility: {$ref: '#/components/schemas/Visibility'}
        draft_graph: {$ref: '#/components/schemas/CanvasGraph'}
    ValidateDraftRequest:
      type: object
      required: [expected_draft_revision]
      properties:
        expected_draft_revision: {type: integer, format: int64, minimum: 1}
    PublishCanvasRequest:
      type: object
      required: [expected_draft_revision]
      properties:
        expected_draft_revision: {type: integer, format: int64, minimum: 1}

    ValidationIssue:
      type: object
      required: [code, severity, message]
      properties:
        code: {type: string}
        severity: {type: string, enum: [error, warning]}
        message: {type: string}
        node_id: {type: string, nullable: true}
        edge_id: {type: string, nullable: true}
        port_key: {type: string, nullable: true}
        flow_id: {type: string, nullable: true}
        data: {type: object, additionalProperties: true}
    ValidationResult:
      type: object
      required: [valid, issues, node_count, edge_count]
      properties:
        valid: {type: boolean}
        issues: {type: array, items: {$ref: '#/components/schemas/ValidationIssue'}}
        node_count: {type: integer, minimum: 0}
        edge_count: {type: integer, minimum: 0}
        content_digest: {type: string, nullable: true}

    CanvasVersionSummary:
