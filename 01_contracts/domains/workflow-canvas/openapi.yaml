        function_ref: {type: string, nullable: true}
        resource_version: {type: integer, format: int64, minimum: 0}
    CanvasRunSummary:
      type: object
      description: 手动重跑来源在创建时保存的一跳不可变摘要。
      x-s1-refs: {business_rules: [BR-GLOBAL-001, BR-GLOBAL-002, BR-GLOBAL-003, BR-GLOBAL-004, BR-WORKFLOW-016]}
      required: [canvas_run_id, status, created_at]
      properties:
        canvas_run_id: {type: string}
        status: {$ref: '#/components/schemas/CanvasRunStatus'}
        created_at: {type: string, format: date-time}

    CanvasFlowRun:
      type: object
