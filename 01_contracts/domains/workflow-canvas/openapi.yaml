        canvas_id: {type: string}
        canvas: {$ref: '#/components/schemas/CanvasSummary', nullable: true, readOnly: true}
        version: {type: integer, minimum: 1}
        graph_snapshot: {$ref: '#/components/schemas/CanvasGraph'}
        definition_snapshots: {type: array, items: {$ref: '#/components/schemas/NodeDefinition'}}
