  owning_domain: sse
  owning_module: projection
  range: 170600-170799
  retryable: true
  deprecated: false
  related_rules: [BR-SSE-015]
  related_user_stories: [US-SSE-005]

permission_denied:
  code: ERR_SSE_PERMISSION_DENIED
  value: 170800
  http: 200
  cn: 当前调用方无权建立事件流或读取历史事件。
  en: The caller cannot open the event stream or read event history.
  owning_domain: sse
  owning_module: access
  range: 170800-170999
  retryable: false
  deprecated: false
  related_rules: [BR-SSE-003, BR-SSE-013]
  related_user_stories: [US-SSE-001, US-SSE-004]
