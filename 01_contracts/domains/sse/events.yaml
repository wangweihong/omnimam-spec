x-atomic-task-defaults: &atomic_task_defaults
  producer: sse-event-projector
  consumers: [omnimam-web]
  source_events: [task-center.atomic_task_created, task-center.atomic_task_status_changed]
  payload:
    atomic_task_id: string
    from_status: string|null
    status: string
    progress: number|null
    phase: string|null
    current: integer|null
    total: integer|null
    message_code: string|null
    current_attempt: integer|null
    retry_at: string(date-time)|null
    error_code: string|null
    retryable: boolean|null
    output_summary: object
    aggregate_version: integer
    occurred_at: string(date-time)
  idempotency_key: recipient_user_id:atomic_task_id:aggregate_version:event_name
  retry_policy: 由用户事件投影 outbox 重试，重复键返回已有事件。
  failure_policy: AtomicTask 仍以 task-center 为事实源；投影失败不回滚任务，客户端可查询事实恢复。
  related_rules: [BR-SSE-004, BR-SSE-005, BR-SSE-006, BR-SSE-009, BR-SSE-010, BR-SSE-011]
  related_user_stories: [US-SSE-002, US-SSE-004]

x-task-attempt-defaults: &task_attempt_defaults
  producer: sse-event-projector
  consumers: [omnimam-web]
  source_events: [task-center.task_attempt_status_changed]
  payload:
    task_attempt_id: string
    atomic_task_id: string
    attempt_no: integer
    from_status: string|null
    status: string
    error_code: string|null
    retryable: boolean|null
    started_at: string(date-time)|null
    finished_at: string(date-time)|null
    aggregate_version: integer
    occurred_at: string(date-time)
  idempotency_key: recipient_user_id:task_attempt_id:aggregate_version:event_name
  retry_policy: 由用户事件投影 outbox 重试，消费者按 Attempt 版本幂等。
  failure_policy: TaskAttempt 历史仍以 task-center 为事实源，失败不改写 Attempt 或 AtomicTask。
  related_rules: [BR-SSE-004, BR-SSE-005, BR-SSE-006, BR-SSE-009, BR-SSE-011]
  related_user_stories: [US-SSE-002, US-SSE-004]

x-task-group-defaults: &task_group_defaults
  producer: sse-event-projector
  consumers: [omnimam-web]
  source_events: [task-center.task_group_status_changed]
  payload:
    group_type: string(TASK_GROUP|DAG_TASK_GROUP)
    group_id: string
    from_status: string|null
    status: string
    progress: number
    total: integer
    pending: integer
    blocked: integer
    running: integer
    success: integer
    failed: integer
    canceled: integer
    skipped: integer
    aggregate_version: integer
    occurred_at: string(date-time)
  idempotency_key: recipient_user_id:group_type:group_id:aggregate_version:event_name
  retry_policy: 由用户事件投影 outbox 重试，消费者按 Group/DAG 版本幂等。
  failure_policy: Group/DAG 汇总仍以 task-center 为事实源，不用汇总事件覆盖子 AtomicTask 具体错误。
  related_rules: [BR-SSE-004, BR-SSE-005, BR-SSE-006, BR-SSE-009, BR-SSE-011]
  related_user_stories: [US-SSE-002, US-SSE-004]

x-artifact-defaults: &artifact_defaults
  producer: sse-event-projector
  consumers: [omnimam-web]
  source_events: [asset-library.artifact_created, asset-library.artifact_processing_changed, asset-library.artifact_registration_changed]
  payload:
    artifact_id: string
    application_run_id: string|null
    atomic_task_id: string|null
    output_key: string
    media_type: string
    processing_status: string(created|transferring|processing|ready|failed|deleted)
    processing_progress: number|null
    processing_phase: string|null
    preview_available: boolean
    preview_ref: string|null
    thumbnail_ref: string|null
    size_bytes: integer|null
    processing_error_code: string|null
    processing_retryable: boolean|null
    registration_status: string(pending|registered|failed)
    asset_id: string|null
    registration_error_code: string|null
    registration_retryable: boolean|null
    ready_at: string(date-time)|null
    aggregate_version: integer
    occurred_at: string(date-time)
  idempotency_key: recipient_user_id:artifact_id:aggregate_version:event_name
  retry_policy: 由用户事件投影 outbox 重试，消费者按 Artifact 版本幂等。
  failure_policy: Artifact 与 Asset 登记事实均以 asset-library 为准；投影失败不回滚 Artifact、AssetVersion 或 AtomicTask。
  related_rules: [BR-SSE-004, BR-SSE-005, BR-SSE-006, BR-SSE-009, BR-SSE-010, BR-SSE-011, BR-SSE-012, BR-SSE-017, BR-SSE-018]
  related_user_stories: [US-SSE-003, US-SSE-004]

x-asset-version-defaults: &asset_version_defaults
  producer: sse-event-projector
  consumers: [omnimam-web]
  source_events: [asset-library.asset_version_processing_changed]
  payload:
    asset_id: string
    asset_version_id: string
    status: string(processing|ready|ready_with_warnings|failed)
    expected_count: integer
    completed_count: integer
    failed_count: integer
    task_group_id: string|null
    atomic_task_id: string|null
    error_code: string|null
    aggregate_version: integer
    occurred_at: string(date-time)
  idempotency_key: recipient_user_id:asset_version_id:aggregate_version:event_name
  retry_policy: 由用户事件投影 outbox 重试，消费者按 AssetVersion 版本幂等。
  failure_policy: AssetVersion 处理事实以 asset-library 为准；不得从 AtomicTask 终态推断或覆盖素材状态。
  related_rules: [BR-SSE-004, BR-SSE-005, BR-SSE-006, BR-SSE-009, BR-SSE-010, BR-SSE-011, BR-SSE-017, BR-SSE-018]
  related_user_stories: [US-SSE-003, US-SSE-004]

x-canvas-run-defaults: &canvas_run_defaults
  producer: sse-event-projector
  consumers: [omnimam-web]
  source_events: [workflow-canvas.canvas_run_created, workflow-canvas.canvas_run_task_group_bound, workflow-canvas.canvas_run_status_changed]
  payload:
    canvas_run_id: string
    canvas_id: string|null
    canvas_version_id: string|null
    from_status: string|null
    status: string(PENDING|RUNNING|SUCCESS|PARTIAL_SUCCESS|FAILED|CANCELED|TIMEOUT)
    progress: number
    task_creation_status: string|null
    summary: object
    changed_flow_summaries: array<object>
    warnings: array<object>
    error_code: string|null
    aggregate_version: integer
    occurred_at: string(date-time)
  idempotency_key: recipient_user_id:canvas_run_id:aggregate_version:event_name
  retry_policy: 由用户事件投影 outbox 重试，消费者按 CanvasRun aggregate_version 幂等。
  failure_policy: CanvasRun/FlowRun 仍以 workflow-canvas 为事实源；投影失败不回滚运行，客户端重查运行快照恢复。
  related_rules: [BR-SSE-004, BR-SSE-005, BR-SSE-006, BR-SSE-009, BR-SSE-010, BR-SSE-011, BR-WORKFLOW-014, BR-WORKFLOW-024, BR-WORKFLOW-025]
  related_user_stories: [US-SSE-002, US-SSE-004, US-WORKFLOW-002, US-WORKFLOW-004, US-WORKFLOW-006]

x-canvas-node-defaults: &canvas_node_defaults
  producer: sse-event-projector
  consumers: [omnimam-web]
  source_events: [workflow-canvas.canvas_node_run_status_changed, workflow-canvas.canvas_node_output_available]
  payload:
    canvas_run_id: string
    canvas_node_run_id: string
    node_id: string
    execution_key: string
    from_status: string|null
    status: string|null
    status_reason: string|null
    result_mode: string|null
    progress: number|null
    port_key: string|null
    shard_key: string|null
    shard_index: integer|null
    atomic_task_id: string|null
    artifact_id: string|null
    artifact_summary: object|null
    warnings: array<object>
    error_code: string|null
    aggregate_version: integer
    occurred_at: string(date-time)
  idempotency_key: recipient_user_id:canvas_node_run_id:aggregate_version:event_name
  retry_policy: 由用户事件投影 outbox 重试；输出事件额外按 node_run + port + shard + artifact 去重。
  failure_policy: CanvasNodeRun 与输出绑定仍以 workflow-canvas 为事实源，Artifact 生命周期以 asset-library 为事实源；不同聚合版本不可比较。
  related_rules: [BR-SSE-004, BR-SSE-005, BR-SSE-006, BR-SSE-009, BR-SSE-010, BR-SSE-011, BR-WORKFLOW-014, BR-WORKFLOW-022, BR-WORKFLOW-023, BR-WORKFLOW-024, BR-WORKFLOW-025]
  related_user_stories: [US-SSE-002, US-SSE-003, US-SSE-004, US-WORKFLOW-002, US-WORKFLOW-004, US-WORKFLOW-006]

connection.ready:
  producer: sse-event-gateway
  consumers: [omnimam-web]
  persistent: false
  trigger_condition: 当前用户连接已通过鉴权，恢复边界已确定，并准备发送业务事件。
  payload:
    connection_id: string
    server_time: string(date-time)
    resume_from_event_id: integer|null
  idempotency_key: connection_id:ready
  retry_policy: 不单独重试；连接建立失败由客户端重连。
  failure_policy: 未收到 ready 时客户端不得将连接标记为 connected。
  related_rules: [BR-SSE-002, BR-SSE-003, BR-SSE-007]
  related_user_stories: [US-SSE-001, US-SSE-004]

connection.resync_required:
  producer: sse-event-gateway
  consumers: [omnimam-web]
  persistent: false
  trigger_condition: 恢复游标不存在、不属于当前用户、已过期或服务端无法保证缺口完整。
  payload:
    reason: string
    requested_after_event_id: integer|null
    earliest_available_event_id: integer
  idempotency_key: connection_id:requested_after_event_id:resync
  retry_policy: 不重试旧游标；客户端完整重查业务事实。
  failure_policy: 客户端暂停增量消费，直到重同步完成。
  related_rules: [BR-SSE-004, BR-SSE-007, BR-SSE-008]
  related_user_stories: [US-SSE-004]

connection.server_draining:
  producer: sse-event-gateway
  consumers: [omnimam-web]
  persistent: false
  trigger_condition: 当前服务实例即将停止并需要客户端转移连接。
  payload:
    retry_after_seconds: integer
  idempotency_key: connection_id:server_instance_id:draining
  retry_policy: 不单独重试；客户端在指定延迟后重连。
  failure_policy: 服务端关闭连接，客户端按 Last-Event-ID 恢复。
  related_rules: [BR-SSE-007, BR-SSE-014]
  related_user_stories: [US-SSE-004, US-SSE-005]

atomic_task.created:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 业务记录首次持久化为 PENDING。
atomic_task.blocked:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 BLOCKED。
atomic_task.ready:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 READY。
atomic_task.started:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 首次或重试后进入 RUNNING。
atomic_task.progressed:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 保持非终态且进度、阶段或结果摘要发生可见变化。
atomic_task.retrying:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 RETRYING 并即将创建新 TaskAttempt。
atomic_task.cancel_requested:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 CANCEL_REQUESTED。
atomic_task.succeeded:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 SUCCESS。
atomic_task.failed:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 FAILED。
atomic_task.canceled:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 CANCELED。
atomic_task.timed_out:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 TIMEOUT。
atomic_task.skipped:
  <<: *atomic_task_defaults
  trigger_condition: AtomicTask 进入 SKIPPED。

task_attempt.created:
  <<: *task_attempt_defaults
  trigger_condition: TaskAttempt 首次持久化为 SCHEDULED。
task_attempt.started:
  <<: *task_attempt_defaults
  trigger_condition: TaskAttempt 进入 RUNNING。
task_attempt.succeeded:
  <<: *task_attempt_defaults
  trigger_condition: TaskAttempt 进入 SUCCESS。
task_attempt.failed:
  <<: *task_attempt_defaults
  trigger_condition: TaskAttempt 进入 FAILED。
task_attempt.canceled:
  <<: *task_attempt_defaults
  trigger_condition: TaskAttempt 进入 CANCELED。
task_attempt.timed_out:
  <<: *task_attempt_defaults
  trigger_condition: TaskAttempt 进入 TIMEOUT。

task_group.created:
  <<: *task_group_defaults
  trigger_condition: group_type=TASK_GROUP 且 TaskGroup 首次持久化。
task_group.started:
  <<: *task_group_defaults
  trigger_condition: group_type=TASK_GROUP 且 TaskGroup 进入 RUNNING。
task_group.progressed:
  <<: *task_group_defaults
  trigger_condition: group_type=TASK_GROUP 且进度或汇总计数变化。
task_group.succeeded:
  <<: *task_group_defaults
  trigger_condition: group_type=TASK_GROUP 且 TaskGroup 进入 SUCCESS。
task_group.failed:
  <<: *task_group_defaults
  trigger_condition: group_type=TASK_GROUP 且 TaskGroup 进入 FAILED 或 TIMEOUT。
task_group.canceled:
  <<: *task_group_defaults
  trigger_condition: group_type=TASK_GROUP 且 TaskGroup 进入 CANCELED。

dag_task_group.created:
  <<: *task_group_defaults
  trigger_condition: group_type=DAG_TASK_GROUP 且 DAGTaskGroup 首次持久化。
dag_task_group.started:
  <<: *task_group_defaults
  trigger_condition: group_type=DAG_TASK_GROUP 且 DAGTaskGroup 进入 RUNNING。
dag_task_group.progressed:
  <<: *task_group_defaults
  trigger_condition: group_type=DAG_TASK_GROUP 且进度或节点汇总计数变化。
dag_task_group.succeeded:
  <<: *task_group_defaults
  trigger_condition: group_type=DAG_TASK_GROUP 且 DAGTaskGroup 进入 SUCCESS。
dag_task_group.failed:
  <<: *task_group_defaults
  trigger_condition: group_type=DAG_TASK_GROUP 且 DAGTaskGroup 进入 FAILED 或 TIMEOUT。
dag_task_group.canceled:
  <<: *task_group_defaults
  trigger_condition: group_type=DAG_TASK_GROUP 且 DAGTaskGroup 进入 CANCELED。

artifact.created:
  <<: *artifact_defaults
  trigger_condition: asset-library Artifact 首次持久化为 created。
artifact.transferring:
  <<: *artifact_defaults
  trigger_condition: Artifact 进入 transferring 或传输进度达到可推送阈值。
artifact.processing:
  <<: *artifact_defaults
  trigger_condition: Artifact 进入 processing 或处理阶段/进度达到可推送阈值。
artifact.preview_ready:
  <<: *artifact_defaults
  trigger_condition: Artifact 预览或缩略图首次就绪；不要求 processing_status=ready。
artifact.ready:
  <<: *artifact_defaults
  trigger_condition: Artifact 进入 ready 且可控 content_ref 已存在。
artifact.processing_failed:
  <<: *artifact_defaults
  trigger_condition: Artifact 传输或处理进入 failed。
artifact.registration_succeeded:
  <<: *artifact_defaults
  trigger_condition: Artifact 登记状态进入 registered 并关联唯一 UserAsset。
artifact.registration_failed:
  <<: *artifact_defaults
  trigger_condition: Artifact 登记状态进入 failed。
artifact.deleted:
  <<: *artifact_defaults
  trigger_condition: Artifact 进入 deleted；不级联删除已登记 UserAsset。

asset_version.processing_started:
  <<: *asset_version_defaults
  trigger_condition: AssetVersion 首次进入 processing 并已请求 Representation build。
asset_version.processing_progressed:
  <<: *asset_version_defaults
  trigger_condition: expected/completed/failed 计数或可见处理阶段变化。
asset_version.ready:
  <<: *asset_version_defaults
  trigger_condition: 所有必需 Representation 已就绪且没有未处理警告。
asset_version.ready_with_warnings:
  <<: *asset_version_defaults
  trigger_condition: 必需项可用但至少一个可选 Representation 失败。
asset_version.processing_failed:
  <<: *asset_version_defaults
  trigger_condition: original、metadata 或其他必需 Representation 处理失败。

canvas.run.created:
  <<: *canvas_run_defaults
  trigger_condition: CanvasRun 固定版本、输入、scope、策略和执行计划后首次持久化。
canvas.run.started:
  <<: *canvas_run_defaults
  trigger_condition: CanvasRun 首次进入 RUNNING。
canvas.run.progressed:
  <<: *canvas_run_defaults
  trigger_condition: CanvasRun 进度、聚合计数、warning 或变化 FlowRun 摘要发生更新。
canvas.run.succeeded:
  <<: *canvas_run_defaults
  trigger_condition: CanvasRun 进入 SUCCESS 或 PARTIAL_SUCCESS；payload.status 保留具体终态。
canvas.run.failed:
  <<: *canvas_run_defaults
  trigger_condition: CanvasRun 进入 FAILED 或 TIMEOUT；payload.status 保留具体终态。
canvas.run.cancelled:
  <<: *canvas_run_defaults
  trigger_condition: CanvasRun 进入 CANCELED。

canvas.node.ready:
  <<: *canvas_node_defaults
  trigger_condition: CanvasNodeRun 进入 READY。
canvas.node.queued:
  <<: *canvas_node_defaults
  trigger_condition: CanvasNodeRun 已形成 TaskBinding，任务尚未开始且仍为 PENDING 或 BLOCKED。
canvas.node.started:
  <<: *canvas_node_defaults
  trigger_condition: CanvasNodeRun 首次或自动重试后进入 RUNNING。
canvas.node.progressed:
  <<: *canvas_node_defaults
  trigger_condition: CanvasNodeRun 状态未终结且进度、分片计数或 warning 发生变化。
canvas.node.output_available:
  <<: *canvas_node_defaults
  trigger_condition: 一个结构化输出已持久化，或 Artifact 已 READY 并绑定到 port_key + shard_key 输出槽位。
canvas.node.succeeded:
  <<: *canvas_node_defaults
  trigger_condition: CanvasNodeRun 进入 SUCCESS、PARTIAL_SUCCESS 或 REUSED；payload.status 和 result_mode 保留具体语义。
canvas.node.failed:
  <<: *canvas_node_defaults
  trigger_condition: CanvasNodeRun 进入 FAILED 或 TIMEOUT；payload.status 保留具体终态。
canvas.node.skipped:
  <<: *canvas_node_defaults
  trigger_condition: CanvasNodeRun 因依赖失败或确定不执行而进入 SKIPPED。
canvas.node.cancelled:
  <<: *canvas_node_defaults
  trigger_condition: CanvasNodeRun 进入 CANCELED。
