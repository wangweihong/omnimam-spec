provider:
  code:
    seedance
  name:
    Seedance
  category:
    video-generation
  documentation:
    official:
      - https://seedance2.ai/api-docs
  engine_types:
    - seedance_api
  adapter:
    code:
      seedance_http_async
  authentication:
    supported_methods:
      - api_key
  capability:
    discovery:
      mode:
        manual
      sources:
        - official_documentation
  execution:
    mode:
      async_task
    features:
      - create_task
      - query_task
      - cancel_task
      - download_output